<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Pumps — CryptoBros</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src https://fonts.gstatic.com; connect-src *;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ALL STYLES - same as before - keep them */
    :root {
      --neon-cyan: #00F0FF;
      --neon-purple: #9D00FF;
      --neon-red: #FF4D4D;
      --neon-gold: #FFD700;
      --neon-green: #00FF9D;
      --neon-orange: #FF9900;
      --deep-bg: #0a0e27;
      --card-bg: rgba(10, 14, 39, 0.95);
      --glass-border: rgba(255, 215, 0, 0.2);
      --text: #e0e0ff;
      --text2: #a0a0c0;
      --glow: 0 0 30px rgba(255, 215, 0, 0.3);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle at 50% 50%, #0a0e27, #030514);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    body.day-mode {
      background: radial-gradient(circle at 50% 50%, #f0f4ff, #ffffff);
      color: #1a1a2e;
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --card-bg: rgba(255, 255, 255, 0.95);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-radius: 100px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
    }
    
    .back-btn {
      padding: 0.8rem 1.6rem;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(10, 14, 39, 0.9));
      border: 2px solid var(--neon-gold);
      border-radius: 50px;
      color: var(--neon-gold);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      display: inline-block;
    }
    
    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--neon-gold);
    }
    
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      background: linear-gradient(135deg, #FFD700, #FFA500, #00F0FF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    
    .theme-toggle {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(10, 14, 39, 0.9));
      border: 2px solid var(--neon-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 2rem 0;
      padding: 1.5rem 2rem;
      background: var(--card-bg);
      border-radius: 60px;
      border: 2px solid rgba(255, 215, 0, 0.4);
    }
    
    select {
      padding: 0.8rem 1.6rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      cursor: pointer;
      font-weight: 600;
      min-width: 140px;
      font-family: 'Quicksand', sans-serif;
      outline: none;
    }
    
    select option {
      background: #0a0e27;
      color: var(--neon-gold);
    }
    
    body.day-mode select {
      background: rgba(255, 255, 255, 0.9);
      color: #1a1a2e;
    }
    
    body.day-mode select option {
      background: #ffffff;
      color: #1a1a2e;
    }
    
    .token-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }
    
    .token-card {
      background: var(--card-bg);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 32px;
      padding: 1.8rem;
      backdrop-filter: blur(15px);
      transition: all 0.4s;
      will-change: transform;
    }
    
    .token-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
    }
    
    .token-symbol {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--neon-gold);
      font-family: 'Plus Jakarta Sans', sans-serif;
      word-break: break-word;
    }
    
    .tag {
      padding: 0.4rem 0.9rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .tag-pump {
      background: rgba(255, 153, 0, 0.15);
      border: 1px solid #FF9900;
      color: #FF9900;
    }
    .tag-raydium {
      background: rgba(0, 240, 255, 0.15);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
    }
    
    .token-info {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.2rem;
      border-radius: 20px;
      margin: 1.2rem 0;
    }
    
    body.day-mode .token-info {
      background: rgba(0, 0, 0, 0.05);
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }
    
    .source-badge {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.5);
      margin-left: 4px;
    }
    
    .source-goplus { color: #FFD700; }
    .source-helius { color: #00F0FF; }
    .source-dex { color: #00FF9D; }
    .source-estimate { 
      background: rgba(255, 153, 0, 0.3);
      color: #FF9900;
    }
    
    .risk-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 6px;
    }
    .risk-high {
      background: rgba(255, 77, 77, 0.15);
      border: 1px solid #FF4D4D;
      color: #FF4D4D;
    }
    .risk-medium {
      background: rgba(255, 153, 0, 0.15);
      border: 1px solid #FF9900;
      color: #FF9900;
    }
    .risk-low {
      background: rgba(0, 255, 157, 0.15);
      border: 1px solid #00FF9D;
      color: #00FF9D;
    }
    
    .token-ca {
      font-family: 'Space Grotesk', monospace;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.6rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      text-align: center;
      margin: 1rem 0;
      transition: all 0.3s;
      user-select: all;
    }
    
    .token-ca:hover {
      background: rgba(255, 215, 0, 0.2);
    }
    
    .token-actions {
      display: flex;
      gap: 1rem;
    }
    
    .action-btn {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      cursor: pointer;
      font-weight: 700;
      flex: 1;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    
    .action-btn:hover:not(:disabled) {
      background: rgba(255, 215, 0, 0.1);
      transform: scale(1.02);
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    
    .loader, .empty {
      text-align: center;
      padding: 4rem;
      color: var(--neon-gold);
      grid-column: 1 / -1;
      background: var(--card-bg);
      border-radius: 50px;
      font-size: 1.5rem;
    }
    
    .loader::after {
      content: '';
      width: 30px;
      height: 30px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: var(--neon-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .update-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 2rem;
      background: var(--card-bg);
      border-radius: 60px;
      margin: 3rem 0 1rem;
    }
    
    .update-timer {
      color: var(--neon-gold);
      font-weight: 700;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      border: 2px solid var(--neon-cyan);
    }
    
    .refresh-now {
      background: transparent;
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .refresh-now:hover:not(:disabled) {
      background: rgba(255, 215, 0, 0.1);
    }
    
    .refresh-now:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .toast {
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      backdrop-filter: blur(10px);
      border: 2px solid;
      animation: slideIn 0.3s ease;
      max-width: 300px;
      word-break: break-word;
    }
    
    .toast-success {
      background: rgba(0, 255, 157, 0.2);
      border-color: #00FF9D;
      color: #00FF9D;
    }
    
    .toast-error {
      background: rgba(255, 77, 77, 0.2);
      border-color: #FF4D4D;
      color: #FF4D4D;
    }
    
    .toast-warning {
      background: rgba(255, 153, 0, 0.2);
      border-color: #FF9900;
      color: #FF9900;
    }
    
    .toast-info {
      background: rgba(0, 240, 255, 0.2);
      border-color: #00F0FF;
      color: #00F0FF;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .load-more-btn {
      grid-column: 1 / -1;
      padding: 1rem;
      background: var(--card-bg);
      border: 2px solid var(--neon-gold);
      border-radius: 50px;
      color: var(--neon-gold);
      font-weight: 700;
      cursor: pointer;
      margin: 1rem 0;
      transition: all 0.3s;
    }
    
    .load-more-btn:hover:not(:disabled) {
      background: rgba(255, 215, 0, 0.1);
    }
    
    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-message {
      color: var(--neon-red);
      font-size: 1.2rem;
    }
    
    @media (max-width: 768px) {
      .token-grid {
        grid-template-columns: 1fr;
      }
      
      .filter-bar {
        flex-direction: column;
        padding: 1rem;
      }
      
      select {
        width: 100%;
      }
      
      .header {
        padding: 1rem;
        border-radius: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" id="backBtn">← BACK</button>
      <h1>FRESH PUMPS</h1>
      <div class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</div>
    </div>

    <div class="filter-bar">
      <select id="timeFilter" aria-label="Time filter">
        <option value="all">⏱️ ALL TIME</option>
        <option value="5m">🔥 5 MIN</option>
        <option value="30m">⚡ 30 MIN</option>
        <option value="1h">🕐 1 HOUR</option>
      </select>
      <select id="liqFilter" aria-label="Liquidity filter">
        <option value="all">💰 ALL LIQ</option>
        <option value="5k">💎 >$5K</option>
        <option value="10k">💎 >$10K</option>
        <option value="50k">💎 >$50K</option>
      </select>
      <select id="platformFilter" aria-label="Platform filter">
        <option value="all">🌐 ALL</option>
        <option value="pump">🎯 PUMP.FUN</option>
        <option value="raydium">💧 RAYDIUM</option>
      </select>
      <select id="sortFilter" aria-label="Sort by">
        <option value="newest">🆕 NEWEST</option>
        <option value="holders">👥 HOLDERS</option>
        <option value="growth">📈 GROWTH</option>
      </select>
    </div>

    <div id="tokenGrid" class="token-grid">
      <div class="loader">LOADING FRESH TOKENS...</div>
    </div>

    <div class="update-info">
      <span class="update-timer" id="updateTimer">⏱️ 60 SEC</span>
      <button class="refresh-now" id="refreshBtn" aria-label="Refresh tokens">⟳ REFRESH</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  
  <!-- FIXED: Changed from fresh-tokens.js to fresh-pumps.js -->
  <script src="fresh-pumps.js" defer></script>
</body>
</html>
