<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Pumps — CryptoBros</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src https://fonts.gstatic.com; connect-src *;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00F0FF;
      --neon-purple: #9D00FF;
      --neon-red: #FF4D4D;
      --neon-gold: #FFD700;
      --neon-green: #00FF9D;
      --neon-orange: #FF9900;
      --deep-bg: #0a0e27;
      --card-bg: rgba(10, 14, 39, 0.95);
      --glass-border: rgba(255, 215, 0, 0.2);
      --text: #e0e0ff;
      --text2: #a0a0c0;
      --glow: 0 0 30px rgba(255, 215, 0, 0.3);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle at 50% 50%, #0a0e27, #030514);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    body.day-mode {
      background: radial-gradient(circle at 50% 50%, #f0f4ff, #ffffff);
      color: #1a1a2e;
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --card-bg: rgba(255, 255, 255, 0.95);
    }
    
    .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-radius: 100px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
    }
    
    .back-btn {
      padding: 0.8rem 1.6rem;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(10, 14, 39, 0.9));
      border: 2px solid var(--neon-gold);
      border-radius: 50px;
      color: var(--neon-gold);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-block;
    }
    
    .back-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-gold); }
    
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      background: linear-gradient(135deg, #FFD700, #FFA500, #00F0FF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    
    .theme-toggle {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(10, 14, 39, 0.9));
      border: 2px solid var(--neon-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 2rem 0;
      padding: 1.5rem 2rem;
      background: var(--card-bg);
      border-radius: 60px;
      border: 2px solid rgba(255, 215, 0, 0.4);
    }
    
    select {
      padding: 0.8rem 1.6rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      cursor: pointer;
      font-weight: 600;
      min-width: 140px;
      font-family: 'Quicksand', sans-serif;
      outline: none;
    }
    
    select option { background: #0a0e27; color: var(--neon-gold); }
    body.day-mode select { background: rgba(255, 255, 255, 0.9); color: #1a1a2e; }
    body.day-mode select option { background: #ffffff; color: #1a1a2e; }
    
    .token-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }
    
    .token-card {
      background: var(--card-bg);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 32px;
      padding: 1.8rem;
      backdrop-filter: blur(15px);
      transition: all 0.4s;
      will-change: transform;
    }
    
    .token-card:hover { transform: translateY(-6px); box-shadow: 0 0 50px rgba(255, 215, 0, 0.3); }
    
    .token-symbol {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--neon-gold);
      font-family: 'Plus Jakarta Sans', sans-serif;
      word-break: break-word;
    }
    
    .tag {
      padding: 0.4rem 0.9rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .tag-pump { background: rgba(255, 153, 0, 0.15); border: 1px solid #FF9900; color: #FF9900; }
    .tag-raydium { background: rgba(0, 240, 255, 0.15); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
    
    .token-info {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.2rem;
      border-radius: 20px;
      margin: 1.2rem 0;
    }
    
    body.day-mode .token-info { background: rgba(0, 0, 0, 0.05); }
    
    .info-row { display: flex; justify-content: space-between; margin-bottom: 0.7rem; }
    
    .risk-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 6px;
    }
    .risk-high { background: rgba(255, 77, 77, 0.15); border: 1px solid #FF4D4D; color: #FF4D4D; }
    .risk-medium { background: rgba(255, 153, 0, 0.15); border: 1px solid #FF9900; color: #FF9900; }
    .risk-low { background: rgba(0, 255, 157, 0.15); border: 1px solid #00FF9D; color: #00FF9D; }
    
    .token-ca {
      font-family: 'Space Grotesk', monospace;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.6rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      text-align: center;
      margin: 1rem 0;
      transition: all 0.3s;
      user-select: all;
    }
    
    .token-ca:hover { background: rgba(255, 215, 0, 0.2); }
    
    .token-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .action-btn {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      cursor: pointer;
      font-weight: 700;
      flex: 1;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    
    .action-btn:hover:not(:disabled) { background: rgba(255, 215, 0, 0.1); transform: scale(1.02); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    
    .loader, .empty {
      text-align: center;
      padding: 4rem;
      color: var(--neon-gold);
      grid-column: 1 / -1;
      background: var(--card-bg);
      border-radius: 50px;
      font-size: 1.5rem;
    }
    
    .loader::after {
      content: '';
      width: 30px;
      height: 30px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: var(--neon-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 1rem;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .update-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 2rem;
      background: var(--card-bg);
      border-radius: 60px;
      margin: 3rem 0 1rem;
    }
    
    .update-timer {
      color: var(--neon-gold);
      font-weight: 700;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      border: 2px solid var(--neon-cyan);
    }
    
    .refresh-now {
      background: transparent;
      border: 2px solid var(--neon-gold);
      border-radius: 40px;
      color: var(--neon-gold);
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .refresh-now:hover:not(:disabled) { background: rgba(255, 215, 0, 0.1); }
    .refresh-now:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .toast {
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      color: #FFD700;
      padding: 12px 24px;
      border-radius: 50px;
      border: 2px solid #FFD700;
      font-weight: 600;
      animation: slideIn 0.3s ease-out;
      max-width: 300px;
      word-break: break-word;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    
    .toast-error { border-color: #FF4D4D; color: #FF4D4D; }
    .toast-warning { border-color: #FF9900; color: #FF9900; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
    
    @media (max-width: 768px) {
      .token-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; padding: 1rem; }
      select { width: 100%; }
      .header { padding: 1rem; border-radius: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" id="backBtn">← BACK</button>
      <h1>FRESH PUMPS</h1>
      <div class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</div>
    </div>

    <div class="filter-bar">
      <select id="timeFilter" aria-label="Time filter">
        <option value="all">⏱️ ALL TIME</option>
        <option value="5m">🔥 5 MIN</option>
        <option value="30m">⚡ 30 MIN</option>
        <option value="1h">🕐 1 HOUR</option>
      </select>
      <select id="liqFilter" aria-label="Liquidity filter">
        <option value="all">💰 ALL LIQ</option>
        <option value="5k">💎 >$5K</option>
        <option value="10k">💎 >$10K</option>
        <option value="50k">💎 >$50K</option>
      </select>
      <select id="platformFilter" aria-label="Platform filter">
        <option value="all">🌐 ALL</option>
        <option value="pump">🎯 PUMP.FUN</option>
        <option value="raydium">💧 RAYDIUM</option>
      </select>
      <select id="sortFilter" aria-label="Sort by">
        <option value="newest">🆕 NEWEST</option>
        <option value="holders">👥 HOLDERS</option>
        <option value="growth">📈 GROWTH</option>
      </select>
    </div>

    <div id="tokenGrid" class="token-grid">
      <div class="loader">LOADING FRESH TOKENS...</div>
    </div>

    <div class="update-info">
      <span class="update-timer" id="updateTimer">⏱️ 60 SEC</span>
      <button class="refresh-now" id="refreshBtn" aria-label="Refresh tokens">⟳ REFRESH</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  
  <script>
    // ================== VERSION ==================
    const VERSION = '2.0.1';
    console.log(`🚀 Fresh Pumps v${VERSION} initializing...`);

    // ================== CONFIG ==================
    const CONFIG = {
      REFRESH_INTERVAL: 60,
      REQUEST_TIMEOUT: 15000,
      MAX_RETRIES: 3,
      MAX_POOL_SIZE: 250,
      BATCH_SIZE: 25,
      HOLDERS_QUEUE_DELAY_MS: 700,
      HOLDERS_RETRY_BACKOFF: [3000, 10000, 30000],
      NEW_TOKEN_TTL_MS: 30 * 60 * 1000,
      OLD_TOKEN_TTL_MS: 2 * 60 * 60 * 1000,
      GITHUB_TOKEN: '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',
      CONFIG_URL: 'https://raw.githubusercontent.com/SolPhantomX/cryptobros-backend/main/config.json'
    };

    // ================== STATE ==================
    const state = {
      timeFilter: 'all',
      liqFilter: 'all',
      platformFilter: 'all',
      sort: 'newest',
      countdown: CONFIG.REFRESH_INTERVAL,
      countdownIntervalId: null,
      cleanupIntervalId: null,
      memoryMonitorId: null,
      isRefreshing: false,
      isLoading: false,
      isMounted: true,
      apiKeys: null,
      abortControllers: new Map(),
      nextControllerId: 0,
      metrics: { apiCalls: 0, errors: 0, renderTime: 0 }
    };

    // App state
    let allTokens = [];
    let displayedCount = 0;
    let holdersQueue = [];
    let isProcessingHolders = false;
    let refreshTimer = null;
    let isLoadingMore = false;
    let scrollHandlerAttached = false;
    let holdersFilterActive = false;
    let holdersSortActive = false;
    let holdersCache = new Map();

    // ================== UTILITIES ==================
    const getElement = (id) => document.getElementById(id);
    
    const escapeHtml = (text) => {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    };
    
    const escapeAttribute = (text) => {
      if (!text) return '';
      return String(text).replace(/[&<>"'\/]/g, (match) => {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' };
        return map[match];
      });
    };
    
    const formatNumber = (num) => {
      if (num == null || isNaN(num)) return '0';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return num.toString();
    };
    
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    const showToast = (message, type = 'success', duration = 3000) => {
      if (!state.isMounted) return;
      const container = getElement('toastContainer');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.animation = 'slideOut 0.3s ease-out';
          setTimeout(() => toast.remove(), 300);
        }
      }, duration);
    };
    
    const copyAddress = (address) => {
      if (!address) return showToast('Invalid address', 'error');
      navigator.clipboard.writeText(address).then(() => {
        showToast('Address copied!');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = address;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('Address copied!');
      });
    };
    
    const createAbortController = () => {
      const id = state.nextControllerId++;
      const controller = new AbortController();
      state.abortControllers.set(id, controller);
      controller.signal.addEventListener('abort', () => {
        if (state.abortControllers.get(id) === controller) state.abortControllers.delete(id);
      }, { once: true });
      return controller;
    };
    
    const fetchWithTimeout = async (url, options = {}, retries = CONFIG.MAX_RETRIES) => {
      for (let i = 0; i < retries; i++) {
        const controller = createAbortController();
        let timeoutId;
        
        try {
          timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
          const response = await fetch(url, { ...options, signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (response.status === 429 && i < retries - 1) {
            await sleep(5000 * (i + 1));
            continue;
          }
          if (!response.ok && i < retries - 1) {
            await sleep(2000 * (i + 1));
            continue;
          }
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response;
        } catch (error) {
          clearTimeout(timeoutId);
          if (i === retries - 1) throw error;
          await sleep(2000 * (i + 1));
        }
      }
      throw new Error('Max retries exceeded');
    };

    // ================== HOLDERS CACHE ==================
    function loadHoldersCacheFromStorage() {
      try {
        const saved = localStorage.getItem('holdersCache');
        if (saved) {
          const parsed = JSON.parse(saved);
          const now = Date.now();
          for (const [mint, data] of Object.entries(parsed)) {
            const ttl = data.isNew ? CONFIG.NEW_TOKEN_TTL_MS : CONFIG.OLD_TOKEN_TTL_MS;
            if (now - data.timestamp < ttl) {
              holdersCache.set(mint, data);
            }
          }
        }
      } catch (e) { console.warn('Failed to load holders cache:', e); }
    }
    
    function saveHoldersCacheToStorage() {
      try {
        const toSave = {};
        const now = Date.now();
        for (const [mint, data] of holdersCache.entries()) {
          const ttl = data.isNew ? CONFIG.NEW_TOKEN_TTL_MS : CONFIG.OLD_TOKEN_TTL_MS;
          if (now - data.timestamp < ttl) toSave[mint] = data;
        }
        localStorage.setItem('holdersCache', JSON.stringify(toSave));
      } catch (e) { console.warn('Failed to save holders cache:', e); }
    }

    // ================== HELIUS API (DIRECT CALL - TO BE REPLACED WITH BACKEND) ==================
    async function directHeliusCall(mint) {
      if (!state.apiKeys?.HELIUS_RPC) {
        console.warn('No Helius RPC available');
        return null;
      }
      
      let uniqueOwners = new Set();
      
      try {
        const response = await fetchWithTimeout(state.apiKeys.HELIUS_RPC, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: 'getTokenAccounts',
            params: [mint, { page: 1, limit: 1000, displayOptions: { showZeroBalance: false } }]
          })
        });
        
        const data = await response.json();
        
        if (data.result?.token_accounts) {
          data.result.token_accounts.forEach(acc => {
            if (acc.owner) uniqueOwners.add(acc.owner);
          });
        }
        
        const count = uniqueOwners.size;
        const isOver1000 = count >= 1001;
        
        return {
          count: isOver1000 ? count : count,
          isOver1000,
          timestamp: Date.now(),
          error: false
        };
        
      } catch (error) {
        console.error(`Helius call failed for ${mint}:`, error);
        return null;
      }
    }
    
    // ================== HOLDERS API ADAPTER (SINGLE ENTRY POINT) ==================
    async function fetchHoldersFromAPI(mint, isNew = true) {
      const cached = holdersCache.get(mint);
      if (cached) {
        const ttl = isNew ? CONFIG.NEW_TOKEN_TTL_MS : CONFIG.OLD_TOKEN_TTL_MS;
        if (Date.now() - cached.timestamp < ttl) {
          return cached;
        }
      }
      
      const result = await directHeliusCall(mint);
      
      if (result) {
        result.isNew = isNew;
        holdersCache.set(mint, result);
        saveHoldersCacheToStorage();
      }
      
      return result;
    }

    // ================== LOAD API KEYS ==================
    async function loadApiKeys(retryCount = 0) {
      try {
        const response = await fetchWithTimeout(CONFIG.CONFIG_URL, {
          cache: 'no-cache',
          headers: { 'Authorization': `token ${CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3.raw' }
        });
        
        const data = await response.json();
        
        state.apiKeys = {
          GOPLUS_API_KEY: data.GOPLUS_API_KEY || null,
          HELIUS_RPC: data.HELIUS_RPC || null,
          GOPLUS_API: data.GOPLUS_API || 'https://api.gopluslabs.io/api/v1'
        };
        
        console.log('✅ API keys loaded');
        return state.apiKeys;
        
      } catch (e) {
        console.error('Failed to load API keys:', e);
        state.apiKeys = { GOPLUS_API_KEY: null, HELIUS_RPC: null, GOPLUS_API: 'https://api.gopluslabs.io/api/v1' };
        return state.apiKeys;
      }
    }

    // ================== FETCH TOKEN DETAILS ==================
    async function fetchTokenDetails(token) {
      try {
        const response = await fetchWithTimeout(`https://api.dexscreener.com/latest/dex/search?q=${token.mint}`, { cache: 'no-cache' });
        const data = await response.json();
        if (!data.pairs?.length) return;
        
        const bestPair = data.pairs.reduce((best, pair) => {
          const liq = pair.liquidity?.usd || 0;
          return liq > (best.liquidity?.usd || 0) ? pair : best;
        }, data.pairs[0]);
        
        token.volume24h = bestPair.volume?.h24 || 0;
        token.liquidity = bestPair.liquidity?.usd || 0;
        token.price = bestPair.priceUsd || 0;
        
        updateTokenCardDisplay(token);
        
      } catch (error) {
        console.warn(`Failed to fetch details for ${token.mint}:`, error);
      }
    }
    
    function updateTokenCardDisplay(token) {
      const card = document.querySelector(`.token-card[data-mint="${token.mint}"]`);
      if (!card) return;
      
      const liqSpan = card.querySelector('.token-liq-value');
      if (liqSpan) liqSpan.textContent = token.liquidity ? formatNumber(token.liquidity) : '?';
      
      const volSpan = card.querySelector('.token-volume-value');
      if (volSpan) volSpan.textContent = token.volume24h ? formatNumber(token.volume24h) : '?';
      
      const priceSpan = card.querySelector('.token-price-value');
      if (priceSpan && token.price) priceSpan.textContent = `$${token.price.toFixed(8)}`;
    }

    // ================== HOLDERS QUEUE PROCESSING ==================
    async function processHoldersQueue() {
      if (isProcessingHolders) return;
      if (holdersQueue.length === 0) return;
      
      isProcessingHolders = true;
      
      try {
        while (holdersQueue.length > 0) {
          const mint = holdersQueue.shift();
          const token = allTokens.find(t => t.mint === mint);
          if (!token) continue;
          
          let retries = 0;
          let success = false;
          
          while (retries < 3 && !success) {
            try {
              token.holdersStatus = 'loading';
              updateTokenCardHoldersLoading(mint);
              
              const holdersData = await fetchHoldersFromAPI(mint, token.isNew);
              
              if (holdersData) {
                token.holders = holdersData.count;
                token.holdersStatus = 'loaded';
                token.isOver1000 = holdersData.isOver1000;
                
                updateTokenCardHolders(mint, holdersData.count, holdersData.isOver1000);
                
                if (holdersFilterActive) applyFilterToToken(mint);
                if (holdersSortActive) insertTokenInSortedPosition(mint);
                
                success = true;
              } else {
                throw new Error('No data');
              }
              
            } catch (error) {
              retries++;
              if (retries < 3) {
                await sleep(CONFIG.HOLDERS_RETRY_BACKOFF[retries - 1] || 30000);
              }
            }
          }
          
          if (!success) {
            token.holdersStatus = 'error';
            updateTokenCardHoldersError(mint);
          }
          
          await sleep(CONFIG.HOLDERS_QUEUE_DELAY_MS);
        }
      } finally {
        isProcessingHolders = false;
      }
    }
    
    function queueHoldersFetch(mint) {
      const token = allTokens.find(t => t.mint === mint);
      if (!token) return;
      if (token.holdersStatus === 'loaded' || token.holdersStatus === 'loading') return;
      if (holdersQueue.includes(mint)) return;
      
      holdersQueue.push(mint);
      processHoldersQueue();
    }
    
    function updateTokenCardHolders(mint, count, isOver1000) {
      const card = document.querySelector(`.token-card[data-mint="${mint}"]`);
      if (!card) return;
      
      const holdersSpan = card.querySelector('.token-holders-value');
      if (holdersSpan) {
        const displayText = isOver1000 ? '>1K' : formatNumber(count);
        holdersSpan.textContent = displayText;
        holdersSpan.classList.remove('pending', 'loading');
      }
      
      const loadBtn = card.querySelector('.load-holders-btn');
      if (loadBtn) loadBtn.remove();
    }
    
    function updateTokenCardHoldersLoading(mint) {
      const card = document.querySelector(`.token-card[data-mint="${mint}"]`);
      if (!card) return;
      
      const holdersSpan = card.querySelector('.token-holders-value');
      if (holdersSpan) {
        holdersSpan.textContent = 'loading...';
        holdersSpan.classList.add('loading');
      }
      
      const loadBtn = card.querySelector('.load-holders-btn');
      if (loadBtn) {
        loadBtn.textContent = '⏳ LOADING...';
        loadBtn.disabled = true;
      }
    }
    
    function updateTokenCardHoldersError(mint) {
      const card = document.querySelector(`.token-card[data-mint="${mint}"]`);
      if (!card) return;
      
      const holdersSpan = card.querySelector('.token-holders-value');
      if (holdersSpan) {
        holdersSpan.textContent = '❌ error';
        holdersSpan.classList.add('error');
      }
      
      const loadBtn = card.querySelector('.load-holders-btn');
      if (loadBtn) {
        loadBtn.textContent = '🔄 RETRY';
        loadBtn.disabled = false;
        const newBtn = loadBtn.cloneNode(true);
        loadBtn.parentNode.replaceChild(newBtn, loadBtn);
        newBtn.addEventListener('click', () => {
          queueHoldersFetch(mint);
          newBtn.textContent = '⏳ LOADING...';
          newBtn.disabled = true;
        }, { once: true });
      }
    }

    // ================== FILTERS & SORTING ==================
    function toggleHoldersFilter() {
      holdersFilterActive = !holdersFilterActive;
      
      if (holdersFilterActive) {
        const visibleTokens = allTokens.slice(0, displayedCount);
        visibleTokens.forEach(token => {
          if (!holdersCache.has(token.mint)) queueHoldersFetch(token.mint);
        });
        applyHoldersFilterToAll();
        showToast('Showing tokens with >1000 holders only', 'info');
      } else {
        document.querySelectorAll('.token-card').forEach(card => {
          card.style.display = 'block';
          card.style.opacity = '1';
        });
        showToast('Holders filter disabled', 'info');
      }
    }
    
    function applyHoldersFilterToAll() {
      document.querySelectorAll('.token-card').forEach(card => {
        const mint = card.getAttribute('data-mint');
        const token = allTokens.find(t => t.mint === mint);
        if (!token) { card.style.display = 'block'; return; }
        
        if (token.holdersStatus === 'loaded' && token.isOver1000) {
          card.style.display = 'block';
          card.style.opacity = '1';
        } else if (token.holdersStatus === 'pending' || token.holdersStatus === 'loading') {
          card.style.display = 'block';
          card.style.opacity = '0.6';
          if (!holdersCache.has(mint)) queueHoldersFetch(mint);
        } else {
          card.style.display = 'none';
        }
      });
    }
    
    function applyFilterToToken(mint) {
      if (!holdersFilterActive) return;
      const card = document.querySelector(`.token-card[data-mint="${mint}"]`);
      if (!card) return;
      const token = allTokens.find(t => t.mint === mint);
      if (!token) return;
      
      if (token.holdersStatus === 'loaded' && token.isOver1000) {
        card.style.display = 'block';
        card.style.opacity = '1';
      } else if (token.holdersStatus === 'pending' || token.holdersStatus === 'loading') {
        card.style.display = 'block';
        card.style.opacity = '0.6';
      } else {
        card.style.display = 'none';
      }
    }
    
    function sortByHolders() {
      holdersSortActive = true;
      const visibleTokens = allTokens.slice(0, displayedCount);
      visibleTokens.forEach(token => {
        if (!holdersCache.has(token.mint)) queueHoldersFetch(token.mint);
      });
      
      const grid = getElement('tokenGrid');
      const cards = Array.from(grid.querySelectorAll('.token-card'));
      cards.sort((a, b) => {
        const mintA = a.getAttribute('data-mint');
        const mintB = b.getAttribute('data-mint');
        const tokenA = allTokens.find(t => t.mint === mintA);
        const tokenB = allTokens.find(t => t.mint === mintB);
        const holdersA = tokenA?.holders || 0;
        const holdersB = tokenB?.holders || 0;
        return holdersB - holdersA;
      });
      cards.forEach(card => grid.appendChild(card));
      showToast('Sorted by holders (descending)', 'info');
    }
    
    function insertTokenInSortedPosition(mint) {
      if (!holdersSortActive) return;
      const grid = getElement('tokenGrid');
      const card = document.querySelector(`.token-card[data-mint="${mint}"]`);
      if (!card) return;
      const token = allTokens.find(t => t.mint === mint);
      if (!token) return;
      
      const holdersCount = token.holders || 0;
      const cards = Array.from(grid.querySelectorAll('.token-card'));
      let insertIndex = cards.length;
      for (let i = 0; i < cards.length; i++) {
        const otherMint = cards[i].getAttribute('data-mint');
        const otherToken = allTokens.find(t => t.mint === otherMint);
        const otherHolders = otherToken?.holders || 0;
        if (holdersCount > otherHolders) { insertIndex = i; break; }
      }
      if (cards[insertIndex] !== card) grid.insertBefore(card, cards[insertIndex] || null);
    }

    // ================== RENDER FUNCTIONS ==================
    function createTokenCardSkeleton(token) {
      const card = document.createElement('div');
      card.className = 'token-card';
      card.setAttribute('data-mint', token.mint);
      card.setAttribute('data-symbol', token.symbol);
      
      const cached = holdersCache.get(token.mint);
      const holdersDisplay = cached ? (cached.isOver1000 ? '>1K' : formatNumber(cached.count)) : '?';
      const holdersClass = cached ? '' : 'pending';
      
      card.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 0.5rem;">
          <div class="token-symbol">${escapeHtml(token.symbol)}</div>
          <div style="display: flex; gap: 0.5rem;">
            <span class="tag ${token.platform === 'pump' ? 'tag-pump' : 'tag-raydium'}">${token.platform === 'pump' ? 'PUMP.FUN' : 'RAYDIUM'}</span>
            <span class="tag risk-low">${cached?.isOver1000 ? '✅' : '?'}</span>
          </div>
        </div>
        <div style="color: var(--text2); margin-bottom: 0.5rem;">${escapeHtml(token.name)}</div>
        
        <div class="token-info">
          <div class="info-row"><span>🕐 Age:</span><span class="token-age-value">loading...</span></div>
          <div class="info-row"><span>💰 Liquidity:</span><span class="token-liq-value">loading...</span></div>
          <div class="info-row"><span>👥 Holders:</span><span class="token-holders-value ${holdersClass}">${holdersDisplay}</span></div>
          <div class="info-row"><span>📊 24h Volume:</span><span class="token-volume-value">loading...</span></div>
          <div class="info-row"><span>💵 Price:</span><span class="token-price-value">loading...</span></div>
        </div>
        
        <div class="token-ca" data-address="${escapeAttribute(token.mint)}">
          🔑 ${token.mint.slice(0, 8)}...${token.mint.slice(-8)}
        </div>
        
        <div class="token-actions">
          <button class="action-btn" onclick="window.open('https://dexscreener.com/solana/${escapeAttribute(token.mint)}', '_blank')">📊 CHART</button>
          <button class="action-btn" onclick="window.open('https://birdeye.so/token/${escapeAttribute(token.mint)}', '_blank')">🦅 BIRDEYE</button>
        </div>
      `;
      
      if (!cached) {
        const actionsDiv = card.querySelector('.token-actions');
        const loadBtn = document.createElement('button');
        loadBtn.className = 'action-btn load-holders-btn';
        loadBtn.textContent = '👥 LOAD HOLDERS';
        loadBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          queueHoldersFetch(token.mint);
          loadBtn.textContent = '⏳ LOADING...';
          loadBtn.disabled = true;
        });
        actionsDiv.appendChild(loadBtn);
      }
      
      return card;
    }
    
    function renderNextBatch() {
      if (isLoadingMore) return;
      if (displayedCount >= allTokens.length) return;
      
      isLoadingMore = true;
      
      try {
        const start = displayedCount;
        const end = Math.min(start + CONFIG.BATCH_SIZE, allTokens.length);
        
        if (start >= allTokens.length) {
          return;
        }
        
        const grid = getElement('tokenGrid');
        const batch = allTokens.slice(start, end);
        
        batch.forEach(token => {
          const card = createTokenCardSkeleton(token);
          grid.appendChild(card);
        });
        
        displayedCount = end;
      } finally {
        isLoadingMore = false;
      }
    }
    
    function checkScrollForMore() {
      if (isLoadingMore) return;
      if (displayedCount >= allTokens.length) return;
      
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      if (scrollY + windowHeight >= documentHeight - 500) {
        renderNextBatch();
      }
    }
    
    function setupInfiniteScroll() {
      if (scrollHandlerAttached) return;
      window.addEventListener('scroll', checkScrollForMore);
      scrollHandlerAttached = true;
    }
    
    function removeInfiniteScroll() {
      if (scrollHandlerAttached) {
        window.removeEventListener('scroll', checkScrollForMore);
        scrollHandlerAttached = false;
      }
    }

    // ================== FETCH FRESH TOKENS FROM DEXSCREENER ==================
    async function fetchFreshTokensFromDexScreener() {
      if (document.visibilityState !== 'visible') return;
      
      try {
        const response = await fetchWithTimeout('https://api.dexscreener.com/token-profiles/latest/v1', { cache: 'no-cache' });
        const profiles = await response.json();
        
        const existingMints = new Set(allTokens.map(t => t.mint));
        const trulyNew = profiles.filter(p => !existingMints.has(p.tokenAddress));
        
        if (trulyNew.length === 0) return;
        
        const newTokens = trulyNew.map(p => ({
          mint: p.tokenAddress,
          symbol: p.symbol || '???',
          name: p.name || p.symbol || 'Unknown',
          volume24h: null,
          liquidity: null,
          holders: null,
          holdersStatus: 'pending',
          isNew: true,
          creationTime: Date.now(),
          platform: p.chainId === 'solana' ? 'raydium' : 'pump'
        }));
        
        allTokens = [...newTokens, ...allTokens];
        if (allTokens.length > CONFIG.MAX_POOL_SIZE) allTokens = allTokens.slice(0, CONFIG.MAX_POOL_SIZE);
        
        const detailPromises = newTokens.map(token => fetchTokenDetails(token));
        Promise.allSettled(detailPromises).catch(console.warn);
        
        if (displayedCount === 0) renderNextBatch();
        
      } catch (error) {
        console.error('Failed to fetch fresh tokens:', error);
      }
    }
    
    function startPeriodicRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        if (document.visibilityState === 'visible') fetchFreshTokensFromDexScreener();
      }, 120000);
    }
    
    // ================== COUNTDOWN ==================
    function startCountdown() {
      if (state.countdownIntervalId) clearInterval(state.countdownIntervalId);
      state.countdownIntervalId = setInterval(() => {
        if (!state.isMounted) {
          if (state.countdownIntervalId) clearInterval(state.countdownIntervalId);
          return;
        }
        if (state.countdown > 0) {
          state.countdown--;
          const timerEl = getElement('updateTimer');
          if (timerEl) timerEl.textContent = `⏱️ ${state.countdown} SEC`;
          if (state.countdown === 0) {
            if (!state.isRefreshing && !state.isLoading) loadTokens();
            state.countdown = CONFIG.REFRESH_INTERVAL;
          }
        } else {
          state.countdown = CONFIG.REFRESH_INTERVAL;
        }
      }, 1000);
    }
    
    // ================== MAIN LOAD FUNCTION ==================
    async function loadTokens() {
      if (state.isRefreshing || state.isLoading) return;
      state.isRefreshing = true;
      state.isLoading = true;
      
      const grid = getElement('tokenGrid');
      if (grid) {
        grid.innerHTML = '<div class="loader">LOADING FRESH TOKENS...</div>';
      }
      
      try {
        allTokens = [];
        displayedCount = 0;
        holdersQueue = [];
        isProcessingHolders = false;
        holdersFilterActive = false;
        holdersSortActive = false;
        
        removeInfiniteScroll();
        
        loadHoldersCacheFromStorage();
        await fetchFreshTokensFromDexScreener();
        setupInfiniteScroll();
        startPeriodicRefresh();
        
        showToast(`Loaded ${allTokens.length} fresh tokens`, 'success');
      } catch (error) {
        console.error('Failed to load tokens:', error);
        showToast('Failed to load tokens: ' + error.message, 'error');
        if (grid) grid.innerHTML = '<div class="empty">❌ Failed to load tokens. Please try again.</div>';
      } finally {
        state.isRefreshing = false;
        state.isLoading = false;
      }
    }
    
    // ================== UI INITIALIZATION ==================
    function initBackButton() {
      const backBtn = getElement('backBtn');
      if (backBtn) backBtn.addEventListener('click', () => window.history.back());
    }
    
    function initTheme() {
      const themeToggle = getElement('themeToggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          document.body.classList.toggle('day-mode');
          themeToggle.textContent = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
          try { localStorage.setItem('theme', document.body.classList.contains('day-mode') ? 'day' : 'night'); } catch(e) {}
        });
        try {
          const savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'day') {
            document.body.classList.add('day-mode');
            themeToggle.textContent = '☀️';
          }
        } catch(e) {}
      }
    }
    
    function initFilters() {
      const filters = ['timeFilter', 'liqFilter', 'platformFilter', 'sortFilter'];
      filters.forEach(id => {
        const el = getElement(id);
        if (el) {
          el.addEventListener('change', () => {
            const sortVal = getElement('sortFilter')?.value;
            if (sortVal === 'holders') sortByHolders();
            else holdersSortActive = false;
          });
        }
      });
    }
    
    function addHoldersFilterButton() {
      const filterBar = document.querySelector('.filter-bar');
      if (filterBar && !document.getElementById('holdersFilterBtn')) {
        const btn = document.createElement('button');
        btn.id = 'holdersFilterBtn';
        btn.className = 'action-btn';
        btn.textContent = '👥 HOLDERS > 1000';
        btn.addEventListener('click', toggleHoldersFilter);
        filterBar.appendChild(btn);
      }
    }
    
    function setupEventDelegation() {
      document.addEventListener('click', (e) => {
        const caElement = e.target.closest('.token-ca');
        if (caElement && caElement.dataset.address) copyAddress(caElement.dataset.address);
      });
    }
    
    // ================== CLEANUP ==================
    function cleanup() {
      state.isMounted = false;
      if (state.countdownIntervalId) clearInterval(state.countdownIntervalId);
      if (refreshTimer) clearInterval(refreshTimer);
      removeInfiniteScroll();
      state.abortControllers.forEach(c => { try { c.abort(); } catch(e) {} });
      state.abortControllers.clear();
    }
    
    // ================== INIT ==================
    async function init() {
      console.log(`🚀 Fresh Pumps v${VERSION} initializing...`);
      state.isMounted = true;
      
      initBackButton();
      initTheme();
      initFilters();
      setupEventDelegation();
      addHoldersFilterButton();
      
      await loadApiKeys();
      await loadTokens();
      startCountdown();
      
      const refreshBtn = getElement('refreshBtn');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
          if (state.isRefreshing || state.isLoading) {
            showToast('Already loading...', 'warning');
            return;
          }
          state.countdown = CONFIG.REFRESH_INTERVAL;
          loadTokens();
        });
      }
      
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !state.isRefreshing && !state.isLoading && allTokens.length === 0) loadTokens();
      });
      
      window.addEventListener('beforeunload', cleanup);
      console.log('✅ Fresh Pumps initialized');
    }
    
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  </script>
</body>
</html>
