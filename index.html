<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRYPTOBROS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
    }

    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      transition: background-image 1.5s ease-in-out;
      filter: brightness(0.9);
      background-color: #000;
      background-image: url('backgrounds/fallback.jpg'); /* Fallback image */
    }

    .language-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(145deg, #e5e7eb, #d1d5db, #c0c5cc);
      color: #1f2937;
      border: 2px solid #9ca3b0;
      padding: 0.8rem 1.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(209, 213, 219, 0.7);
      z-index: 100;
      transition: all 0.3s ease;
    }
    .language-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(229, 231, 235, 0.9);
      background: linear-gradient(145deg, #d1d5db, #e5e7eb, #c0c5cc);
      border-color: #6b7280;
    }
    .language-btn:focus-visible {
      outline: 3px solid #00ff9d;
      outline-offset: 2px;
    }

    .enter-btn {
      position: absolute;
      top: 90px;
      right: 20px;
      background: linear-gradient(145deg, #f5e6b0, #e6c87c, #d4af37);
      color: #5c3e0b;
      border: 2px solid #c9a53b;
      padding: 0.8rem 2.2rem;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(245, 230, 176, 0.7);
      z-index: 100;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .enter-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(255, 215, 0, 0.9);
      background: linear-gradient(145deg, #e6c87c, #f5e6b0, #e6c87c);
      border-color: #b8860b;
    }
    .enter-btn:focus-visible {
      outline: 3px solid #00ff9d;
      outline-offset: 2px;
    }
    
    .creator-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 204, 0, 0.9);
      color: #000;
      border: 2px solid #ffcc00;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 100;
      display: none;
      transition: all 0.3s ease;
    }
    .creator-btn:hover {
      transform: scale(1.05);
      background: #ffcc00;
    }
    .creator-btn:focus-visible {
      outline: 3px solid #00ff9d;
      outline-offset: 2px;
    }
    .creator-btn.visible {
      display: block;
    }

    .language-menu {
      position: absolute;
      top: 60px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 10px;
      padding: 10px 0;
      display: none;
      z-index: 101;
      box-shadow: 0 0 20px rgba(102, 255, 255, 0.8);
      min-width: 180px;
    }
    .language-menu.active {
      display: block;
    }
    .language-option {
      padding: 12px 25px;
      color: #00ff9d;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: right;
    }
    .language-option:hover {
      background: rgba(102, 255, 255, 0.2);
      color: #fff;
    }
    .language-option:focus-visible {
      outline: 3px solid #00ff9d;
      outline-offset: -2px;
      background: rgba(102, 255, 255, 0.3);
    }
    .language-option.active {
      background: rgba(102, 255, 255, 0.3);
      color: #fff;
    }
    
    footer {
      width: 100%;
      text-align: center;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
      font-weight: 600;
      padding: 20px 0;
      animation: colorChange 15s infinite;
      background: transparent;
      position: absolute;
      bottom: 0;
    }
    
    @keyframes colorChange {
      0% { color: #00ff9d; }
      16.67% { color: #ff00ff; }
      33.33% { color: #00ffff; }
      50% { color: #ff9d00; }
      66.67% { color: #9d00ff; }
      83.33% { color: #ffff00; }
      100% { color: #00ff9d; }
    }

    @media (max-width: 768px) {
      .language-btn {
        top: 30px;
        right: 50%;
        transform: translateX(50%);
        padding: 1rem 2rem;
        font-size: 1.3rem;
        width: 80%;
        max-width: 300px;
        text-align: center;
      }
      
      .language-btn:hover {
        transform: translateX(50%) scale(1.05);
      }
      
      .enter-btn {
        top: 110px;
        right: 50%;
        transform: translateX(50%);
        padding: 1rem 2rem;
        font-size: 1.4rem;
        width: 80%;
        max-width: 300px;
        text-align: center;
      }
      
      .enter-btn:hover {
        transform: translateX(50%) scale(1.05);
      }
      
      .creator-btn {
        top: auto;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        padding: 1rem 2rem;
        font-size: 1.2rem;
        width: 70%;
        max-width: 280px;
        text-align: center;
      }
      
      .creator-btn:hover {
        transform: translateX(-50%) scale(1.05);
      }
      
      .language-menu {
        top: 140px;
        right: 50%;
        transform: translateX(50%);
        width: 80%;
        max-width: 300px;
      }
      
      .language-option {
        padding: 15px 20px;
        font-size: 1.2rem;
        text-align: center;
      }
      
      #secretArea {
        width: 150px;
        height: 150px;
      }
    }

    /* Toast notification animation */
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Accessibility - reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .bg, .language-btn, .enter-btn, .creator-btn, footer {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg" id="dynamicBg" role="img" aria-label="Background image"></div>

  <!-- Secret double-click area -->
  <div style="position: fixed; bottom: 0; left: 0; width: 100px; height: 100px; background: transparent; z-index: 9999; cursor: pointer;" 
       id="secretArea" 
       role="button" 
       aria-label="Secret area - double click to unlock creator mode"
       tabindex="0"></div>

  <button class="creator-btn" id="creatorBtn" aria-label="Creator login">👤 CREATOR LOGIN</button>
  <button type="button" class="language-btn" id="languageBtn" aria-label="Select language" aria-haspopup="true" aria-expanded="false">LANGUAGE</button>
  <a href="#" class="enter-btn" id="enterBtn" aria-label="Enter the club">ENTER THE CLUB</a>

  <div class="language-menu" id="languageMenu" role="menu" aria-label="Language selection menu">
    <div class="language-option active" data-lang="en" role="menuitem" tabindex="0">English</div>
    <div class="language-option" data-lang="fr" role="menuitem" tabindex="0">Français</div>
    <div class="language-option" data-lang="es" role="menuitem" tabindex="0">Español</div>
    <div class="language-option" data-lang="pt" role="menuitem" tabindex="0">Português</div>
    <div class="language-option" data-lang="zh" role="menuitem" tabindex="0">简体中文</div>
    <div class="language-option" data-lang="ar" role="menuitem" tabindex="0">العربية</div>
    <div class="language-option" data-lang="he" role="menuitem" tabindex="0">עברית</div>
    <div class="language-option" data-lang="ru" role="menuitem" tabindex="0">Русский</div>
  </div>

  <footer id="footer">Cryptobros 2026 ©</footer>

  <script>
    (function() {
      'use strict';

      // ===== BACKGROUND ROTATION =====
      const desktopBackgrounds = [
        'url("backgrounds/1fon.png")',
        'url("backgrounds/2fon.png")',
        'url("backgrounds/3fon.png")',
        'url("backgrounds/4fon.png")',
        'url("backgrounds/5fon.png")',
        'url("backgrounds/6fon.png")',
        'url("backgrounds/7fon.png")',
        'url("backgrounds/8fon.png")',
        'url("backgrounds/10fon.png")',
        'url("backgrounds/11fon.png")',
        'url("backgrounds/13fon.png")',
        'url("backgrounds/14fon.png")'
      ];
      
      const mobileBackgrounds = [
        'url("backgrounds/1mob.png")',
        'url("backgrounds/2mob.png")'
      ];
      
      // DOM elements
      const bgElement = document.getElementById('dynamicBg');
      const secretArea = document.getElementById('secretArea');
      const creatorBtn = document.getElementById('creatorBtn');
      const languageBtn = document.getElementById('languageBtn');
      const languageMenu = document.getElementById('languageMenu');
      const enterBtn = document.getElementById('enterBtn');
      const footer = document.getElementById('footer');
      
      // State variables
      let currentSet = window.innerWidth <= 768 ? mobileBackgrounds : desktopBackgrounds;
      let currentIndex = 0;
      let rotationInterval;
      let isRotating = false;
      
      // Check if critical elements exist
      if (!bgElement) {
        console.error('Background element not found');
        return;
      }

      // ===== BACKGROUND FUNCTIONS =====
      function rotateBackground() {
        // Prevent multiple simultaneous rotations
        if (isRotating) return;
        
        if (!bgElement || !currentSet || currentSet.length === 0) {
          console.warn('No backgrounds available');
          return;
        }
        
        isRotating = true;
        
        const img = new Image();
        const imgUrl = currentSet[currentIndex].replace('url("', '').replace('")', '');
        
        img.onload = function() {
          bgElement.style.backgroundImage = currentSet[currentIndex];
          currentIndex = (currentIndex + 1) % currentSet.length;
          isRotating = false;
        };
        
        img.onerror = function() {
          console.warn('Background image not found, skipping:', imgUrl);
          currentIndex = (currentIndex + 1) % currentSet.length;
          isRotating = false;
          
          // Try next background after a short delay
          setTimeout(rotateBackground, 100);
        };
        
        img.src = imgUrl;
      }
      
      function updateBackgroundSet() {
        const newSet = window.innerWidth <= 768 ? mobileBackgrounds : desktopBackgrounds;
        
        // Check if set changed
        if (JSON.stringify(currentSet) !== JSON.stringify(newSet)) {
          currentSet = newSet;
          currentIndex = 0;
          
          // Restart rotation
          if (rotationInterval) {
            clearInterval(rotationInterval);
          }
          
          rotateBackground();
          rotationInterval = setInterval(rotateBackground, 15000);
        }
      }

      // ===== LANGUAGE FUNCTIONS =====
      const translations = {
        en: { btn: "ENTER THE CLUB", footer: "Cryptobros 2026 ©" },
        fr: { btn: "ENTRER DANS LE CLUB", footer: "Cryptobros 2026 ©" },
        es: { btn: "ENTRAR AL CLUB", footer: "Cryptobros 2026 ©" },
        pt: { btn: "ENTRAR NO CLUBE", footer: "Cryptobros 2026 ©" },
        zh: { btn: "进入俱乐部", footer: "Cryptobros 2026 ©" },
        ar: { btn: "دخول النادي", footer: "Cryptobros 2026 ©" },
        he: { btn: "כניסה למועדון", footer: "Cryptobros 2026 ©" },
        ru: { btn: "ВОЙТИ В КЛУБ", footer: "Cryptobros 2026 ©" }
      };

      function applyLanguage(lang) {
        try {
          // Validate language
          if (!translations[lang]) {
            console.warn('Unsupported language:', lang);
            lang = 'en';
          }
          
          localStorage.setItem('lang', lang);
          const t = translations[lang];
          
          if (enterBtn) enterBtn.textContent = t.btn;
          if (footer) footer.textContent = t.footer;

          // Update active state in menu
          document.querySelectorAll('.language-option').forEach(opt => {
            const isActive = opt.dataset.lang === lang;
            opt.classList.toggle('active', isActive);
            opt.setAttribute('aria-selected', isActive);
          });
          
          // Update HTML lang attribute
          document.documentElement.lang = lang;
          
        } catch (error) {
          console.warn('Error applying language:', error);
        }
      }

      // ===== SECRET AREA FUNCTIONS =====
      function showCreatorButton() {
        if (!creatorBtn) return;
        
        creatorBtn.classList.add('visible');
        creatorBtn.focus();
        
        // Show toast notification
        const toast = document.createElement('div');
        toast.textContent = '👑 Creator mode unlocked';
        toast.setAttribute('role', 'status');
        toast.setAttribute('aria-live', 'polite');
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: #ffcc00;
          color: #000;
          padding: 10px 20px;
          border-radius: 30px;
          font-family: 'Poppins', 'Montserrat', sans-serif;
          font-weight: bold;
          z-index: 10000;
          box-shadow: 0 0 30px #ffcc00;
          animation: fadeOut 2s forwards;
        `;
        
        document.body.appendChild(toast);
        setTimeout(() => {
          if (toast && toast.parentNode) {
            toast.remove();
          }
        }, 2000);
      }

      // ===== INITIALIZATION =====
      function init() {
        try {
          // Load saved language
          const savedLang = localStorage.getItem('lang') || 'en';
          applyLanguage(savedLang);
        } catch (error) {
          applyLanguage('en');
        }
        
        // Start background rotation
        rotateBackground();
        rotationInterval = setInterval(rotateBackground, 15000);
        
        // Setup event listeners
        setupEventListeners();
      }

      // ===== EVENT LISTENERS =====
      function setupEventListeners() {
        // Secret area detection
        if (secretArea) {
          // Desktop: double click
          secretArea.addEventListener('dblclick', (e) => {
            e.preventDefault();
            showCreatorButton();
          });
          
          // Mobile: double tap
          let lastTap = 0;
          secretArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            if (tapLength < 500 && tapLength > 0) {
              showCreatorButton();
              lastTap = 0;
            } else {
              lastTap = currentTime;
            }
          });
          
          // Keyboard support for accessibility
          secretArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              showCreatorButton();
            }
          });
        }

        // Language menu
        if (languageBtn && languageMenu) {
          languageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const isActive = languageMenu.classList.toggle('active');
            languageBtn.setAttribute('aria-expanded', isActive);
          });

          // Language options
          document.querySelectorAll('.language-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
              e.stopPropagation();
              applyLanguage(opt.dataset.lang);
              languageMenu.classList.remove('active');
              languageBtn.setAttribute('aria-expanded', 'false');
              languageBtn.focus();
            });
            
            // Keyboard support
            opt.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                applyLanguage(opt.dataset.lang);
                languageMenu.classList.remove('active');
                languageBtn.setAttribute('aria-expanded', 'false');
                languageBtn.focus();
              }
            });
          });

          // Close menu when clicking outside
          document.addEventListener('click', (e) => {
            if (!languageBtn.contains(e.target) && !languageMenu.contains(e.target)) {
              languageMenu.classList.remove('active');
              languageBtn.setAttribute('aria-expanded', 'false');
            }
          });

          // Close menu with Escape key
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && languageMenu.classList.contains('active')) {
              languageMenu.classList.remove('active');
              languageBtn.setAttribute('aria-expanded', 'false');
              languageBtn.focus();
            }
          });
        }

        // Navigation
        if (creatorBtn) {
          creatorBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'profile.html';
          });
        }

        if (enterBtn) {
          enterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'rules.html';
          });
        }

        // Window resize with debounce
        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(() => {
            updateBackgroundSet();
          }, 250);
        });

        // Orientation change for mobile
        window.addEventListener('orientationchange', () => {
          setTimeout(updateBackgroundSet, 100);
        });

        // Visibility change - pause rotation when tab is hidden
        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            if (rotationInterval) {
              clearInterval(rotationInterval);
              rotationInterval = null;
            }
          } else {
            if (!rotationInterval) {
              rotateBackground();
              rotationInterval = setInterval(rotateBackground, 15000);
            }
          }
        });
      }

      // Start everything when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

    })();
  </script>
</body>
</html>
