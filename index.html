<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS</title>

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000;
      --gradient-start: #00052a;
      --gradient-end: #001133;
      --text-color: #e0f7ff;
      --accent: #00ff9d;
      --accent-glow: rgba(0,255,157,0.7);
      --btn-gradient: linear-gradient(45deg, #003366, #005580);
      --btn-hover: #0066cc;
      --btn-shadow: rgba(0, 85, 128, 0.8);
    }

    [data-theme="light"] {
      --bg-color: #f0f4ff;
      --gradient-start: #e0eaff;
      --gradient-end: #d0e0ff;
      --text-color: #0a0c1f;
      --accent: #0066cc;
      --accent-glow: rgba(0,102,204,0.5);
      --btn-gradient: linear-gradient(45deg, #66aaff, #88ccff);
      --btn-hover: #0055aa;
      --btn-shadow: rgba(102,170,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      color: var(--text-color);
      font-family: 'Quicksand', sans-serif;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, var(--gradient-start), var(--gradient-end)),
                  url('./logo.jpg') center/cover no-repeat;
      z-index: -1;
      filter: brightness(0.9);
      transition: filter 0.4s ease;
    }

    [data-theme="light"] .bg {
      filter: brightness(1.05);
    }

    .content {
      text-align: center;
      z-index: 1;
      padding: 0 20px;
    }

    .btn {
      background: var(--btn-gradient);
      color: white;
      border: none;
      padding: 1.4rem 3.6rem;
      font-size: 1.45rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 25px var(--btn-shadow);
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 35px var(--btn-hover);
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-weight: 700;
      animation: colorChange 45s infinite;
    }

    @keyframes colorChange {
      0%, 15% { color: var(--accent); }
      20%, 35% { color: #ff00ff; }
      40%, 55% { color: #00ffff; }
      60%, 75% { color: #ff9d00; }
      80%, 95% { color: #9d00ff; }
      100% { color: var(--accent); }
    }

    /* Theme toggle button */
    .theme-toggle {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* Language switcher (оставил как было, но без лишнего) */
    .language-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(45deg, #66ffff, #00ff9d);
      color: #000;
      border: none;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(102, 255, 255, 0.6);
      z-index: 100;
      transition: all 0.3s ease;
    }
    .language-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #66ffff;
    }
    .language-menu {
      position: absolute;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.92);
      border-radius: 10px;
      padding: 10px 0;
      display: none;
      z-index: 101;
      box-shadow: 0 0 20px rgba(102, 255, 255, 0.8);
      min-width: 180px;
    }
    .language-menu.active { display: block; }
    .language-option {
      padding: 12px 25px;
      color: #00ff9d;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .language-option:hover {
      background: rgba(102, 255, 255, 0.2);
      color: white;
    }
    .language-option.active {
      background: rgba(102, 255, 255, 0.3);
      color: white;
    }

    body[dir="rtl"] .language-btn { right: auto; left: 20px; }
    body[dir="rtl"] .language-menu { right: auto; left: 20px; }
    body[dir="rtl"] .language-option { text-align: left; }

    @media (max-width: 600px) {
      .language-btn, .theme-toggle { top: 12px; padding: 0.6rem 1.2rem; font-size: 0.9rem; }
      .btn { padding: 1rem 2.8rem; font-size: 1.3rem; margin-bottom: 60px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">🌙</button>

  <!-- Language Button and Menu -->
  <button class="language-btn" id="languageBtn" aria-label="Select language" aria-expanded="false">LANGUAGE</button>
  <div class="language-menu" id="languageMenu">
    <div class="language-option active" data-lang="en">English</div>
    <div class="language-option" data-lang="ru">Русский</div>
    <!-- Добавь остальные языки по желанию -->
  </div>

  <!-- Main Button -->
  <a href="payment.html" class="btn" id="enterBtn">Enter the Club</a>

  <footer id="footer">Cryptobros 2026 ©</footer>

  <script>
    // === TRANSLATIONS ===
    const translations = {
      en: { btn: "Enter the Club", footer: "Cryptobros 2026 ©" },
      ru: { btn: "Войти в Клуб", footer: "Cryptobros 2026 ©" }
      // добавь другие языки, если нужно
    };

    // === THEME HANDLING ===
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');

    function setTheme(theme) {
      htmlEl.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
    }

    // Load saved theme or system preference
    const savedTheme = localStorage.getItem('theme') ||
                       (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    setTheme(savedTheme);

    themeBtn.addEventListener('click', () => {
      const newTheme = htmlEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // === LANGUAGE HANDLING ===
    function applyLanguage(lang) {
      try {
        localStorage.setItem('lang', lang);
      } catch (e) {}

      const t = translations[lang] || translations.en;

      document.getElementById('enterBtn').textContent = t.btn;
      document.getElementById('footer').textContent = t.footer;

      document.querySelectorAll('.language-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.lang === lang);
      });

      document.querySelector('#languageBtn').setAttribute('aria-expanded', 'false');

      document.body.setAttribute('dir', (lang === 'ar' || lang === 'he') ? 'rtl' : '');
      document.documentElement.lang = lang;
    }

    // INIT LANGUAGE
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('lang') || 'en';
      applyLanguage(savedLang);
    });

    // Language Events
    const languageBtn = document.getElementById('languageBtn');
    const languageMenu = document.getElementById('languageMenu');

    languageBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = languageMenu.classList.toggle('active');
      languageBtn.setAttribute('aria-expanded', isOpen);
    });

    document.querySelectorAll('.language-option').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLanguage(opt.dataset.lang);
        languageMenu.classList.remove('active');
        languageBtn.setAttribute('aria-expanded', 'false');
      });
    });

    document.addEventListener('click', (e) => {
      if (!languageBtn.contains(e.target) && !languageMenu.contains(e.target)) {
        languageMenu.classList.remove('active');
        languageBtn.setAttribute('aria-expanded', 'false');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && languageMenu.classList.contains('active')) {
        languageMenu.classList.remove('active');
        languageBtn.setAttribute('aria-expanded', 'false');
      }
    });

    languageMenu.addEventListener('click', e => e.stopPropagation());
  </script>
</body>
</html>
