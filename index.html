<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS</title>

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000;
      --gradient-start: #00052a;
      --gradient-end: #001133;
      --text-color: #e0f7ff;
      --accent: #00ff9d;
      --accent-glow: rgba(0,255,157,0.7);
      --btn-gradient: linear-gradient(45deg, #003366, #005580);
      --btn-hover: #0066cc;
      --btn-shadow: rgba(0, 85, 128, 0.8);
    }

    [data-theme="light"] {
      --bg-color: #f0f4ff;
      --gradient-start: #e0eaff;
      --gradient-end: #d0e0ff;
      --text-color: #0a0c1f;
      --accent: #0066cc;
      --accent-glow: rgba(0,102,204,0.5);
      --btn-gradient: linear-gradient(45deg, #66aaff, #88ccff);
      --btn-hover: #0055aa;
      --btn-shadow: rgba(102,170,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      color: var(--text-color);
      font-family: 'Quicksand', sans-serif;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, var(--gradient-start), var(--gradient-end)),
                  url('./logo.jpg') center/cover no-repeat;
      z-index: -1;
      filter: brightness(0.9);
      transition: filter 0.4s ease;
    }

    [data-theme="light"] .bg {
      filter: brightness(1.05);
    }

    h1 {
      color: var(--accent);
      font-size: clamp(4rem, 12vw, 8rem);
      margin: 0 0 4rem;
      text-shadow: 0 0 40px var(--accent-glow);
      letter-spacing: 2px;
    }

    .btn-container {
      margin-top: auto;
      padding-bottom: 100px;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .btn {
      background: var(--btn-gradient);
      color: white;
      border: none;
      padding: 1.6rem 4.5rem;
      font-size: 1.8rem;
      font-weight: bold;
      border-radius: 16px;
      cursor: pointer;
      letter-spacing: 1.5px;
      box-shadow: 0 0 30px var(--btn-shadow);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 45px var(--btn-hover);
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-weight: 700;
      animation: colorChange 45s infinite;
    }

    @keyframes colorChange {
      0%, 15% { color: var(--accent); }
      20%, 35% { color: #ff00ff; }
      40%, 55% { color: #00ffff; }
      60%, 75% { color: #ff9d00; }
      80%, 95% { color: #9d00ff; }
      100% { color: var(--accent); }
    }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* Language (оставил минимум, можно расширить) */
    .language-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(45deg, #66ffff, #00ff9d);
      color: #000;
      border: none;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(102, 255, 255, 0.6);
      z-index: 100;
      transition: all 0.3s ease;
    }
    .language-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #66ffff;
    }

    @media (max-width: 600px) {
      h1 { font-size: clamp(3rem, 15vw, 5rem); margin-bottom: 3rem; }
      .btn { padding: 1.2rem 3rem; font-size: 1.4rem; }
      .theme-toggle, .language-btn { top: 12px; padding: 0.6rem 1rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">🌙</button>

  <!-- Language Button -->
  <button class="language-btn" id="languageBtn" aria-label="Select language" aria-expanded="false">LANGUAGE</button>

  <div class="content">
    <h1>CRYPTOBROS</h1>
    <div class="btn-container">
      <a href="payment.html" class="btn" id="enterBtn">Enter the Club</a>
    </div>
  </div>

  <footer id="footer">Cryptobros 2026 ©</footer>

  <script>
    // === THEME HANDLING (влияет на все страницы) ===
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');

    function setTheme(theme) {
      htmlEl.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
    }

    const savedTheme = localStorage.getItem('theme') ||
                       (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    setTheme(savedTheme);

    themeBtn.addEventListener('click', () => {
      const newTheme = htmlEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // === LANGUAGE (минимум, можно расширить) ===
    const translations = {
      en: { btn: "Enter the Club", footer: "Cryptobros 2026 ©" },
      ru: { btn: "Войти в Клуб", footer: "Cryptobros 2026 ©" }
    };

    function applyLanguage(lang) {
      try { localStorage.setItem('lang', lang); } catch (e) {}
      const t = translations[lang] || translations.en;

      document.getElementById('enterBtn').textContent = t.btn;
      document.getElementById('footer').textContent = t.footer;

      document.querySelector('#languageBtn').setAttribute('aria-expanded', 'false');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('lang') || 'en';
      applyLanguage(savedLang);
    });

    // Language toggle (упрощённый)
    const languageBtn = document.getElementById('languageBtn');
    languageBtn.addEventListener('click', () => {
      const current = localStorage.getItem('lang') || 'en';
      const next = current === 'en' ? 'ru' : 'en';
      applyLanguage(next);
    });
  </script>
</body>
</html>
