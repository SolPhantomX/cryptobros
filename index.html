<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRYPTOBROS TRIBUNAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght:500;700;900&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #000814;
      color: #e0f7ff;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Full screen background SVG */
    .background-svg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    
    .background-svg svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Content overlay */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: rgba(0, 8, 20, 0.65);
      backdrop-filter: blur(2px);
    }
    
    /* Full screen logo (text) */
    .logo-fullscreen {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 15vw, 8rem);
      font-weight: 900;
      text-align: center;
      color: #00ffea;
      text-shadow: 
        0 0 30px #00ffea,
        0 0 60px #00aaff,
        0 0 90px #0066ff;
      margin-bottom: 2rem;
      letter-spacing: 4px;
      animation: glowPulse 3s ease-in-out infinite alternate;
      line-height: 1.1;
      max-width: 1200px;
      word-break: break-word;
    }
    
    @keyframes glowPulse {
      0% {
        text-shadow: 
          0 0 30px #00ffea,
          0 0 60px #00aaff,
          0 0 90px #0066ff;
        opacity: 0.9;
      }
      100% {
        text-shadow: 
          0 0 50px #00ffea,
          0 0 100px #00aaff,
          0 0 150px #0066ff,
          0 0 200px #0044ff;
        opacity: 1;
      }
    }
    
    /* Enter button */
    .enter-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      padding: 20px 60px;
      background: linear-gradient(135deg, #00ff9d, #00aaff);
      border: none;
      border-radius: 60px;
      color: #000814;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 4px;
      box-shadow: 
        0 0 30px rgba(0, 255, 157, 0.5),
        0 0 60px rgba(0, 170, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.2);
      margin-top: 2rem;
      animation: buttonPulse 2s ease-in-out infinite;
    }
    
    .enter-btn:hover {
      transform: scale(1.1);
      box-shadow: 
        0 0 50px #00ff9d,
        0 0 100px #00aaff;
      background: linear-gradient(135deg, #00ffb3, #00ccff);
    }
    
    @keyframes buttonPulse {
      0% { opacity: 0.9; }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.9; }
    }
    
    /* Subtle hint text */
    .hint {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.5;
      letter-spacing: 2px;
      color: #88aaff;
    }
  </style>
</head>
<body>
  <!-- Full screen SVG background (embedded) -->
  <div class="background-svg">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="g1" cx="20%" cy="30%">
          <stop offset="0%" stop-color="#003388"/>
          <stop offset="70%" stop-color="#000033"/>
        </radialGradient>
        <radialGradient id="g2" cx="80%" cy="70%">
          <stop offset="0%" stop-color="#880044"/>
          <stop offset="70%" stop-color="#000033"/>
        </radialGradient>
      </defs>
      <rect width="100%" height="100%" fill="#000814"/>
      <g opacity="0.18">
        <circle cx="300" cy="400" r="700" fill="url(#g1)"/>
        <circle cx="1400" cy="700" r="900" fill="url(#g2)"/>
      </g>
      <g stroke="#00ff9d" stroke-width="0.8" opacity="0.5" fill="none">
        <path d="M0,300 Q480,200 960,450 T1920,300"/>
        <path d="M0,500 Q480,600 960,350 T1920,500"/>
        <path d="M0,700 Q480,600 960,800 T1920,700"/>
      </g>
      <g stroke="#66ffff" stroke-width="0.6" opacity="0.4" fill="none">
        <circle cx="960" cy="540" r="450"/>
        <circle cx="960" cy="540" r="700"/>
      </g>
      <g fill="#00ff9d" opacity="0.8">
        <circle cx="400" cy="300" r="5"/>
        <circle cx="1500" cy="750" r="7"/>
        <circle cx="800" cy="850" r="4"/>
      </g>
    </svg>
  </div>
  
  <!-- Content overlay with logo and button -->
  <div class="content">
    <div class="logo-fullscreen">CRYPTOBROS<br>TRIBUNAL</div>
    <button class="enter-btn" onclick="enterClub()">ENTER THE CLUB</button>
    <div class="hint">⚡ DECENTRALIZED · 0% FEES · COMMUNITY ⚡</div>
  </div>

  <script>
    function enterClub() {
      // Redirect to main app or show coming soon
      window.location.href = 'https://cryptobros.pro';
      
      // For demo/development, you can use this:
      // alert('Welcome to the Club! Opening Tribunal...');
      // window.location.href = 'tribunal.html';
    }
  </script>
</body>
</html>
