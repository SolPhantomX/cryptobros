<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRYPTOBROS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
    }

    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      transition: background-image 1.5s ease-in-out;
      filter: brightness(0.9);
    }

    /* Language button - PLATINUM */
    .language-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(145deg, #e5e7eb, #d1d5db, #c0c5cc);
      color: #1f2937;
      border: 2px solid #9ca3b0;
      padding: 0.8rem 1.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(209, 213, 219, 0.7);
      z-index: 100;
      transition: all 0.3s ease;
    }
    .language-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(229, 231, 235, 0.9);
      background: linear-gradient(145deg, #d1d5db, #e5e7eb, #c0c5cc);
      border-color: #6b7280;
    }

    /* ENTER button - GOLD */
    .enter-btn {
      position: absolute;
      top: 90px;
      right: 20px;
      background: linear-gradient(145deg, #f5e6b0, #e6c87c, #d4af37);
      color: #5c3e0b;
      border: 2px solid #c9a53b;
      padding: 0.8rem 2.2rem;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(245, 230, 176, 0.7);
      z-index: 100;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .enter-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(255, 215, 0, 0.9);
      background: linear-gradient(145deg, #e6c87c, #f5e6b0, #e6c87c);
      border-color: #b8860b;
    }
    
    /* Creator button */
    .creator-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 204, 0, 0.9);
      color: #000;
      border: 2px solid #ffcc00;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 100;
      display: none;
    }
    .creator-btn:hover {
      transform: scale(1.05);
      background: #ffcc00;
    }
    .creator-btn.visible {
      display: block;
    }

    .language-menu {
      position: absolute;
      top: 60px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 10px;
      padding: 10px 0;
      display: none;
      z-index: 101;
      box-shadow: 0 0 20px rgba(102, 255, 255, 0.8);
      min-width: 180px;
    }
    .language-menu.active {
      display: block;
    }
    .language-option {
      padding: 12px 25px;
      color: #00ff9d;
      font-family: 'Montserrat', 'Poppins', 'Quicksand', Arial, sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: right;
    }
    .language-option:hover {
      background: rgba(102, 255, 255, 0.2);
      color: #fff;
    }
    .language-option.active {
      background: rgba(102, 255, 255, 0.3);
      color: #fff;
    }
    
    footer {
      width: 100%;
      text-align: center;
      font-family: 'Poppins', 'Montserrat', 'Quicksand', Arial, sans-serif;
      font-weight: 600;
      padding: 20px 0;
      animation: colorChange 15s infinite;
      background: transparent;
      position: absolute;
      bottom: 0;
    }
    
    @keyframes colorChange {
      0% { color: #00ff9d; }
      16.67% { color: #ff00ff; }
      33.33% { color: #00ffff; }
      50% { color: #ff9d00; }
      66.67% { color: #9d00ff; }
      83.33% { color: #ffff00; }
      100% { color: #00ff9d; }
    }

    /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
    @media (max-width: 768px) {
      .language-btn {
        top: 60px;
        right: 50%;
        transform: translateX(50%);
        padding: 1.2rem 3rem;
        font-size: 1.5rem;
        width: 80%;
        max-width: 350px;
        text-align: center;
      }
      
      .enter-btn {
        top: 160px;
        right: 50%;
        transform: translateX(50%);
        padding: 1.2rem 3rem;
        font-size: 1.6rem;
        width: 80%;
        max-width: 350px;
        text-align: center;
      }
      
      .creator-btn {
        top: auto;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        padding: 1.2rem 2.5rem;
        font-size: 1.3rem;
        width: 70%;
        max-width: 300px;
        text-align: center;
      }
      
      .language-menu {
        top: 140px;
        right: 50%;
        transform: translateX(50%);
        width: 80%;
        max-width: 350px;
      }
      
      .language-option {
        padding: 18px 25px;
        font-size: 1.3rem;
        text-align: center;
      }
      
      #secretArea {
        width: 150px;
        height: 150px;
      }
    }

    /* Для очень маленьких экранов */
    @media (max-width: 480px) {
      .language-btn {
        top: 40px;
        padding: 1rem 2rem;
        font-size: 1.3rem;
      }
      
      .enter-btn {
        top: 130px;
        padding: 1rem 2rem;
        font-size: 1.4rem;
      }
      
      .creator-btn {
        bottom: 80px;
        padding: 1rem 2rem;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg" id="dynamicBg"></div>

  <!-- Secret double-click area (larger on mobile) -->
  <div style="position: fixed; bottom: 0; left: 0; width: 100px; height: 100px; background: transparent; z-index: 9999; cursor: pointer;" id="secretArea"></div>

  <!-- Creator button -->
  <button class="creator-btn" id="creatorBtn">👤 CREATOR LOGIN</button>

  <!-- LANGUAGE button -->
  <button type="button" class="language-btn" id="languageBtn">LANGUAGE</button>
  
  <!-- ENTER button -->
  <a href="#" class="enter-btn" id="enterBtn">ENTER THE CLUB</a>

  <div class="language-menu" id="languageMenu">
    <div class="language-option active" data-lang="en">English</div>
    <div class="language-option" data-lang="fr">Français</div>
    <div class="language-option" data-lang="es">Español</div>
    <div class="language-option" data-lang="pt">Português</div>
    <div class="language-option" data-lang="zh">简体中文</div>
    <div class="language-option" data-lang="ar">العربية</div>
    <div class="language-option" data-lang="he">עברית</div>
    <div class="language-option" data-lang="ru">Русский</div>
  </div>

  <footer id="footer">Cryptobros 2026 ©</footer>

  <script>
    // ===== BACKGROUND ROTATION =====
    (function() {
        const backgrounds = [
            'url("backgrounds/1fon.png")',
            'url("backgrounds/2fon.png")',
            'url("backgrounds/3fon.png")',
            'url("backgrounds/4fon.png")',
            'url("backgrounds/5fon.png")',
            'url("backgrounds/6fon.png")',
            'url("backgrounds/7fon.png")',
            'url("backgrounds/8fon.png")'
        ];
        
        let currentIndex = 0;
        const bgElement = document.getElementById('dynamicBg');
        
        function rotateBackground() {
            bgElement.style.backgroundImage = backgrounds[currentIndex];
            currentIndex = (currentIndex + 1) % backgrounds.length;
        }
        
        rotateBackground();
        setInterval(rotateBackground, 15000);
    })();

    // ===== TRANSLATIONS =====
    const translations = {
      en: { btn: "ENTER THE CLUB", footer: "Cryptobros 2026 ©" },
      fr: { btn: "ENTRER DANS LE CLUB", footer: "Cryptobros 2026 ©" },
      es: { btn: "ENTRAR AL CLUB", footer: "Cryptobros 2026 ©" },
      pt: { btn: "ENTRAR NO CLUBE", footer: "Cryptobros 2026 ©" },
      zh: { btn: "进入俱乐部", footer: "Cryptobros 2026 ©" },
      ar: { btn: "دخول النادي", footer: "Cryptobros 2026 ©" },
      he: { btn: "כניסה למועדון", footer: "Cryptobros 2026 ©" },
      ru: { btn: "ВОЙТИ В КЛУБ", footer: "Cryptobros 2026 ©" }
    };

    function applyLanguage(lang) {
      localStorage.setItem('lang', lang);
      const t = translations[lang] || translations.en;
      document.getElementById('enterBtn').textContent = t.btn;
      document.getElementById('footer').textContent = t.footer;

      document.querySelectorAll('.language-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.lang === lang);
      });
    }

    // ===== SECRET AREA =====
    document.getElementById('secretArea').addEventListener('dblclick', function() {
      document.getElementById('creatorBtn').classList.add('visible');
      
      const toast = document.createElement('div');
      toast.textContent = '👑 Creator mode unlocked';
      toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #ffcc00;
        color: #000;
        padding: 10px 20px;
        border-radius: 30px;
        font-family: 'Poppins', 'Montserrat', sans-serif;
        font-weight: bold;
        z-index: 10000;
        box-shadow: 0 0 30px #ffcc00;
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    });

    document.getElementById('creatorBtn').addEventListener('click', function() {
      window.location.href = 'profile.html';
    });

    document.getElementById('enterBtn').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'rules.html';
    });

    // ===== LANGUAGE MENU =====
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('lang') || 'en';
      applyLanguage(savedLang);
    });

    const languageBtn = document.getElementById('languageBtn');
    const languageMenu = document.getElementById('languageMenu');

    languageBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      languageMenu.classList.toggle('active');
    });

    document.querySelectorAll('.language-option').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLanguage(opt.dataset.lang);
        languageMenu.classList.remove('active');
      });
    });

    document.addEventListener('click', (e) => {
      if (!languageBtn.contains(e.target) && !languageMenu.contains(e.target)) {
        languageMenu.classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && languageMenu.classList.contains('active')) {
        languageMenu.classList.remove('active');
      }
    });
  </script>
</body>
</html>
