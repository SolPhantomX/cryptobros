<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY ADMIN - CryptoBros Merch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; position: relative; }
        .back-btn {
            position: absolute; left: 0; top: 30px;
            background: transparent; border: 2px solid #ffd700;
            color: #ffd700; padding: 10px 25px; border-radius: 25px;
            text-decoration: none; font-weight: bold;
        }
        .back-btn:hover { background: #ffd700; color: #000; }
        h1 {
            font-size: 4rem; color: #d946ef; text-transform: uppercase;
            margin-bottom: 20px; text-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
        }
        .subtitle-1 {
            font-size: 2rem; color: #ff6600; margin-bottom: 10px;
            text-transform: uppercase; font-weight: bold;
        }
        .subtitle-2 {
            font-size: 1.3rem; color: #00ff00;
            text-transform: uppercase; font-weight: bold;
        }
        .slots-header {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 30px 0; padding: 20px;
            border-bottom: 3px solid #ffd700;
        }
        .slots-title {
            font-size: 2.5rem; color: #ffd700;
            font-weight: bold; text-transform: uppercase;
        }
        .upload-section {
            text-align: center; margin: 30px 0; padding: 20px;
            background: #111; border-radius: 15px;
            border: 2px solid #ffd700;
        }
        .upload-btn, .generate-btn {
            display: inline-block; background: linear-gradient(135deg, #d946ef, #ff6600);
            color: white; padding: 15px 40px; border-radius: 30px;
            cursor: pointer; font-weight: bold; font-size: 1.2rem;
            margin: 10px; border: none;
        }
        .upload-btn:hover, .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(217, 70, 239, 0.4);
        }
        .generate-btn {
            background: linear-gradient(135deg, #00ff00, #00aa00);
            color: #000;
        }
        #fileInput { display: none; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-top: 30px;
        }
        .slot {
            aspect-ratio: 1; background: #1a1a1a;
            border: 3px solid #333; border-radius: 15px;
            position: relative; overflow: hidden;
        }
        .slot:hover {
            border-color: #ffd700; transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        .slot-number {
            position: absolute; top: 10px; left: 10px;
            background: #ffd700; color: #000;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; z-index: 10;
        }
        .slot-image {
            width: 100%; height: 100%; object-fit: cover;
            cursor: pointer;
        }
        .slot-placeholder {
            color: #666; font-size: 3rem; opacity: 0.3;
        }
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-image {
            max-width: 90%; max-height: 90vh;
            object-fit: contain; border-radius: 10px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 40px;
            color: #ffd700; font-size: 40px; cursor: pointer;
        }
        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 3rem; }
        }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://www.cryptobros.pro/merch.html" class="back-btn">← BACK</a>
            <h1>GALLERY ADMIN</h1>
            <div class="subtitle-1">REAL ONES WEAR MERCH</div>
            <div class="subtitle-2">FAKES FEAR THE TRUTH</div>
        </div>
        <div class="slots-header">
            <span>⚡</span>
            <span class="slots-title">SLOTS 1-20</span>
            <span>⚡</span>
        </div>
        <div class="upload-section">
            <label for="fileInput" class="upload-btn">📤 UPLOAD IMAGES (PNG)</label>
            <input type="file" id="fileInput" accept="image/png" multiple>
            <br><br>
            <button class="generate-btn" onclick="generateStaticHTML()">📥 GENERATE STATIC HTML</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
    <div id="modal" class="modal" onclick="closeModal(event)">
        <span class="modal-close">&times;</span>
        <img id="modalImage" class="modal-image" src="">
    </div>
    <script>
        let uploadedImages = new Array(20).fill(null);

        function generateSlots() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                const number = document.createElement('div');
                number.className = 'slot-number';
                number.textContent = i + 1;
                const placeholder = document.createElement('div');
                placeholder.className = 'slot-placeholder';
                placeholder.innerHTML = '📷';
                placeholder.id = 'placeholder-' + i;
                slot.appendChild(number);
                slot.appendChild(placeholder);
                slot.onclick = () => openImage(i);
                grid.appendChild(slot);
            }
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            const emptySlots = [];
            for (let i = 0; i < 20; i++) {
                if (uploadedImages[i] === null) emptySlots.push(i);
            }
            if (emptySlots.length === 0) {
                alert('All slots filled!');
                return;
            }
            let count = 0;
            for (let i = 0; i < Math.min(files.length, emptySlots.length); i++) {
                const file = files[i];
                if (file.type !== 'image/png') continue;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const slotIndex = emptySlots[count];
                    uploadedImages[slotIndex] = e.target.result;
                    const slot = document.getElementById('galleryGrid').children[slotIndex];
                    const placeholder = document.getElementById('placeholder-' + slotIndex);
                    if (placeholder) placeholder.style.display = 'none';
                    let img = slot.querySelector('.slot-image');
                    if (!img) {
                        img = document.createElement('img');
                        img.className = 'slot-image';
                        slot.appendChild(img);
                    }
                    img.src = e.target.result;
                    count++;
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        function openImage(index) {
            if (uploadedImages[index]) {
                document.getElementById('modalImage').src = uploadedImages[index];
                document.getElementById('modal').classList.add('active');
            }
        }

        function closeModal(e) {
            if (!e || e.target.id === 'modal' || e.target.className === 'modal-close') {
                document.getElementById('modal').classList.remove('active');
            }
        }

        function generateStaticHTML() {
            const count = uploadedImages.filter(img => img !== null).length;
            if (count === 0) {
                alert('Upload images first!');
                return;
            }
            if (!confirm('Generate HTML with ' + count + ' images?')) return;
            
            const html = `<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

.back-btn:hover{background:#ffd700;color:#000}
h1{font-size:4rem;color:#d946ef;text-transform:uppercase;margin-bottom:20px;text-shadow:0 0 20px rgba(217,70,239,0.5)}
.subtitle-1{font-size:2rem;color:#ff6600;margin-bottom:10px;text-transform:uppercase;font-weight:bold}
.subtitle-2{font-size:1.3rem;color:#0f0;text-transform:uppercase;font-weight:bold}
.slots-header{display:flex;align-items:center;justify-content:center;gap:15px;margin:30px 0;padding:20px;border-bottom:3px solid #ffd700}

.slot:hover{border-color:#ffd700;transform:translateY(-5px);box-shadow:0 10px 30px rgba(255,215,0,0.2)}
.slot-number{position:absolute;top:10px;left:10px;background:#ffd700;color:#000;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;z-index:10}

.slot.empty{opacity:.3;background:#0a0a0a}

@media(max-width:1024px){.gallery-grid{grid-template-columns:repeat(2,1fr)}h1{font-size:3rem}}

</style>
</head>
<body>
<div class="container">
<div class="header">
<a href="https://www.cryptobros.pro/merch.html" class="back-btn">← BACK</a>
<h1>GALLERY</h1>
<div class="subtitle-1">REAL ONES WEAR MERCH</div>
<div class="subtitle-2">FAKES FEAR THE TRUTH</div>
</div>
<div class="slots-header">
<span>⚡</span>
<span class="slots-title">SLOTS 1-20</span>
<span>⚡</span>
</div>
<div class="gallery-grid">
${uploadedImages.map((img, i) => img ? 
`<div class="slot"><div class="slot-number">${i+1}</div><img class="slot-image" src="${img}" id="img-${i}" onclick="openModal(${i})"></div>` : 
`<div class="slot empty"><div class="slot-number">${i+1}</div></div>`).join('')}
</div>
</div>
<div id="modal" class="modal" onclick="closeModal(event)">
<span class="modal-close">&times;</span>

</div>
<script>
function openModal(i){document.getElementById('modalImage').src=document.getElementById('img-'+i).src;document.getElementById('modal').classList.add('active')}
function closeModal(e){if(!e||e.target.id==='modal'||e.target.className==='modal-close'){document.getElementById('modal').classList.remove('active')}}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal()}});
<\/script>
</body>
</html>`;
            
            const blob = new Blob([html], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cryptobros-gallery.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('✅ Downloaded! Upload to server as gallery.html');
        }

        generateSlots();
    </script>
</body>
</html>
