<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — MERCH</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000;
      color: #ffcc00;
      height: 100vh;
      overflow: hidden;
    }

    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&family=Russo+One&display=swap');

    /* Back button */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,204,0,0.3);
    }

    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px);
      box-shadow: 0 15px 40px rgba(255,204,0,0.5);
    }

    /* Gallery button */
    .gallery-button {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,204,0,0.3);
    }

    .gallery-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(255,204,0,0.5);
    }

    /* Secret area for creator mode */
    #secret-area {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 60px;
      height: 60px;
      background: transparent;
      cursor: pointer;
      z-index: 9999;
    }

    /* Creator button (hidden by default) */
    .creator-btn {
      position: fixed;
      bottom: 100px;
      left: 20px;
      z-index: 1000;
      background: #ffcc00;
      color: #000;
      border: 2px solid #fff;
      border-radius: 60px;
      padding: 12px 24px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ffcc00;
      display: none;
    }
    .creator-btn.visible {
      display: block;
    }

    /* Text block */
    .text-block {
      position: fixed;
      top: 140px;
      left: 30px;
      z-index: 1000;
      max-width: 900px;
      pointer-events: none;
    }

    .main-title {
      font-family: 'Russo One', 'Bebas Neue', sans-serif;
      font-size: 6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.8), 0 0 40px currentColor;
      margin-bottom: 25px;
      line-height: 1;
      transition: color 0.5s ease;
      color: #ffcc00;
    }

    .slogan {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 300;
      max-width: 800px;
      line-height: 1.5;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.8);
      transition: color 0.5s ease;
      color: #ffffff;
    }

    /* Image */
    .image-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 35%, transparent 70%);
      z-index: 2;
      pointer-events: none;
    }

    /* Upload section (creator only) */
    .upload-section {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 1000;
      display: none;
    }
    .upload-section.visible {
      display: block;
    }

    .upload-btn {
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .upload-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(255,204,0,0.4);
    }

    .hidden-input {
      display: none;
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 2px solid #00ff9d;
      color: #00ff9d;
      padding: 15px 30px;
      border-radius: 60px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      z-index: 10000;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 30px #00ff9d;
    }
    @keyframes slideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Back button -->
  <a href="javascript:history.back()" class="back-button">
    <span>←</span>
    <span>BACK</span>
  </a>

  <!-- Gallery button -->
  <a href="gallery.html" class="gallery-button">
    <span>🎨</span>
    <span>DESIGN GALLERY</span>
  </a>

  <!-- Secret area for double-click -->
  <div id="secret-area"></div>

  <!-- Creator button (appears after double-click) -->
  <button class="creator-btn" id="creatorBtn">👑 CREATOR PANEL</button>

  <!-- Text block -->
  <div class="text-block">
    <div class="main-title" id="changingTitle">TRIBUNAL GEAR</div>
    <div class="slogan" id="changingSlogan">Real ones wear the merch. Fake ones fear the truth.</div>
  </div>

  <!-- Image -->
  <div class="image-container">
    <img id="mainImage" src="merch-bg.jpg" alt="CRYPTOBROS Merch">
  </div>
  <div class="overlay"></div>

  <!-- Upload section (hidden by default) -->
  <div class="upload-section" id="uploadSection">
    <input type="file" id="bgUpload" class="hidden-input" accept="image/*">
    <button class="upload-btn" onclick="document.getElementById('bgUpload').click()">
      📸 CHANGE BACKGROUND
    </button>
  </div>

  <script>
    (function() {
      // ===== YOUR PAYMENT WALLET FOR MERCH =====
      const PAYMENT_WALLET = "7VCogQuuv2FFurqZu2kegkgGPH6itevv6o4tD4JPYQyr";
      
      // Creator mode state
      let isCreator = false;

      // Titles and slogans
      const titles = [
        "TRIBUNAL GEAR",
        "HONEST CREW ARMOR",
        "CRYPTOBROS BLACKLIST PROOF",
        "VERDICT THREADS",
        "UNCENSORABLE THREADS"
      ];

      const slogans = [
        "Real ones wear the merch. Fake ones fear the truth. Suit up – show the world you're built different. Family pack recommended.",
        "CRYPTOBROS Merch – not just clothes, it's a statement. Wear it loud, wear it proud. Only honest degens qualify. Buy for the squad.",
        "Wear the merch. Let them know you're untouchable. Honest crypto fam only. One shirt today = whole crew tomorrow. Stack the squad.",
        "CRYPTOBROS Merch: Proof you're not a rug-puller. Wear it, spread it, own it. Real enthusiasts gear up the whole circle. No fakes allowed.",
        "Don't just HODL — SHOW it. CRYPTOBROS Merch for the fearless. Honest only. Buy for you, your wife, your mates, your kids. Let the world see the tribe."
      ];

      const colors = [
        '#ffcc00', '#ff3366', '#33ccff', '#aa66ff', '#00ffaa', '#ff8800', '#ff00ff', '#66ff66'
      ];

      // DOM elements
      const titleEl = document.getElementById('changingTitle');
      const sloganEl = document.getElementById('changingSlogan');
      const mainImage = document.getElementById('mainImage');
      const secretArea = document.getElementById('secret-area');
      const creatorBtn = document.getElementById('creatorBtn');
      const uploadSection = document.getElementById('uploadSection');

      // ===== SECRET DOUBLE-CLICK ACTIVATION =====
      secretArea.addEventListener('dblclick', () => {
        isCreator = true;
        creatorBtn.classList.add('visible');
        uploadSection.classList.add('visible');
        showToast('👑 Creator mode activated', '#ffcc00');
      });

      // ===== CREATOR BUTTON CLICK =====
      creatorBtn.addEventListener('click', () => {
        // Show creator menu or go to admin page
        alert('Creator options:\n- Upload images\n- Manage orders\n- View payments to: ' + PAYMENT_WALLET);
      });

      // ===== IMAGE UPLOAD (creator only) =====
      document.getElementById('bgUpload').addEventListener('change', function(e) {
        if (!isCreator) {
          showToast('❌ Creator mode only', '#ff3366');
          return;
        }

        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
            mainImage.src = event.target.result;
            localStorage.setItem('merchBackground', event.target.result);
            showToast('✅ Background updated', '#00ff9d');
          };
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      });

      // Load saved background
      const savedImage = localStorage.getItem('merchBackground');
      if (savedImage) {
        mainImage.src = savedImage;
      }

      // ===== TITLE/SLOGAN ROTATION =====
      setInterval(() => {
        titleEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      }, 10000);

      setInterval(() => {
        sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      }, 10000);

      let titleIndex = 0;
      setInterval(() => {
        titleIndex = (titleIndex + 1) % titles.length;
        titleEl.textContent = titles[titleIndex];
      }, 30000);

      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % slogans.length;
        sloganEl.textContent = slogans[sloganIndex];
      }, 30000);

      // Initial random colors
      titleEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];

      // Toast helper
      function showToast(msg, color) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.style.color = color;
        toast.style.boxShadow = `0 0 30px ${color}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }
    })();
  </script>
</body>
</html>
