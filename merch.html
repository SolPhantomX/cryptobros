<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — MERCH</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000;
      color: #ffcc00;
      overflow: hidden; /* No scrolling — fullscreen only */
    }

    /* Import fancy fonts */
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Montserrat:wght@300;400;600&family=Russo+One&display=swap');

    /* ===== КНОПКА НАЗАД ===== */
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      color: #ffcc00;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
    }

    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }

    /* ===== FULLSCREEN IMAGE ===== */
    .fullscreen-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      background: #000;
    }

    .fullscreen-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.8;
      filter: brightness(0.7) contrast(1.2);
    }

    .image-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* ===== CONTENT OVERLAY ===== */
    .content-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      pointer-events: none;
    }

    /* Beautiful title */
    .main-title {
      font-family: 'Russo One', 'Bebas Neue', sans-serif;
      font-size: 7vw;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 8px;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      margin-bottom: 30px;
      max-width: 90%;
      line-height: 1.2;
      animation: titlePulse 2s ease-in-out infinite alternate;
      transition: color 1s ease;
    }

    /* Slogan */
    .slogan {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8vw;
      font-weight: 300;
      max-width: 75%;
      line-height: 1.7;
      text-shadow: 0 0 30px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.4);
      padding: 25px 35px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,204,0,0.2);
      letter-spacing: 1px;
      transition: color 1s ease;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    @keyframes titlePulse {
      0% { transform: scale(1); text-shadow: 0 0 30px currentColor, 0 0 60px currentColor; }
      100% { transform: scale(1.02); text-shadow: 0 0 50px currentColor, 0 0 90px currentColor; }
    }

    /* ===== UPLOAD SECTION ===== */
    .upload-section {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 4;
      pointer-events: auto;
    }

    .upload-btn {
      background: rgba(0,0,0,0.8);
      border: 2px solid #ffcc00;
      color: #ffcc00;
      padding: 15px 30px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      font-size: 16px;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
      font-family: 'Montserrat', sans-serif;
    }

    .upload-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 40px #ffcc00;
    }

    .hidden-input {
      display: none;
    }

    /* Image info */
    .image-info {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 4;
      color: rgba(255,255,255,0.6);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px 15px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,204,0,0.2);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Back button -->
  <a href="javascript:history.back()" class="back-button">←</a>

  <!-- Fullscreen image -->
  <div class="fullscreen-image" id="fullscreenImage">
    <img id="mainImage" src="" alt="Merch Background">
  </div>
  <div class="image-overlay"></div>

  <!-- Content overlay with changing titles and slogans -->
  <div class="content-overlay">
    <div class="main-title" id="changingTitle">TRIBUNAL GEAR</div>
    <div class="slogan" id="changingSlogan">Real ones wear the merch. Fake ones fear the truth.</div>
  </div>

  <!-- Image info -->
  <div class="image-info" id="imageInfo">📸 Current: <span id="currentImageName">merch-bg.jpg</span></div>

  <!-- Upload button -->
  <div class="upload-section">
    <input type="file" id="bgUpload" class="hidden-input" accept="image/*">
    <button class="upload-btn" onclick="document.getElementById('bgUpload').click()">
      📤 Change Background Image
    </button>
  </div>

  <script>
    (function() {
      // ===== TITLES AND SLOGANS =====
      const titles = [
        "TRIBUNAL GEAR",
        "HONEST CREW ARMOR", 
        "CRYPTOBROS BLACKLIST PROOF",
        "VERDICT THREADS",
        "UNCENSORABLE THREADS"
      ];

      const slogans = [
        "Real ones wear the merch. Fake ones fear the truth. Suit up – show the world you're built different. Family pack recommended.",
        "CRYPTOBROS Merch – not just clothes, it's a statement. Wear it loud, wear it proud. Only honest degens qualify. Buy for the squad.",
        "Wear the merch. Let them know you're untouchable. Honest crypto fam only. One shirt today = whole crew tomorrow. Stack the squad.",
        "CRYPTOBROS Merch: Proof you're not a rug-puller. Wear it, spread it, own it. Real enthusiasts gear up the whole circle. No fakes allowed.",
        "Don't just HODL — SHOW it. CRYPTOBROS Merch for the fearless. Honest only. Buy for you, your wife, your mates, your kids. Let the world see the tribe."
      ];

      // Colors array for independent cycling
      const colors = [
        '#ffcc00', // gold
        '#ff3366', // pink/red
        '#33ccff', // blue
        '#aa66ff', // purple
        '#00ffaa', // green
        '#ff8800', // orange
        '#ff00ff', // magenta
        '#66ff66'  // light green
      ];

      // DOM elements
      const titleEl = document.getElementById('changingTitle');
      const sloganEl = document.getElementById('changingSlogan');
      const mainImage = document.getElementById('mainImage');
      const currentImageNameEl = document.getElementById('currentImageName');

      // ===== INITIAL IMAGE (your specific image) =====
      // Try to load from localStorage first, otherwise use default
      let currentImage = localStorage.getItem('merchBackground');
      
      if (currentImage) {
        mainImage.src = currentImage;
        currentImageNameEl.textContent = 'Saved image';
      } else {
        // Default image - replace with YOUR image filename
        // OPTION 1: If image is in the same folder
        mainImage.src = 'merch-bg.jpg'; // <-- CHANGE THIS TO YOUR FILENAME
        
        // OPTION 2: If you want to use the image you mentioned
        // mainImage.src = 'image.jpg'; // <-- USE THIS
        
        currentImageNameEl.textContent = 'merch-bg.jpg';
      }

      // ===== INDEPENDENT COLOR CYCLING =====
      // Title changes color every 10 seconds
      setInterval(() => {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        titleEl.style.color = randomColor;
      }, 10000); // 10000ms = 10 seconds

      // Slogan changes color every 10 seconds (independent)
      setInterval(() => {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        sloganEl.style.color = randomColor;
      }, 10000); // Also every 10 seconds, but independent

      // ===== TITLE ROTATION (every 30 seconds) =====
      let titleIndex = 0;
      setInterval(() => {
        titleIndex = (titleIndex + 1) % titles.length;
        titleEl.textContent = titles[titleIndex];
      }, 30000); // 30000ms = 30 seconds

      // ===== SLOGAN ROTATION (every 30 seconds, independent) =====
      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % slogans.length;
        sloganEl.textContent = slogans[sloganIndex];
      }, 30000); // Also every 30 seconds, but runs independently

      // ===== IMAGE UPLOAD HANDLER =====
      document.getElementById('bgUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
            // Set image source
            mainImage.src = event.target.result;
            
            // Save to localStorage
            localStorage.setItem('merchBackground', event.target.result);
            
            // Update filename display
            currentImageNameEl.textContent = file.name;
            
            // Show success (optional)
            showNotification('✅ Background updated!');
          };
          reader.readAsDataURL(file);
        }
        // Clear input
        e.target.value = '';
      });

      // Simple notification function
      function showNotification(msg) {
        const notif = document.createElement('div');
        notif.textContent = msg;
        notif.style.cssText = `
          position: fixed;
          bottom: 100px;
          right: 40px;
          background: #00aa00;
          color: white;
          padding: 15px 25px;
          border-radius: 50px;
          z-index: 1000;
          font-family: 'Montserrat', sans-serif;
          box-shadow: 0 0 30px #00aa00;
          animation: fadeOut 3s forwards;
        `;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
      }

      // Add fadeOut animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeOut {
          0% { opacity: 1; transform: translateY(0); }
          70% { opacity: 1; transform: translateY(0); }
          100% { opacity: 0; transform: translateY(-20px); }
        }
      `;
      document.head.appendChild(style);

      // ===== INITIAL RANDOM COLORS =====
      titleEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];

    })();
  </script>
</body>
</html>
