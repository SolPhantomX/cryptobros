<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — MERCH</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000;
      color: #ffcc00;
      height: 100vh;
      overflow: hidden;
    }

    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&family=Russo+One&display=swap');

    /* Back button */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,204,0,0.3);
    }

    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px);
      box-shadow: 0 15px 40px rgba(255,204,0,0.5);
    }

    /* Gallery button */
    .gallery-button {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,204,0,0.3);
    }

    .gallery-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(255,204,0,0.5);
    }

    /* Text block */
    .text-block {
      position: fixed;
      top: 140px;
      left: 30px;
      z-index: 1000;
      max-width: 900px;
      pointer-events: none;
    }

    .main-title {
      font-family: 'Russo One', 'Bebas Neue', sans-serif;
      font-size: 6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.8), 0 0 40px currentColor;
      margin-bottom: 25px;
      line-height: 1;
      transition: color 0.5s ease;
      color: #ffcc00;
    }

    .slogan {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 300;
      max-width: 800px;
      line-height: 1.5;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.8);
      transition: color 0.5s ease;
      color: #ffffff;
    }

    /* Image container */
    .image-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 35%, transparent 70%);
      z-index: 2;
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 2px solid #00ff9d;
      color: #00ff9d;
      padding: 15px 30px;
      border-radius: 60px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      z-index: 10000;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 30px #00ff9d;
    }
    @keyframes slideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Back button -->
  <a href="javascript:history.back()" class="back-button">
    <span>←</span>
    <span>BACK</span>
  </a>

  <!-- Gallery button -->
  <a href="gallery.html" class="gallery-button">
    <span>🎨</span>
    <span>DESIGN GALLERY</span>
  </a>

  <!-- Text block -->
  <div class="text-block">
    <div class="main-title" id="changingTitle">TRIBUNAL GEAR</div>
    <div class="slogan" id="changingSlogan">Real ones wear the merch. Fake ones fear the truth.</div>
  </div>

  <!-- Image -->
  <div class="image-container">
    <img id="mainImage" src="merch-bg.jpg" alt="CRYPTOBROS Merch">
  </div>
  <div class="overlay"></div>

  <script>
    (function() {
      // ===== TITLES AND SLOGANS =====
      const titles = [
        "TRIBUNAL GEAR",
        "HONEST CREW ARMOR",
        "CRYPTOBROS BLACKLIST PROOF",
        "VERDICT THREADS",
        "UNCENSORABLE THREADS"
      ];

      const slogans = [
        "Real ones wear the merch. Fake ones fear the truth.",
        "CRYPTOBROS Merch – not just clothes, it's a statement.",
        "Wear the merch. Let them know you're untouchable.",
        "CRYPTOBROS Merch: Proof you're not a rug-puller.",
        "Don't just HODL — SHOW it. CRYPTOBROS Merch for the fearless."
      ];

      const colors = [
        '#ffcc00', '#ff3366', '#33ccff', '#aa66ff', '#00ffaa', '#ff8800', '#ff00ff', '#66ff66'
      ];

      const titleEl = document.getElementById('changingTitle');
      const sloganEl = document.getElementById('changingSlogan');
      const mainImage = document.getElementById('mainImage');

      // ===== GET DESIGNS FROM LOCALSTORAGE =====
      let designImages = JSON.parse(localStorage.getItem('designImages')) || {};

      // ===== ROTATE BACKGROUND EVERY 15 SECONDS =====
      function rotateBackground() {
        // Get all uploaded designs as array
        const designs = [];
        for (let i = 1; i <= 20; i++) {
          if (designImages[i]) {
            designs.push(designImages[i]);
          }
        }

        if (designs.length > 0) {
          // Random design
          const randomIndex = Math.floor(Math.random() * designs.length);
          mainImage.src = designs[randomIndex];
        } else {
          // Fallback to merch-bg.jpg
          mainImage.src = 'merch-bg.jpg';
        }
      }

      // Rotate every 15 seconds
      setInterval(rotateBackground, 15000);

      // ===== TITLE/SLOGAN ROTATION =====
      setInterval(() => {
        titleEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      }, 10000);

      setInterval(() => {
        sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      }, 10000);

      let titleIndex = 0;
      setInterval(() => {
        titleIndex = (titleIndex + 1) % titles.length;
        titleEl.textContent = titles[titleIndex];
      }, 30000);

      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % slogans.length;
        sloganEl.textContent = slogans[sloganIndex];
      }, 30000);

      // Initial colors
      titleEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];
    })();
  </script>
</body>
</html>
