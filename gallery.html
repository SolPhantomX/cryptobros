<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Background image */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('bg3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    /* Dark overlay for better readability */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
      transition: background 0.3s;
    }

    /* Light mode adjustments */
    body.light-mode::after {
      background: rgba(255, 255, 255, 0.7);
    }

    body.light-mode {
      color: #000;
    }

    /* Back button */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      z-index: 1000;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .back-button:hover {
      box-shadow: 0 0 20px #ffcc00;
      background: rgba(0,0,0,0.9);
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1000;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .theme-toggle:hover {
      box-shadow: 0 0 20px #ffcc00;
      transform: scale(1.1);
    }

    /* Main title - solid, bold font */
    .page-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      color: #ffcc00;
      text-shadow: 4px 4px 0 #000, 0 0 30px #ffcc00, 0 0 60px #ff9900;
      letter-spacing: 2px;
      position: relative;
      z-index: 10;
    }

    /* Rotating slogan - thicker and glowing */
    .rotating-slogan {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      text-align: center;
      font-weight: 700;
      margin-bottom: 50px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      transition: color 0.5s ease;
      text-shadow: 2px 2px 0 #000, 0 0 20px currentColor, 0 0 40px currentColor;
      letter-spacing: 1px;
      position: relative;
      z-index: 10;
    }

    /* Grid 6x5 = 30 slots */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
      border: 2px solid #ffcc00;
      margin-bottom: 60px;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }

    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 480px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .grid-item {
      aspect-ratio: 1/1;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(2px);
      border-right: 2px solid #ffcc00;
      border-bottom: 2px solid #ffcc00;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }

    .grid-item:hover {
      box-shadow: inset 0 0 30px rgba(255,204,0,0.5);
      z-index: 5;
    }

    .grid-item:nth-child(6n) { border-right: none; }
    .grid-item:nth-last-child(-n+6) { border-bottom: none; }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== SLOT NUMBERS - BOLD & GLOWING ===== */
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: 900;
      font-size: 1.3rem;
      font-family: 'Montserrat', sans-serif;
      text-shadow: 0 0 15px #ffcc00, 0 0 30px #ffaa00, 0 0 45px #ff8800;
      box-shadow: 0 0 20px #ffcc00, inset 0 0 10px rgba(255,204,0,0.5);
      z-index: 20;
      backdrop-filter: blur(2px);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 50px #ff00ff;
    }

    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      font-family: 'Montserrat', sans-serif;
    }

    .lightbox-close:hover {
      box-shadow: 0 0 40px #ff00ff;
      transform: scale(1.1);
    }

    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      box-shadow: 0 0 25px #00ffff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Back button to merch page -->
  <a href="merch.html" class="back-button">← BACK TO MERCH</a>
  
  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">🌙</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <!-- Main content -->
  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <!-- Rotating slogan (changes every 15 seconds) -->
    <div class="rotating-slogan" id="rotatingSlogan"></div>
    
    <!-- Grid 30 slots - ALL FILLED -->
    <div class="image-grid" id="designsGrid"></div>
  </div>

  <script>
    (function() {
      // ========== SLOGANS FROM MERCH PAGE ==========
      const slogans = [
        "Real ones wear the merch. Fake ones fear the truth.",
        "CRYPTOBROS Merch – not just clothes, it's a statement.",
        "Wear the merch. Let them know you're untouchable.",
        "CRYPTOBROS Merch: Proof you're not a rug-puller.",
        "Don't just HODL — SHOW it. CRYPTOBROS Merch for the fearless."
      ];

      // Colors for slogan
      const colors = ['#ffcc00', '#ff3366', '#33ccff', '#aa66ff', '#00ffaa', '#ff8800', '#ff00ff', '#66ff66'];

      // ========== FILE NAMES ==========
      // 30 files: 1a.png through 31a.png, but 17a.png is MISSING
      
      const IMAGE_PATH = 'merch-artworks/';
      
      // Array of 30 filenames in correct order for slots 1-30
      const imageFiles = [
        '1a.png', '2a.png', '3a.png', '4a.png', '5a.png',
        '6a.png', '7a.png', '8a.png', '9a.png', '10a.png',
        '11a.png', '12a.png', '13a.png', '14a.png', '15a.png',
        '16a.png',           // slot 16
        '18a.png', '19a.png', '20a.png', '21a.png', '22a.png',
        '23a.png', '24a.png', '25a.png', '26a.png', '27a.png',
        '28a.png', '29a.png', '30a.png', '31a.png'  // slots 17-30
      ];

      // Elements
      const grid = document.getElementById('designsGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const themeToggle = document.getElementById('themeToggle');
      const sloganEl = document.getElementById('rotatingSlogan');

      // ========== ROTATING SLOGAN ==========
      let sloganIndex = 0;
      
      function updateSlogan() {
        // Fade out
        sloganEl.style.opacity = '0';
        sloganEl.style.transform = 'translateY(10px)';
        
        setTimeout(() => {
          // Change text and color
          sloganEl.textContent = slogans[sloganIndex];
          sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];
          
          // Fade in
          sloganEl.style.opacity = '1';
          sloganEl.style.transform = 'translateY(0)';
        }, 300);
        
        // Move to next slogan
        sloganIndex = (sloganIndex + 1) % slogans.length;
      }

      // Initial slogan
      sloganEl.textContent = slogans[0];
      sloganEl.style.color = colors[Math.floor(Math.random() * colors.length)];
      sloganEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease, color 0.5s ease';
      
      // Change slogan every 15 seconds
      setInterval(updateSlogan, 15000);

      // ========== THEME TOGGLE ==========
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.textContent = '☀️';
      }

      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      });

      // ========== RENDER GRID ==========
      function renderGrid() {
        let html = '';
        
        for (let slot = 1; slot <= 30; slot++) {
          html += '<div class="grid-item" data-id="' + slot + '">';
          html += '<div class="item-number">' + slot + '</div>';
          
          // Get filename for this slot (direct mapping: slot-1 = index)
          const fileName = imageFiles[slot - 1];
          const imagePath = IMAGE_PATH + fileName;
          
          html += '<img src="' + imagePath + '" alt="Design ' + slot + '" loading="lazy">';
          
          html += '</div>';
        }
        
        grid.innerHTML = html;
      }

      // Run render
      renderGrid();

      // ========== LIGHTBOX ==========
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        if (!item) return;
        
        const slot = item.dataset.id;
        const img = item.querySelector('img');
        
        if (img && img.src) {
          lightboxImg.src = img.src;
          lightboxNum.textContent = 'DESIGN #' + slot;
          lightbox.classList.add('active');
        }
      });

      // Close lightbox
      lightboxClose.addEventListener('click', () => {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

    })();
  </script>
</body>
</html>
