<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY</title>
  <!-- ПОДКЛЮЧАЕМ ТОЧНО ТАКОЙ ЖЕ ШРИФТ КАК В MERCH -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Archivo Black', 'Anton', 'Bebas Neue', 'Oswald', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    
    body.light-mode {
      background: #f0f0f0;
      color: black;
    }
    
    body.light-mode .grid-item {
      background: white;
      border-color: #ccc;
    }
    
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      font-family: 'Archivo Black', sans-serif;
      font-size: 18px;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }
    
    .back-button:hover {
      background: #ffcc00;
      color: black;
      transform: scale(1.05);
    }
    
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }
    
    .theme-toggle:hover {
      transform: rotate(15deg);
      background: #ffcc00;
    }
    
    #adminButton {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 0 30px #9945FF;
      transition: 0.3s;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 30px #9945FF; }
      50% { box-shadow: 0 0 50px #9945FF; }
      100% { box-shadow: 0 0 30px #9945FF; }
    }
    
    #adminButton:hover {
      transform: scale(1.1);
      background: #ff00ff;
    }
    
    .page-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
      text-transform: uppercase;
      animation: titleGlow 3s infinite;
    }
    
    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 5px #ff3366); }
      25% { filter: drop-shadow(0 0 15px #ff00ff); }
      50% { filter: drop-shadow(0 0 5px #6600ff); }
      75% { filter: drop-shadow(0 0 15px #00ccff); }
      100% { filter: drop-shadow(0 0 5px #ff3366); }
    }
    
    .slogan-line1 {
      font-family: 'Anton', sans-serif;
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: slogan1Pulse 2s infinite;
      text-shadow: 0 0 10px #ff6600;
    }
    
    @keyframes slogan1Pulse {
      0% { opacity: 1; text-shadow: 0 0 10px #ff6600; }
      50% { opacity: 0.9; text-shadow: 0 0 20px #ff6600; }
      100% { opacity: 1; text-shadow: 0 0 10px #ff6600; }
    }
    
    .slogan-line2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.5rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: slogan2Pulse 2.5s infinite;
      text-shadow: 0 0 10px #00ff00;
    }
    
    @keyframes slogan2Pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    .section-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
      padding-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: borderPulse 2s infinite;
    }
    
    @keyframes borderPulse {
      0% { border-color: #ffdd00; }
      50% { border-color: #ff9900; }
      100% { border-color: #ffdd00; }
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }
    
    @media (max-width: 1024px) { 
      .image-grid { grid-template-columns: repeat(3, 1fr); } 
    }
    @media (max-width: 768px) { 
      .image-grid { grid-template-columns: repeat(2, 1fr); } 
    }
    @media (max-width: 480px) { 
      .image-grid { grid-template-columns: 1fr; } 
    }
    
    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
      overflow: hidden;
    }
    
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
    }
    
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: 0.3s;
    }
    
    .grid-item:hover img {
      transform: scale(1.1);
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-family: 'Archivo Black', sans-serif;
      font-size: 18px;
      z-index: 2;
      animation: numberGlow 2s infinite;
    }
    
    @keyframes numberGlow {
      0% { border-color: #ffcc00; }
      50% { border-color: #ff00ff; }
      100% { border-color: #ffcc00; }
    }
    
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      font-family: 'Archivo Black', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      font-size: 20px;
      z-index: 3;
    }
    
    .grid-item:hover .delete-btn {
      opacity: 1;
    }
    
    .delete-btn:hover {
      background: #ff0000;
      transform: rotate(90deg);
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
    }
    
    .item-placeholder .emoji { 
      font-size: 3.5rem;
      animation: emojiBounce 2s infinite;
    }
    
    @keyframes emojiBounce {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: #111;
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      animation: sectionGlow 3s infinite;
    }
    
    @keyframes sectionGlow {
      0% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
      33% { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
      66% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; }
      100% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
    }
    
    body.light-mode .upload-section {
      background: white;
    }
    
    .upload-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 2.5rem;
      color: #ff00ff;
      margin-bottom: 30px;
      animation: titleColor 3s infinite;
    }
    
    @keyframes titleColor {
      0% { color: #ff00ff; }
      33% { color: #00ffff; }
      66% { color: #ffff00; }
      100% { color: #ff00ff; }
    }
    
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
      transition: 0.3s;
      animation: buttonPulse 2s infinite;
    }
    
    @keyframes buttonPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    #uploadButton:hover {
      background: #00ff00;
      color: black;
      transform: scale(1.1);
    }
    
    .hidden-input { display: none; }
    
    .storage-info {
      color: #ffaa00;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      margin-top: 10px;
    }
    
    .storage-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 10px;
    }
    
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    .info-text {
      color: #ffaa00;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.3rem;
      margin-top: 25px;
      line-height: 1.8;
    }
    
    #clearAllBtn {
      margin-top: 20px;
      background: #ff3366;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      transition: 0.3s;
    }
    
    #clearAllBtn:hover {
      background: #ff0000;
      transform: scale(1.1);
    }
    
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .lightbox.active { display: flex; }
    
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      animation: zoomIn 0.3s;
    }
    
    @keyframes zoomIn {
      from { transform: scale(0.9); }
      to { transform: scale(1); }
    }
    
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Archivo Black', sans-serif;
      transition: 0.3s;
    }
    
    .lightbox-close:hover {
      background: #ff00ff;
      color: black;
      transform: rotate(90deg);
    }
    
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      font-family: 'Archivo Black', sans-serif;
      animation: numberGlow 2s infinite;
    }
    
    #loadingIndicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      background: black;
      padding: 20px 40px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      z-index: 40000;
      display: none;
      font-family: 'Archivo Black', sans-serif;
      animation: loadingPulse 1s infinite;
    }
    
    @keyframes loadingPulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    #loadingIndicator.active { display: block; }
    
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 15px 30px;
      border-radius: 60px;
      font-family: 'Archivo Black', sans-serif;
      z-index: 50000;
      display: none;
      border: 2px solid #ffcc00;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      animation: slideUp 0.3s;
    }
    
    @keyframes slideUp {
      from { bottom: 50px; opacity: 0; }
      to { bottom: 100px; opacity: 1; }
    }
    
    #toast.show { display: block; }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>
  
  <a href="https://www.cryptobros.pro/merch.html" class="back-button">← BACK TO MERCH</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
    <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <div class="storage-info" id="storageInfo">Storage: 0/4.5 MB</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width: 0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button id="uploadButton">📁 CHOOSE IMAGES</button>
      <div class="info-text">
        ⚡ Files with numbers (e.g., design5.jpg) → slot #5<br>
        ⚡ Files without numbers → first empty slot<br>
        ⚡ Max 1.5MB per image • 4.5MB total storage
      </div>
      <button id="clearAllBtn">🗑️ CLEAR ALL DESIGNS</button>
    </div>
  </div>

  <script>
    (function() {
      const MAX_TOTAL = 4.5 * 1024 * 1024;
      const MAX_FILE = 1.5 * 1024 * 1024;
      
      let designs = {};

      // Get elements
      const themeToggle = document.getElementById('themeToggle');
      const adminBtn = document.getElementById('adminButton');
      const uploadSection = document.getElementById('uploadSection');
      const uploadBtn = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const grid = document.getElementById('designsGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const loader = document.getElementById('loadingIndicator');
      const toast = document.getElementById('toast');
      const storageInfo = document.getElementById('storageInfo');
      const storageFill = document.getElementById('storageFill');
      const clearAllBtn = document.getElementById('clearAllBtn');

      function showToast(msg, color) {
        toast.textContent = msg;
        toast.style.borderColor = color || '#00ffff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      function getBase64Size(dataUrl) {
        const base64 = dataUrl.split(',')[1] || '';
        return Math.ceil(base64.length * 0.75);
      }

      function getTotalSize() {
        let total = 0;
        for(let key in designs) {
          total += getBase64Size(designs[key]);
        }
        return total;
      }

      function updateStorage() {
        const size = getTotalSize();
        const percent = Math.min(100, (size / MAX_TOTAL) * 100);
        storageFill.style.width = percent + '%';
        storageInfo.textContent = 'Storage: ' + (size / 1024 / 1024).toFixed(2) + '/4.5 MB';
      }

      // Load designs
      try {
        const saved = localStorage.getItem('cryptobros_gallery');
        if(saved) {
          designs = JSON.parse(saved);
        }
      } catch(e) {
        designs = {};
      }

      function render() {
        let html = '';
        for(let i = 1; i <= 20; i++) {
          html += '<div class="grid-item" data-id="' + i + '">';
          html += '<div class="item-number">' + i + '</div>';
          
          if(designs[i]) {
            html += '<img src="' + designs[i] + '" alt="Design ' + i + '">';
            html += '<div class="delete-btn" data-delete="' + i + '">✕</div>';
          } else {
            html += '<div class="item-placeholder"><div class="emoji">🎨</div><div>EMPTY</div></div>';
          }
          
          html += '</div>';
        }
        grid.innerHTML = html;
        updateStorage();
      }
      
      render();

      // Theme toggle
      if(themeToggle) {
        if(localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light-mode');
          themeToggle.textContent = '☀️';
        }
        
        themeToggle.onclick = function() {
          document.body.classList.toggle('light-mode');
          const isLight = document.body.classList.contains('light-mode');
          themeToggle.textContent = isLight ? '☀️' : '🌙';
          localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
      }

      // Delete
      grid.addEventListener('click', function(e) {
        const deleteBtn = e.target.closest('.delete-btn');
        if(deleteBtn) {
          e.stopPropagation();
          const slot = deleteBtn.dataset.delete;
          if(confirm('Delete design #' + slot + '?')) {
            delete designs[slot];
            localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
            render();
            showToast('✅ Deleted #' + slot, '#00ff00');
          }
        }
      });

      // Clear all
      if(clearAllBtn) {
        clearAllBtn.onclick = function() {
          if(confirm('Delete ALL designs?')) {
            designs = {};
            localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
            render();
            showToast('✅ All cleared', '#ff3366');
          }
        };
      }

      // Lightbox
      grid.addEventListener('click', function(e) {
        const item = e.target.closest('.grid-item');
        const deleteBtn = e.target.closest('.delete-btn');
        if(item && !deleteBtn) {
          const id = item.dataset.id;
          if(designs[id]) {
            lightboxImg.src = designs[id];
            lightboxNum.textContent = 'DESIGN #' + id;
            lightbox.classList.add('active');
          }
        }
      });

      lightboxClose.onclick = function() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      };

      lightbox.addEventListener('click', function(e) {
        if(e.target === lightbox) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      document.addEventListener('keydown', function(e) {
        if(e.key === 'Escape' && lightbox.classList.contains('active')) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      adminBtn.onclick = function() {
        uploadSection.scrollIntoView({ behavior: 'smooth' });
      };

      // UPLOAD - WORKING
      uploadBtn.onclick = function() {
        fileInput.click();
      };

      fileInput.onchange = async function(e) {
        const files = Array.from(e.target.files);
        if(files.length === 0) return;

        uploadBtn.disabled = true;
        loader.classList.add('active');

        let currentSize = getTotalSize();
        let newDesigns = JSON.parse(JSON.stringify(designs));
        let uploaded = 0;
        let errors = [];

        for(let file of files) {
          if(file.size > MAX_FILE) {
            errors.push(file.name + ' too big');
            continue;
          }

          if(currentSize + file.size > MAX_TOTAL) {
            errors.push(file.name + ' no space');
            continue;
          }

          try {
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });

            const match = file.name.match(/\d+/);
            let slot = match ? parseInt(match[0]) : null;

            if(slot && slot >= 1 && slot <= 20) {
              if(newDesigns[slot]) {
                currentSize -= getBase64Size(newDesigns[slot]);
              }
              newDesigns[slot] = dataUrl;
              currentSize += file.size;
              uploaded++;
            } else {
              for(let i = 1; i <= 20; i++) {
                if(!newDesigns[i]) {
                  newDesigns[i] = dataUrl;
                  currentSize += file.size;
                  uploaded++;
                  break;
                }
              }
            }
          } catch(err) {
            errors.push(file.name + ' failed');
          }
        }

        if(uploaded > 0) {
          designs = newDesigns;
          localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
          render();
          showToast('✅ Uploaded ' + uploaded + ' images', '#00ff00');
        }

        if(errors.length > 0) {
          showToast('⚠️ ' + errors.length + ' errors', '#ffaa00');
        }

        loader.classList.remove('active');
        uploadBtn.disabled = false;
        fileInput.value = '';
      };

    })();
  </script>
</body>
</html>
