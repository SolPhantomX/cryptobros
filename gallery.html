<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- ТОЛЬКО ОДИН ШРИФТ - SYNE (толстый) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Syne', sans-serif; /* Только Syne */
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }
    
    /* ДНЕВНОЙ РЕЖИМ */
    body.light-mode {
      background: #f0f0f0;
      color: #222;
    }
    
    body.light-mode .grid-item {
      background: #ddd;
      border-color: #aaa;
    }
    
    body.light-mode .item-number {
      background: rgba(255,255,255,0.9);
      color: #000;
      border-color: #000;
    }
    
    body.light-mode .item-placeholder {
      background: #ccc;
      color: #333;
    }
    
    body.light-mode .section-title {
      color: #ff5500;
      border-bottom-color: #ff5500;
    }
    
    body.light-mode .freeze-overlay {
      background: rgba(255, 255, 255, 0.3);
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,0,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(255,255,0,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 8s ease-in-out infinite;
    }
    
    @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    
    @media (max-width: 768px) {
      body { padding: 15px; }
      .page-title { font-size: 3rem; }
      .back-button { top: 15px; left: 15px; padding: 12px 24px; }
      .theme-toggle { top: 15px; right: 15px; width: 50px; height: 50px; }
    }

    /* ===== BACK BUTTON ===== */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      color: #ffcc00;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
    }
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }

    /* ===== THEME TOGGLE (ДЕНЬ/НОЧЬ) ===== */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px #ffcc00;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
    }
    .theme-toggle.light {
      background: #ffcc00;
      color: #000;
    }

    /* УБРАНЫ ВСЕ ЛИШНИЕ КНОПКИ: admin, freeze, clear */

    .page-title {
      font-weight: 800;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
      will-change: background-position;
    }
    @keyframes titleRainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
    }
    .slogan-line1 {
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes line1Glow { 0%,100%{color:#ff6600} 33%{color:#ff00ff} 66%{color:#ffaa00} }
    .slogan-line2 {
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      animation: line2Flicker 3s linear infinite;
    }
    @keyframes line2Flicker { 0%,100%{color:#00ff00} 20%{color:#00ffff} 40%{color:#ffff00} 60%{color:#ff00ff} 80%{color:#00ff00} }

    .section-title {
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      text-shadow: 0 0 20px #ffdd00;
    }

    .gallery-container { max-width: 1200px; margin: 0 auto; }
    
    /* ===== GALLERY GRID ===== */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00;
    }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
      display: block;
      transition: background 0.5s ease;
    }
    
    body.light-mode .grid-item img {
      background: #fff;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: 700;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 2;
      transition: all 0.5s ease;
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      background: #0f0f0f;
      font-weight: 400;
    }
    .item-placeholder .emoji { font-size: 3.5rem; opacity: 0.5; }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      z-index: 10001;
      font-weight: 400;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-weight: 700;
    }

    /* ===== FREEZE OVERLAY ===== */
    .freeze-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 9999;
      display: none;
      pointer-events: all;
      transition: background 0.5s ease;
    }
    .freeze-overlay.active { display: block; }

    /* ===== LOADING ===== */
    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      font-weight: 700;
      text-shadow: 0 0 30px #00ffff;
      z-index: 40000;
      background: rgba(0,0,0,0.9);
      padding: 20px 40px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      display: none;
    }
    .loading-indicator.active { display: block; }
  </style>
</head>
<body>
  <!-- КНОПКА ДЕНЬ/НОЧЬ (ВМЕСТО ВСЕХ ЛИШНИХ) -->
  <div class="theme-toggle" id="themeToggle">🌙</div>
  
  <div class="loading-indicator" id="loadingIndicator">⏳ LOADING...</div>

  <a href="https://www.cryptobros.pro/merch.html" class="back-button">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <!-- ВСЕ ЛИШНИЕ КНОПКИ УДАЛЕНЫ: admin, freeze, clear -->

  <div class="freeze-overlay" id="freezeOverlay"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Design preview">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <!-- Секция загрузки ТОЖЕ УДАЛЕНА -->
  </div>

  <script>
    (function() {
      'use strict';
      
      let designImages = {};
      let isFrozen = false; // Оставляем для совместимости

      // DOM elements
      const themeToggle = document.getElementById('themeToggle');
      const freezeOverlay = document.getElementById('freezeOverlay');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const designsGrid = document.getElementById('designsGrid');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // ===== Toast (упрощенный) =====
      function showToast(msg, color) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: black;
          border: 3px solid ${color};
          color: ${color};
          padding: 15px 35px;
          border-radius: 60px;
          font-weight: 700;
          z-index: 30000;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      // ===== THEME TOGGLE (ДЕНЬ/НОЧЬ) =====
      function toggleTheme() {
        const body = document.body;
        body.classList.toggle('light-mode');
        
        if (body.classList.contains('light-mode')) {
          themeToggle.textContent = '☀️';
          themeToggle.classList.add('light');
          localStorage.setItem('cryptobros_theme', 'light');
        } else {
          themeToggle.textContent = '🌙';
          themeToggle.classList.remove('light');
          localStorage.setItem('cryptobros_theme', 'dark');
        }
      }

      function loadTheme() {
        const savedTheme = localStorage.getItem('cryptobros_theme');
        if (savedTheme === 'light') {
          document.body.classList.add('light-mode');
          themeToggle.textContent = '☀️';
          themeToggle.classList.add('light');
        } else {
          themeToggle.textContent = '🌙';
        }
      }

      // ===== Render Grid =====
      function renderDesigns() {
        if (!designsGrid) return;
        
        let html = '';
        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += `
            <div class="grid-item" data-id="${i}">
              <div class="item-number">${i}</div>
              ${img ? `
                <img src="${img}" alt="Design ${i}" loading="lazy">
              ` : `
                <div class="item-placeholder">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>
              `}
            </div>
          `;
        }
        designsGrid.innerHTML = html;
      }

      // ===== Lightbox Functions =====
      function openLightbox(num) {
        if (designImages[num]) {
          lightboxImg.src = designImages[num];
          lightboxImg.alt = `Design #${num}`;
          lightboxNumber.textContent = `DESIGN #${num}`;
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden';
        } else {
          showToast(`Slot #${num} is empty`, '#ffaa00');
        }
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
        document.body.style.overflow = '';
      }

      // ===== Load designs from localStorage =====
      function loadDesigns() {
        const saved = localStorage.getItem('cryptobros_designs');
        if (saved) {
          try {
            designImages = JSON.parse(saved);
          } catch (e) {
            console.error('Failed to parse saved designs', e);
            designImages = {};
          }
        }
      }

      // ===== Check frozen state =====
      function checkFrozen() {
        if (localStorage.getItem('cryptobros_frozen') === 'true') {
          isFrozen = true;
          if (freezeOverlay) freezeOverlay.classList.add('active');
        }
      }

      // ===== Event Listeners =====
      
      // Theme toggle
      if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
      }
      
      // Клик по сетке
      if (designsGrid) {
        designsGrid.addEventListener('click', (e) => {
          const item = e.target.closest('.grid-item');
          if (item) {
            const id = parseInt(item.dataset.id);
            openLightbox(id);
          }
        });
      }

      // Lightbox
      if (lightboxClose) {
        lightboxClose.addEventListener('click', closeLightbox);
      }

      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) closeLightbox();
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox?.classList.contains('active')) {
          closeLightbox();
        }
      });

      // ===== Initialize =====
      loadDesigns();
      checkFrozen();
      renderDesigns();
      loadTheme(); // Загружаем сохраненную тему
    })();
  </script>
</body>
</html>
