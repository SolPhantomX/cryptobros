<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY REBORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo Black', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
    }
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      z-index: 1000;
      transition: 0.3s;
    }
    .back-button:hover {
      box-shadow: 0 0 20px #ffcc00;
    }
    .page-title {
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 {
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
      text-transform: uppercase;
      text-shadow: 0 0 15px #ff6600;
    }
    .slogan-line2 {
      font-size: 1.5rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
      text-shadow: 0 0 15px #00ff00;
    }
    .section-title {
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
      text-shadow: 0 0 15px #ffdd00;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }
    @media (max-width: 768px) { 
      .image-grid { grid-template-columns: repeat(2, 1fr); } 
    }
    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      box-shadow: 0 0 10px #ffcc00;
    }
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      box-shadow: 0 0 15px #ff3366;
    }
    .grid-item:hover .delete-btn {
      opacity: 1;
    }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
    }
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: #111;
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    .upload-title {
      font-size: 2.5rem;
      color: #ff00ff;
      margin-bottom: 30px;
      text-shadow: 0 0 15px #ff00ff;
    }
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
      transition: 0.3s;
      box-shadow: 0 0 15px #00ff00;
    }
    #uploadButton:hover:not(:disabled) {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 30px #00ff00;
    }
    #uploadButton:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .hidden-input { display: none; }
    .storage-info {
      color: #ffaa00;
      margin-top: 10px;
      text-shadow: 0 0 8px #ffaa00;
    }
    .storage-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 10px;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      border-radius: 4px;
      transition: width 0.3s;
    }
    #clearAllBtn {
      margin-top: 20px;
      background: #ff3366;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      box-shadow: 0 0 15px #ff3366;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 50px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
    }
    #loadingIndicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      background: black;
      padding: 20px 40px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      z-index: 40000;
      display: none;
    }
    #loadingIndicator.active { display: block; }
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 15px 30px;
      border-radius: 60px;
      z-index: 50000;
      display: none;
      border: 2px solid #ffcc00;
    }
    #toast.show { display: block; }
    .info-text {
      color: #ffaa00;
      margin-top:25px;
      text-shadow: 0 0 8px #ffaa00;
    }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>
  
  <a href="/merch.html" class="back-button">← BACK</a>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR MERCH</div>
    <div class="slogan-line2">FAKES FEAR THE TRUTH</div>
    <div class="section-title">⚡ SLOTS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOADING</div>
      <div class="storage-info" id="storageInfo">0/20 slots</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width: 0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button id="uploadButton">📁 SELECT</button>
      <div class="info-text">
        ⚡ Number in name → specific slot<br>
        ⚡ No number → first empty slot
      </div>
      <button id="clearAllBtn">🗑️ CLEAR ALL</button>
    </div>
  </div>

  <script>
    (function() {
      const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB
      const TOTAL_SLOTS = 20;

      // --- Load and validate saved data ---
      let currentDesigns = {};
      try {
        const raw = localStorage.getItem('cryptoGalleryImages');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (typeof parsed === 'object') {
            for (let key in parsed) {
              const val = parsed[key];
              // Ensure it's a valid image data URL
              if (typeof val === 'string' && val.startsWith('image/')) {
                currentDesigns[key] = val;
              } else {
                console.warn(`[CLEAN] Removed invalid entry: slot ${key}`);
              }
            }
          }
        }
      } catch (e) {
        console.error('Failed to load saved data', e);
        localStorage.removeItem('cryptoGalleryImages');
      }

      const grid = document.getElementById('designsGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const loader = document.getElementById('loadingIndicator');
      const toast = document.getElementById('toast');
      const storageInfo = document.getElementById('storageInfo');
      const storageFill = document.getElementById('storageFill');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const uploadBtn = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');

      function showToast(msg, color = '#00ffff') {
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      function saveToLocalStorage() {
        try {
          localStorage.setItem('cryptoGalleryImages', JSON.stringify(currentDesigns));
        } catch (e) {
          console.error('Storage error:', e);
          showToast('⚠️ Storage full. Clear some slots.', '#ffaa00');
        }
      }

      function renderGrid() {
        grid.innerHTML = '';
        for (let i = 1; i <= TOTAL_SLOTS; i++) {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'grid-item';
          itemDiv.dataset.id = i;

          const numberDiv = document.createElement('div');
          numberDiv.className = 'item-number';
          numberDiv.textContent = i;
          itemDiv.appendChild(numberDiv);

          if (currentDesigns[i]) {
            if (typeof currentDesigns[i] === 'string' && currentDesigns[i].startsWith('image/')) {
              const img = document.createElement('img');
              img.src = currentDesigns[i];
              img.alt = `Design ${i}`;
              // Show broken icon if image fails to load
              img.onerror = () => {
                itemDiv.innerHTML = '<div class="item-placeholder"><div style="font-size:50px;">🎨</div><div>BROKEN</div></div>';
              };
              itemDiv.appendChild(img);

              const deleteBtn = document.createElement('div');
              deleteBtn.className = 'delete-btn';
              deleteBtn.dataset.delete = i;
              deleteBtn.textContent = '✕';
              itemDiv.appendChild(deleteBtn);
            } else {
              const placeholder = document.createElement('div');
              placeholder.className = 'item-placeholder';
              placeholder.innerHTML = '<div style="font-size:50px;">🎨</div><div>INVALID</div>';
              itemDiv.appendChild(placeholder);
            }
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'item-placeholder';
            placeholder.innerHTML = '<div style="font-size:50px;">🎨</div><div>EMPTY</div>';
            itemDiv.appendChild(placeholder);
          }

          grid.appendChild(itemDiv);
        }

        const filled = Object.keys(currentDesigns).length;
        const percent = (filled / TOTAL_SLOTS) * 100;
        storageFill.style.width = percent + '%';
        storageInfo.textContent = filled + '/' + TOTAL_SLOTS + ' slots';
      }

      function init() {
        renderGrid();
      }

      // --- Delete ---
      grid.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('.delete-btn');
        if (!deleteBtn) return;
        e.stopPropagation();
        const slot = deleteBtn.dataset.delete;
        if (confirm('Delete design #' + slot + '?')) {
          delete currentDesigns[slot];
          saveToLocalStorage();
          renderGrid();
          showToast('✅ Deleted #' + slot, '#00ff00');
        }
      });

      // --- Lightbox ---
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        const del = e.target.closest('.delete-btn');
        if (item && !del) {
          const id = item.dataset.id;
          if (currentDesigns[id]) {
            if (typeof currentDesigns[id] === 'string' && currentDesigns[id].startsWith('data:image/')) {
              lightboxImg.src = currentDesigns[id];
              lightboxNum.textContent = 'DESIGN #' + id;
              lightbox.classList.add('active');
            } else {
              showToast('❌ Invalid image data for slot ' + id, '#ff3366');
            }
          }
        }
      });

      lightboxClose.onclick = () => {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      };

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      // --- Clear All ---
      clearAllBtn.onclick = () => {
        if (!confirm('DELETE ALL DESIGNS?')) return;
        currentDesigns = {};
        saveToLocalStorage();
        renderGrid();
        showToast('✅ All cleared', '#ff3366');
      };

      // --- NEW UPLOAD LOGIC ---
      uploadBtn.onclick = () => fileInput.click();

      fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        uploadBtn.disabled = true;
        loader.classList.add('active');

        let successCount = 0;
        let errorMessages = [];

        for (const file of files) {
          let processed = false;

          try {
            // --- 1. Validate file type ---
            if (!file.type || !file.type.startsWith('image/')) {
              errorMessages.push(`${file.name}: Not an image.`);
              processed = true;
              continue;
            }

            // --- 2. Validate file size ---
            if (file.size > MAX_FILE_SIZE) {
              errorMessages.push(`${file.name}: Too large (max 5MB).`);
              processed = true;
              continue;
            }

            // --- 3. Read file as Data URL ---
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => {
                const result = reader.result;
                // Final validation: must be a valid image data URL
                if (typeof result === 'string' && result.startsWith('data:image/')) {
                  resolve(result);
                } else {
                  reject(new Error('Invalid image data after read'));
                }
              };
              reader.onerror = () => reject(new Error('File read error'));
              reader.readAsDataURL(file);
            });

            // --- 4. Determine slot from filename ---
            const nameMatch = file.name.match(/(\d+)(\.[^.]*)?$/);
            let slot = nameMatch ? parseInt(nameMatch[1], 10) : null;

            // --- 5. Validate slot range ---
            if (slot !== null && (slot < 1 || slot > TOTAL_SLOTS)) {
              errorMessages.push(`${file.name}: Slot ${slot} out of range (1-${TOTAL_SLOTS}).`);
              processed = true;
              continue;
            }

            // --- 6. Check if slot is occupied ---
            if (slot !== null && currentDesigns[slot]) {
              errorMessages.push(`${file.name}: Slot ${slot} is occupied.`);
              processed = true;
              continue;
            }

            // --- 7. Find first empty slot if no number in name ---
            if (slot === null) {
              for (let i = 1; i <= TOTAL_SLOTS; i++) {
                if (!currentDesigns[i]) {
                  slot = i;
                  break;
                }
              }
              if (slot === null) {
                errorMessages.push(`${file.name}: No empty slots.`);
                processed = true;
                continue;
              }
            }

            // --- 8. Save to cache and storage ---
            currentDesigns[slot] = dataUrl;
            saveToLocalStorage();
            successCount++;
            processed = true;

          } catch (err) {
            if (!processed) {
              errorMessages.push(`${file.name}: ${err.message || 'Upload failed.'}`);
            }
          }
        }

        renderGrid();

        if (successCount > 0) {
          showToast(`✅ Uploaded ${successCount} file(s).`, '#00ff00');
        }
        if (errorMessages.length > 0) {
          showToast(`⚠️ ${errorMessages.length} error(s): ${errorMessages[0]}`, '#ffaa00');
        }

        loader.classList.remove('active');
        uploadBtn.disabled = false;
        fileInput.value = '';
      };

      init();

    })();
  </script>
</body>
</html>
