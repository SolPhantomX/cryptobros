<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,0,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(255,255,0,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 8s ease-in-out infinite;
    }
    
    @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    
    @media (prefers-reduced-motion: reduce) {
      body::before, .page-title, .slogan-line1, .slogan-line2 {
        animation: none !important;
      }
    }
    
    @media (max-width: 1024px) { 
      .image-grid { grid-template-columns: repeat(3, 1fr); } 
    }
    @media (max-width: 768px) { 
      body { padding: 15px; }
      .page-title { font-size: 3rem; }
      .back-button { top: 15px; left: 15px; padding: 12px 24px; }
      .admin-button { bottom: 20px; right: 15px; padding: 12px 20px; }
      .freeze-button { bottom: 90px; right: 15px; padding: 12px 20px; }
      .image-grid { grid-template-columns: repeat(2, 1fr); } 
    }
    @media (max-width: 480px) { 
      .image-grid { grid-template-columns: 1fr; } 
    }

    /* ===== BUTTONS ===== */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
    }
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }

    .admin-button {
      position: fixed;
      bottom: 100px;
      right: 30px;
      z-index: 1000;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #9945FF;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .admin-button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 50px #9945FF;
    }
    .admin-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .freeze-button {
      position: fixed;
      bottom: 180px;
      right: 30px;
      z-index: 1000;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff3366;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .freeze-button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 60px #ff3366;
    }
    .freeze-button.frozen {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 30px #00ff00;
    }
    .freeze-button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      font-weight: 800;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
    }
    @keyframes titleRainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
    }
    .slogan-line1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes line1Glow { 0%,100%{color:#ff6600} 33%{color:#ff00ff} 66%{color:#ffaa00} }
    .slogan-line2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      animation: line2Flicker 3s linear infinite;
    }
    @keyframes line2Flicker { 0%,100%{color:#00ff00} 20%{color:#00ffff} 40%{color:#ffff00} 60%{color:#ff00ff} 80%{color:#00ff00} }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      text-shadow: 0 0 20px #ffdd00;
    }

    .gallery-container { max-width: 1200px; margin: 0 auto; }
    
    /* ===== GALLERY GRID ===== */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00;
    }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
      display: block;
      pointer-events: none;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 2;
      pointer-events: none;
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      background: #0f0f0f;
    }
    .item-placeholder .emoji { font-size: 3.5rem; opacity: 0.5; }

    /* ===== UPLOAD SECTION ===== */
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
    }
    .upload-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff;
    }
    .upload-btn {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      box-shadow: 0 0 30px #00ff00;
    }
    .upload-btn:hover:not(:disabled) {
      background: #00ff00;
      color: #000;
      transform: scale(1.1);
    }
    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .hidden-input { display: none; }
    .upload-note {
      color: #ffaa00;
      margin-top: 25px;
      font-size: 14px;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
      pointer-events: none;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      z-index: 10001;
    }
    .lightbox-close:focus {
      outline: 3px solid white;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-family: 'Syne', sans-serif;
    }
    
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 3rem;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 2px solid #ff00ff;
      z-index: 10002;
    }
    .lightbox-nav:hover {
      background: #ff00ff;
    }
    .lightbox-prev { left: 30px; }
    .lightbox-next { right: 30px; }

    /* ===== FREEZE OVERLAY ===== */
    .freeze-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 9999;
      display: none;
      pointer-events: none;
    }
    .freeze-overlay.active { display: block; }

    .storage-warning {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff3366;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 10000;
      display: none;
    }
    .storage-warning.active { display: block; }

    .spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.1);
      border-top: 6px solid #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 50000;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
  </style>
</head>
<body>
  <div class="storage-warning" id="storageWarning">⚠️ Storage almost full</div>
  <div class="spinner" id="spinner"></div>

  <a href="https://www.cryptobros.pro/merch.html" class="back-button" target="_blank" rel="noopener noreferrer">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <button class="admin-button" id="adminButton" aria-label="Upload designs">
    <span>📤</span>
    <span>UPLOAD DESIGNS</span>
  </button>

  <button class="freeze-button" id="freezeButton" aria-label="Freeze gallery">
    <span>🔒</span>
    <span>FREEZE GALLERY</span>
  </button>
  
  <button class="freeze-button" id="unfreezeButton" style="bottom: 240px; background: #00ccff; display: none;" aria-label="Unfreeze gallery">
    <span>🔓</span>
    <span>UNFREEZE</span>
  </button>

  <div class="freeze-overlay" id="freezeOverlay"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-label="Image preview">
    <div class="lightbox-close" id="lightboxClose" aria-label="Close" tabindex="0">✕</div>
    <div class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous image" tabindex="0">←</div>
    <div class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image" tabindex="0">→</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" id="uploadButton">CHOOSE IMAGES</button>
      <div class="upload-note">
        Files with numbers (design5.jpg) → slot #5<br>
        Files without numbers → fill empty slots in order<br>
        Max file size: 1.5MB per image<br>
        Max total: ~4.5MB
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      // ===== CONFIG =====
      const STORAGE_KEY = 'cryptobros_designs';
      const FROZEN_KEY = 'cryptobros_frozen';
      const MAX_STORAGE_SIZE = 4.5 * 1024 * 1024; // 4.5MB total
      const MAX_FILE_SIZE = 1.5 * 1024 * 1024; // 1.5MB per file
      
      // ===== STATE =====
      let designs = {};
      let frozen = false;
      let currentLightboxIndex = 1;
      let uploadInProgress = false;
      
      // ===== DOM ELEMENTS =====
      const grid = document.getElementById('designsGrid');
      const fileInput = document.getElementById('designUpload');
      const uploadBtn = document.getElementById('uploadButton');
      const adminBtn = document.getElementById('adminButton');
      const freezeBtn = document.getElementById('freezeButton');
      const unfreezeBtn = document.getElementById('unfreezeButton');
      const overlay = document.getElementById('freezeOverlay');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      const storageWarning = document.getElementById('storageWarning');
      const spinner = document.getElementById('spinner');
      
      // ===== UTILS =====
      function showMessage(text, color, duration = 3000) {
        const msg = document.createElement('div');
        msg.textContent = text;
        msg.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: black;
          border: 3px solid ${color};
          color: ${color};
          padding: 15px 35px;
          border-radius: 60px;
          font-family: 'Sora', sans-serif;
          z-index: 30000;
          text-align: center;
          max-width: 90%;
        `;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), duration);
      }
      
      function setButtonsDisabled(disabled) {
        adminBtn.disabled = disabled || frozen;
        uploadBtn.disabled = disabled || frozen;
      }
      
      function checkStorageSize() {
        try {
          const data = JSON.stringify(designs);
          const size = new Blob([data]).size;
          
          if (size > MAX_STORAGE_SIZE) {
            storageWarning.classList.add('active');
            return false;
          } else {
            storageWarning.classList.remove('active');
            return true;
          }
        } catch (e) {
          console.error('Storage check failed:', e);
          return false;
        }
      }
      
      // ===== RENDER GRID =====
      function renderGrid() {
        if (!grid) return;
        
        let html = '';
        for (let i = 1; i <= 20; i++) {
          const img = designs[i];
          html += `
            <div class="grid-item" data-id="${i}" role="button" tabindex="0" aria-label="Design ${i}${img ? '' : ' empty'}">
              <div class="item-number">${i}</div>
              ${img ? 
                `<img src="${img}" alt="Design ${i}" loading="lazy">` : 
                `<div class="item-placeholder">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>`
              }
            </div>
          `;
        }
        grid.innerHTML = html;
        checkStorageSize();
      }
      
      // ===== LIGHTBOX =====
      function openLightbox(id) {
        if (!designs[id]) {
          showMessage(`Slot #${id} is empty`, '#ffaa00');
          return;
        }
        
        currentLightboxIndex = id;
        lightboxImg.src = designs[id];
        lightboxNum.textContent = `DESIGN #${id}`;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Move focus to close button for screen readers
        setTimeout(() => lightboxClose.focus(), 100);
      }
      
      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
        document.body.style.overflow = '';
      }
      
      function nextLightbox() {
        let next = currentLightboxIndex + 1;
        while (next <= 20 && !designs[next]) {
          next++;
        }
        if (next <= 20) {
          openLightbox(next);
        } else {
          showMessage('No more designs', '#ffaa00');
        }
      }
      
      function prevLightbox() {
        let prev = currentLightboxIndex - 1;
        while (prev >= 1 && !designs[prev]) {
          prev--;
        }
        if (prev >= 1) {
          openLightbox(prev);
        } else {
          showMessage('No more designs', '#ffaa00');
        }
      }
      
      // ===== STORAGE =====
      function saveDesigns() {
        try {
          // Check size BEFORE saving
          const json = JSON.stringify(designs);
          const size = new Blob([json]).size;
          
          if (size > MAX_STORAGE_SIZE) {
            showMessage('❌ Storage limit reached — cannot save more', '#ff3366', 4000);
            storageWarning.classList.add('active');
            return false;
          }
          
          localStorage.setItem(STORAGE_KEY, json);
          storageWarning.classList.remove('active');
          return true;
        } catch (e) {
          if (e.name === 'QuotaExceededError') {
            showMessage('❌ Storage full! Delete some designs', '#ff3366', 4000);
          } else {
            console.error('Save failed:', e);
            showMessage('❌ Save failed', '#ff3366');
          }
          return false;
        }
      }
      
      function loadDesigns() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            designs = JSON.parse(saved);
          } catch (e) {
            console.error('Load error:', e);
            designs = {};
          }
        }
      }
      
      // ===== FILE UPLOAD =====
      function findFirstEmptySlot() {
        for (let i = 1; i <= 20; i++) {
          if (!designs[i]) return i;
        }
        return null;
      }
      
      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }
      
      async function uploadFiles(files) {
        if (frozen) {
          showMessage('🔒 Gallery is frozen', '#ff3366');
          return;
        }
        
        if (uploadInProgress) {
          showMessage('Upload already in progress', '#ffaa00');
          return;
        }
        
        uploadInProgress = true;
        setButtonsDisabled(true);
        spinner.classList.add('active');
        
        let uploaded = 0;
        const errors = [];
        const usedSlots = new Set();
        
        // Check total size first
        let totalSize = 0;
        for (const file of files) {
          if (file.type.startsWith('image/')) {
            totalSize += file.size;
          }
        }
        
        if (totalSize > MAX_STORAGE_SIZE) {
          showMessage(`❌ Total size exceeds ${MAX_STORAGE_SIZE/1024/1024}MB limit`, '#ff3366', 4000);
          uploadInProgress = false;
          setButtonsDisabled(false);
          spinner.classList.remove('active');
          return;
        }
        
        // Split files
        const numberedFiles = [];
        const unnumberedFiles = [];
        
        for (const file of files) {
          if (!file.type.startsWith('image/')) {
            errors.push(`${file.name}: not an image`);
            continue;
          }
          
          if (file.size > MAX_FILE_SIZE) {
            errors.push(`${file.name}: too large (>1.5MB)`);
            continue;
          }
          
          const match = file.name.match(/\d+/);
          if (match) {
            numberedFiles.push({ file, slot: parseInt(match[0]) });
          } else {
            unnumberedFiles.push(file);
          }
        }
        
        // Sort numbered files by slot
        numberedFiles.sort((a, b) => a.slot - b.slot);
        
        // Process numbered files
        for (const { file, slot } of numberedFiles) {
          if (slot < 1 || slot > 20) {
            errors.push(`${file.name}: slot ${slot} out of range`);
            continue;
          }
          
          if (usedSlots.has(slot) || designs[slot]) {
            errors.push(`${file.name}: slot ${slot} already occupied`);
            continue;
          }
          
          try {
            const dataUrl = await readFileAsDataURL(file);
            
            // Test if this would exceed storage
            const testDesigns = { ...designs, [slot]: dataUrl };
            const testSize = new Blob([JSON.stringify(testDesigns)]).size;
            
            if (testSize > MAX_STORAGE_SIZE) {
              errors.push(`${file.name}: would exceed storage limit`);
              continue;
            }
            
            designs[slot] = dataUrl;
            usedSlots.add(slot);
            uploaded++;
            
            // Save incrementally
            saveDesigns();
            renderGrid();
          } catch (err) {
            errors.push(`${file.name}: failed to load`);
          }
        }
        
        // Process unnumbered files
        for (const file of unnumberedFiles) {
          const slot = findFirstEmptySlot();
          if (!slot) {
            errors.push(`${file.name}: no empty slots left`);
            continue;
          }
          
          if (usedSlots.has(slot)) continue;
          
          try {
            const dataUrl = await readFileAsDataURL(file);
            
            // Test if this would exceed storage
            const testDesigns = { ...designs, [slot]: dataUrl };
            const testSize = new Blob([JSON.stringify(testDesigns)]).size;
            
            if (testSize > MAX_STORAGE_SIZE) {
              errors.push(`${file.name}: would exceed storage limit`);
              continue;
            }
            
            designs[slot] = dataUrl;
            usedSlots.add(slot);
            uploaded++;
            
            // Save incrementally
            saveDesigns();
            renderGrid();
          } catch (err) {
            errors.push(`${file.name}: failed to load`);
          }
        }
        
        spinner.classList.remove('active');
        uploadInProgress = false;
        setButtonsDisabled(false);
        
        if (uploaded > 0) {
          saveDesigns();
          renderGrid();
          showMessage(`✅ Uploaded ${uploaded} files`, '#00ff00');
        }
        
        if (errors.length > 0) {
          if (errors.length === 1) {
            showMessage(`⚠️ ${errors[0]}`, '#ff6600', 4000);
          } else {
            showMessage(`⚠️ ${errors.length} errors`, '#ff6600', 4000);
          }
          console.error('Upload errors:', errors);
        }
        
        if (uploaded === 0 && errors.length === 0) {
          showMessage('No valid images found', '#ffaa00');
        }
      }
      
      // ===== FREEZE / UNFREEZE =====
      function freezeGallery() {
        if (frozen) return;
        frozen = true;
        
        localStorage.setItem(FROZEN_KEY, 'true');
        
        freezeBtn.classList.add('frozen');
        freezeBtn.disabled = true;
        freezeBtn.style.display = 'none';
        unfreezeBtn.style.display = 'flex';
        overlay.classList.add('active');
        setButtonsDisabled(true);
        
        showMessage('🔒 Gallery frozen', '#00ff00');
      }
      
      function unfreezeGallery() {
        if (!frozen) return;
        
        if (!confirm('UNFREEZE gallery? This will allow uploads again.')) return;
        
        frozen = false;
        localStorage.removeItem(FROZEN_KEY);
        
        freezeBtn.classList.remove('frozen');
        freezeBtn.disabled = false;
        freezeBtn.style.display = 'flex';
        unfreezeBtn.style.display = 'none';
        overlay.classList.remove('active');
        setButtonsDisabled(false);
        
        showMessage('🔓 Gallery unfrozen', '#00ccff');
      }
      
      function checkFrozen() {
        if (localStorage.getItem(FROZEN_KEY) === 'true') {
          frozen = true;
          freezeBtn.classList.add('frozen');
          freezeBtn.disabled = true;
          freezeBtn.style.display = 'none';
          unfreezeBtn.style.display = 'flex';
          overlay.classList.add('active');
          setButtonsDisabled(true);
        }
      }
      
      // ===== EVENT DELEGATION =====
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        if (item) {
          const id = parseInt(item.dataset.id);
          openLightbox(id);
        }
      });
      
      grid.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          const item = e.target.closest('.grid-item');
          if (item) {
            e.preventDefault();
            const id = parseInt(item.dataset.id);
            openLightbox(id);
          }
        }
      });
      
      // ===== EVENT LISTENERS =====
      adminBtn.addEventListener('click', () => {
        if (frozen) {
          showMessage('🔒 Gallery is frozen', '#ff3366');
          return;
        }
        if (uploadInProgress) {
          showMessage('Upload in progress', '#ffaa00');
          return;
        }
        fileInput.click();
      });
      
      uploadBtn.addEventListener('click', () => {
        if (frozen) {
          showMessage('🔒 Gallery is frozen', '#ff3366');
          return;
        }
        if (uploadInProgress) {
          showMessage('Upload in progress', '#ffaa00');
          return;
        }
        fileInput.click();
      });
      
      fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length) {
          await uploadFiles(files);
        }
        fileInput.value = '';
      });
      
      freezeBtn.addEventListener('click', () => {
        if (!frozen && confirm('FREEZE GALLERY? This will disable uploads.')) {
          freezeGallery();
        }
      });
      
      unfreezeBtn.addEventListener('click', unfreezeGallery);
      
      lightboxClose.addEventListener('click', closeLightbox);
      
      lightboxPrev.addEventListener('click', prevLightbox);
      lightboxNext.addEventListener('click', nextLightbox);
      
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        
        switch(e.key) {
          case 'Escape':
            closeLightbox();
            break;
          case 'ArrowLeft':
            prevLightbox();
            break;
          case 'ArrowRight':
            nextLightbox();
            break;
        }
      });
      
      // ===== INIT =====
      loadDesigns();
      checkFrozen();
      renderGrid();
      checkStorageSize();
    })();
  </script>
</body>
</html>
