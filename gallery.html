<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== STYLES (как в предыдущем коде, без изменений) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,0,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(255,255,0,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 8s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @media (max-width: 768px) {
      body { padding: 15px; }
      .page-title { font-size: 3rem; }
      .back-button { top: 15px; left: 15px; padding: 12px 24px; }
      .admin-button { bottom: 20px; right: 15px; padding: 12px 20px; }
      .freeze-button { bottom: 90px; right: 15px; padding: 12px 20px; }
    }

    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
    }
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }

    .admin-button {
      position: fixed;
      bottom: 100px;
      right: 30px;
      z-index: 1000;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #9945FF;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .admin-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px #9945FF;
    }

    .freeze-button {
      position: fixed;
      bottom: 180px;
      right: 30px;
      z-index: 1000;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff3366;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .freeze-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px #ff3366;
    }
    .freeze-button.frozen {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 30px #00ff00;
      pointer-events: none;
      opacity: 0.7;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      font-weight: 800;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
    }
    @keyframes titleRainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
    }
    .slogan-line1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes line1Glow { 0%,100%{color:#ff6600} 33%{color:#ff00ff} 66%{color:#ffaa00} }
    .slogan-line2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      animation: line2Flicker 3s linear infinite;
    }
    @keyframes line2Flicker { 0%,100%{color:#00ff00} 20%{color:#00ffff} 40%{color:#ffff00} 60%{color:#ff00ff} 80%{color:#00ff00} }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      text-shadow: 0 0 20px #ffdd00;
    }

    .gallery-container { max-width: 1200px; margin: 0 auto; }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00;
    }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
      display: block;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 2;
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      background: #0f0f0f;
    }
    .item-placeholder .emoji { font-size: 3.5rem; opacity: 0.5; }

    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
    }
    .upload-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff;
    }
    .upload-btn {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      box-shadow: 0 0 30px #00ff00;
    }
    .upload-btn:hover {
      background: #00ff00;
      color: #000;
      transform: scale(1.1);
    }
    .hidden-input { display: none; }
    .upload-note {
      color: #ffaa00;
      margin-top: 25px;
      font-size: 14px;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      z-index: 10001;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-family: 'Syne', sans-serif;
    }

    .freeze-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 9999;
      display: none;
      pointer-events: none;
    }
    .freeze-overlay.active { display: block; }
  </style>
</head>
<body>
  <a href="https://www.cryptobros.pro/merch.html" class="back-button" target="_blank" rel="noopener noreferrer">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <button class="admin-button" id="adminButton">
    <span>📤</span>
    <span>UPLOAD DESIGNS</span>
  </button>

  <button class="freeze-button" id="freezeButton">
    <span>🔒</span>
    <span>FREEZE GALLERY</span>
  </button>

  <div class="freeze-overlay" id="freezeOverlay"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" id="uploadButton">CHOOSE IMAGES</button>
      <div class="upload-note">
        Files with numbers (design5.jpg) → slot #5<br>
        Files without numbers → fill empty slots in order
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      // ===== ТОЛЬКО ДЛЯ ТЕБЯ =====
      // Замени 'cryptobros' на свой пароль
      const SECRET_KEY = 'cryptobros'; 
      
      // Проверяем секретный ключ в URL
      // Пример: file.html?key=cryptobros
      const urlParams = new URLSearchParams(window.location.search);
      const isAdmin = urlParams.get('key') === SECRET_KEY;
      
      let designs = {};
      let frozen = false;
      
      // DOM элементы
      const grid = document.getElementById('designsGrid');
      const fileInput = document.getElementById('designUpload');
      const uploadBtn = document.getElementById('uploadButton');
      const adminBtn = document.getElementById('adminButton');
      const freezeBtn = document.getElementById('freezeButton');
      const overlay = document.getElementById('freezeOverlay');
      const uploadSection = document.getElementById('uploadSection');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      
      // ===== Если не админ - прячем кнопки =====
      if (!isAdmin) {
        adminBtn.style.display = 'none';
        uploadSection.style.display = 'none';
        freezeBtn.style.display = 'none';
      }
      
      // ===== Показываем сообщение только админу =====
      function showMessage(text, color) {
        if (!isAdmin) return; // Только админ видит сообщения
        
        const msg = document.createElement('div');
        msg.textContent = text;
        msg.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: black;
          border: 3px solid ${color};
          color: ${color};
          padding: 15px 35px;
          border-radius: 60px;
          font-family: 'Sora', sans-serif;
          z-index: 30000;
        `;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
      }
      
      // ===== Render grid =====
      function renderGrid() {
        let html = '';
        for (let i = 1; i <= 20; i++) {
          const img = designs[i];
          html += `
            <div class="grid-item" data-id="${i}">
              <div class="item-number">${i}</div>
              ${img ? 
                `<img src="${img}" alt="Design ${i}">` : 
                `<div class="item-placeholder">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>`
              }
            </div>
          `;
        }
        grid.innerHTML = html;
      }
      
      // ===== Lightbox =====
      function openLightbox(id) {
        if (designs[id]) {
          lightboxImg.src = designs[id];
          lightboxNum.textContent = `DESIGN #${id}`;
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden';
        } else {
          showMessage(`Slot #${id} is empty`, '#ffaa00');
        }
      }
      
      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
        document.body.style.overflow = '';
      }
      
      // ===== Save to localStorage =====
      function saveDesigns() {
        localStorage.setItem('cryptobros_designs', JSON.stringify(designs));
      }
      
      // ===== Load from localStorage =====
      function loadDesigns() {
        const saved = localStorage.getItem('cryptobros_designs');
        if (saved) {
          try {
            designs = JSON.parse(saved);
          } catch (e) {
            designs = {};
          }
        }
      }
      
      // ===== Upload files (только для админа) =====
      async function uploadFiles(files) {
        if (!isAdmin) return;
        if (frozen) {
          showMessage('🔒 Gallery is frozen', '#ff3366');
          return;
        }
        
        let uploaded = 0;
        
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          
          const match = file.name.match(/\d+/);
          let slot = match ? parseInt(match[0]) : null;
          
          if (slot && (slot < 1 || slot > 20)) {
            slot = null;
          }
          
          if (!slot) {
            for (let i = 1; i <= 20; i++) {
              if (!designs[i]) {
                slot = i;
                break;
              }
            }
          }
          
          if (slot && !designs[slot]) {
            try {
              const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
              });
              
              designs[slot] = dataUrl;
              uploaded++;
            } catch (err) {
              console.error('Error reading file:', file.name, err);
            }
          }
        }
        
        if (uploaded > 0) {
          saveDesigns();
          renderGrid();
          showMessage(`✅ Uploaded ${uploaded} files`, '#00ff00');
        }
      }
      
      // ===== Freeze gallery (только для админа) =====
      function freezeGallery() {
        if (!isAdmin) return;
        if (frozen) return;
        
        frozen = true;
        localStorage.setItem('cryptobros_frozen', 'true');
        
        freezeBtn.classList.add('frozen');
        freezeBtn.innerHTML = '<span>✅</span><span>GALLERY FROZEN</span>';
        overlay.classList.add('active');
        
        showMessage('🔒 Gallery frozen', '#00ff00');
      }
      
      // ===== Check if frozen =====
      function checkFrozen() {
        if (localStorage.getItem('cryptobros_frozen') === 'true') {
          frozen = true;
          
          if (isAdmin) {
            freezeBtn.classList.add('frozen');
            freezeBtn.innerHTML = '<span>✅</span><span>GALLERY FROZEN</span>';
          }
          
          overlay.classList.add('active');
        }
      }
      
      // ===== Event listeners =====
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        if (item) {
          const id = parseInt(item.dataset.id);
          openLightbox(id);
        }
      });
      
      // Только админ может нажимать кнопки
      if (isAdmin) {
        adminBtn.addEventListener('click', () => {
          if (frozen) {
            showMessage('🔒 Gallery is frozen', '#ff3366');
            return;
          }
          fileInput.click();
        });
        
        uploadBtn.addEventListener('click', () => {
          if (frozen) {
            showMessage('🔒 Gallery is frozen', '#ff3366');
            return;
          }
          fileInput.click();
        });
        
        fileInput.addEventListener('change', async (e) => {
          const files = Array.from(e.target.files);
          if (files.length) {
            await uploadFiles(files);
          }
          fileInput.value = '';
        });
        
        freezeBtn.addEventListener('click', () => {
          if (!frozen && confirm('FREEZE GALLERY? This cannot be undone!')) {
            freezeGallery();
          }
        });
      }
      
      lightboxClose.addEventListener('click', closeLightbox);
      
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
          closeLightbox();
        }
      });
      
      // ===== Initialize =====
      loadDesigns();
      checkFrozen();
      renderGrid();
    })();
  </script>
</body>
</html>
