<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — MERCH GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Archivo Black', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
      transition: background-color 0.3s, color 0.3s;
    }

    body.light-mode {
      background: #f0f0f0;
      color: black;
    }

    /* Back button */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      font-size: 1.2rem;
      z-index: 1000;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .back-button:hover {
      box-shadow: 0 0 20px #ffcc00;
      background: rgba(0,0,0,0.9);
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1000;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .theme-toggle:hover {
      box-shadow: 0 0 20px #ffcc00;
      transform: scale(1.1);
    }

    /* Titles */
    .page-title {
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(255,51,102,0.5));
    }

    .slogan-line1 {
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
      text-transform: uppercase;
      text-shadow: 0 0 15px #ff6600;
    }

    .slogan-line2 {
      font-size: 1.5rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
      text-shadow: 0 0 15px #00ff00;
    }

    .section-title {
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
      text-shadow: 0 0 15px #ffdd00;
    }

    /* Grid 6x5 = 30 slots */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }

    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 480px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }

    .grid-item:hover {
      box-shadow: inset 0 0 30px rgba(255,204,0,0.3);
      z-index: 5;
    }

    /* Remove extra borders */
    .grid-item:nth-child(6n) { border-right: none; }
    .grid-item:nth-last-child(-n+6) { border-bottom: none; }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: bold;
      box-shadow: 0 0 10px #ffcc00;
      z-index: 2;
    }

    /* Empty slot placeholder */
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 50px #ff00ff;
    }

    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .lightbox-close:hover {
      box-shadow: 0 0 40px #ff00ff;
      transform: scale(1.1);
    }

    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      box-shadow: 0 0 25px #00ffff;
    }
  </style>
</head>
<body>
  <!-- Back button -->
  <a href="/merch.html" class="back-button">← BACK TO MERCH</a>
  
  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">🌙</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <!-- Main content -->
  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
    <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    <div class="section-title">⚡ DESIGNS 1–30 ⚡</div>
    
    <!-- Grid 30 slots -->
    <div class="image-grid" id="designsGrid"></div>
  </div>

  <script>
    (function() {
      // ========== FILE NAMES ACCORDING TO YOUR LIST ==========
      // 30 images: 1a.png through 31a.png, but 17a.png is MISSING
      
      const IMAGE_PATH = 'merch-artworks/';
      
      // Array of 30 filenames in correct order
      const imageFiles = [
        '1a.png', '2a.png', '3a.png', '4a.png', '5a.png',
        '6a.png', '7a.png', '8a.png', '9a.png', '10a.png',
        '11a.png', '12a.png', '13a.png', '14a.png', '15a.png',
        '16a.png',           // slot 16
        // slot 17 is EMPTY (17a.png missing)
        '18a.png', '19a.png', '20a.png', '21a.png', '22a.png',
        '23a.png', '24a.png', '25a.png', '26a.png', '27a.png',
        '28a.png', '29a.png', '30a.png', '31a.png'
      ];

      // Elements
      const grid = document.getElementById('designsGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const themeToggle = document.getElementById('themeToggle');

      // ========== THEME TOGGLE ==========
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.textContent = '☀️';
      }

      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      });

      // ========== RENDER GRID ==========
      function renderGrid() {
        let html = '';
        
        for (let slot = 1; slot <= 30; slot++) {
          html += '<div class="grid-item" data-id="' + slot + '">';
          html += '<div class="item-number">' + slot + '</div>';
          
          // Check if this slot should have an image
          // Slot 17 is empty
          if (slot === 17) {
            // Empty slot
            html += '<div class="item-placeholder"><div style="font-size:50px;">🎨</div><div>EMPTY</div></div>';
          } else {
            // Calculate array index: 
            // For slots 1-16: index = slot-1
            // For slots 18-30: index = slot-2 (because we skipped 17)
            let imageIndex;
            if (slot < 17) {
              imageIndex = slot - 1;
            } else {
              // slot >= 18
              imageIndex = slot - 2;
            }
            
            const fileName = imageFiles[imageIndex];
            const imagePath = IMAGE_PATH + fileName;
            
            html += '<img src="' + imagePath + '" alt="Design ' + slot + '" loading="lazy">';
          }
          
          html += '</div>';
        }
        
        grid.innerHTML = html;
      }

      // Run render
      renderGrid();

      // ========== LIGHTBOX ==========
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        if (!item) return;
        
        const slot = item.dataset.id;
        const img = item.querySelector('img');
        
        // Only open lightbox if there's an image
        if (img && img.src) {
          lightboxImg.src = img.src;
          lightboxNum.textContent = 'DESIGN #' + slot;
          lightbox.classList.add('active');
        }
      });

      // Close lightbox
      lightboxClose.addEventListener('click', () => {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      // Preload images (optional)
      window.addEventListener('load', () => {
        for (let i = 0; i < imageFiles.length; i++) {
          if (i !== 16) { // skip 17a (index 16)
            const img = new Image();
            img.src = IMAGE_PATH + imageFiles[i];
          }
        }
      });

    })();
  </script>
</body>
</html>
