<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo Black', sans-serif;
      background: url('bg3.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
      padding: 30px;
    }
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 12px 28px;
      color: #ffcc00;
      text-decoration: none;
      z-index: 1000;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 1000;
    }
    #adminButton {
      position: fixed;
      top: 20px;
      right: 90px;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      color: #ff00ff;
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 1000;
    }
    #emergencyClearBtn {
      position: fixed;
      top: 20px;
      right: 240px;
      background: #ff0000;
      border: 2px solid white;
      color: white;
      padding: 12px 20px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1rem;
      z-index: 1000;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); background: #ff4444; }
      100% { transform: scale(1); }
    }
    .page-title {
      font-size: 4.5rem;
      text-align: center;
      margin: 60px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 { 
      font-size: 2rem; 
      text-align: center; 
      color: #ff6600; 
    }
    .slogan-line2 { 
      font-size: 1.4rem; 
      text-align: center; 
      color: #00ff00; 
      margin-bottom: 40px; 
    }
    .section-title { 
      font-size: 2.5rem; 
      color: #ffdd00; 
      border-bottom: 4px solid #ffdd00; 
      margin: 40px 0 30px; 
      text-align: center; 
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    @media (max-width: 1024px) { .image-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .image-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .image-grid { grid-template-columns: 1fr; } }
    .grid-item {
      aspect-ratio: 1/1;
      background: rgba(0,0,0,0.6);
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }
    .grid-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
    }
    .item-number {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 36px;
      height: 36px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      z-index: 2;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      z-index: 3;
    }
    .grid-item:hover .delete-btn { opacity: 1; }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15,15,15,0.7);
      color: #666;
    }
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(17,17,17,0.8);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    .upload-title { 
      font-size: 2.5rem; 
      color: #ff00ff; 
      margin-bottom: 20px; 
    }
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
    }
    .hidden-input { display: none; }
    .storage-info { 
      color: #ffaa00; 
      margin: 10px 0; 
      font-size: 1.2rem; 
    }
    .storage-bar {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      transition: width 0.4s;
    }
    .info-text {
      color: #cccccc;
      margin: 20px 0;
      font-family: Arial, sans-serif;
    }
    #clearAllBtn {
      margin-top: 20px;
      background: #ff3366;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      color: white;
      cursor: pointer;
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border: 4px solid #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3.5rem;
      cursor: pointer;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.6rem;
      background: black;
      padding: 12px 30px;
      border: 3px solid #00ffff;
      border-radius: 60px;
    }
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      z-index: 9999;
      display: none;
      border: 2px solid #ffcc00;
    }
    #toast.show { display: block; }
    #loadingIndicator {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 20000;
      display: none;
      align-items: center;
      justify-content: center;
      color: #00ffff;
      font-size: 3rem;
    }
    #loadingIndicator.active { display: flex; }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>

  <a href="/merch.html" class="back-button">← BACK</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>
  <button id="emergencyClearBtn">⚠️ EMERGENCY CLEAR</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR MERCH</div>
    <div class="slogan-line2">FAKES FEAR THE TRUTH</div>
    <div class="section-title">⚡ SLOTS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section">
      <div class="upload-title">📤 UPLOAD PNG</div>
      <div class="storage-info" id="storageInfo">0/20 slots</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width:0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/png" multiple>
      <button id="uploadButton">📁 SELECT PNG FILES</button>
      <div class="info-text">
        • Files with number in name → go to that slot<br>
        • No number → first empty slot<br>
        • Only .png • max 5 MB per file
      </div>
      <button id="clearAllBtn">🗑️ CLEAR ALL SLOTS</button>
    </div>
  </div>

  <script>
    const TOTAL_SLOTS = 20;
    let designs = {};

    // Load from storage
    try {
      const saved = localStorage.getItem('cryptobros_gallery');
      if (saved) designs = JSON.parse(saved);
    } catch (e) {
      console.log('Error loading:', e);
    }

    // DOM elements
    const grid = document.getElementById('designsGrid');
    const uploadBtn = document.getElementById('uploadButton');
    const adminBtn = document.getElementById('adminButton');
    const fileInput = document.getElementById('designUpload');
    const clearBtn = document.getElementById('clearAllBtn');
    const emergencyBtn = document.getElementById('emergencyClearBtn');
    const storageInfo = document.getElementById('storageInfo');
    const storageFill = document.getElementById('storageFill');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxNum = document.getElementById('lightboxNumber');
    const lightboxClose = document.getElementById('lightboxClose');
    const loader = document.getElementById('loadingIndicator');
    const toast = document.getElementById('toast');
    const themeToggle = document.getElementById('themeToggle');

    // Theme
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
      themeToggle.textContent = '☀️';
    }
    themeToggle.onclick = () => {
      document.body.classList.toggle('light-mode');
      themeToggle.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };

    function showToast(msg, color) {
      toast.textContent = msg;
      toast.style.borderColor = color;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function save() {
      try {
        localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
        return true;
      } catch (e) {
        showToast('STORAGE FULL! Use EMERGENCY CLEAR', '#ff3366');
        return false;
      }
    }

    function render() {
      grid.innerHTML = '';
      let filled = 0;
      
      for (let i = 1; i <= TOTAL_SLOTS; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.id = i;

        const num = document.createElement('div');
        num.className = 'item-number';
        num.textContent = i;
        item.appendChild(num);

        if (designs[i]) {
          filled++;
          const img = document.createElement('img');
          img.src = designs[i];
          img.alt = `Slot ${i}`;
          img.onerror = () => {
            img.style.display = 'none';
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3366;';
            errorDiv.textContent = 'ERROR';
            item.appendChild(errorDiv);
          };
          item.appendChild(img);

          const del = document.createElement('div');
          del.className = 'delete-btn';
          del.textContent = '✕';
          del.onclick = (e) => {
            e.stopPropagation();
            if (confirm(`Delete slot #${i}?`)) {
              delete designs[i];
              save();
              render();
              showToast(`Slot #${i} cleared`, '#ff3366');
            }
          };
          item.appendChild(del);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = 'item-placeholder';
          placeholder.innerHTML = '<div style="font-size:60px;">🎨</div><div>EMPTY</div>';
          item.appendChild(placeholder);
        }
        grid.appendChild(item);
      }
      
      storageFill.style.width = `${(filled / TOTAL_SLOTS) * 100}%`;
      storageInfo.textContent = `${filled}/${TOTAL_SLOTS} slots`;
    }

    // EMERGENCY CLEAR - fixes quota exceeded error
    emergencyBtn.onclick = () => {
      if (confirm('⚠️ EMERGENCY: Clear ALL localStorage? This will delete all images!')) {
        localStorage.clear();
        designs = {};
        render();
        showToast('Storage cleared!', '#00ff00');
      }
    };

    // Upload
    adminBtn.onclick = () => fileInput.click();
    uploadBtn.onclick = () => fileInput.click();

    fileInput.onchange = async () => {
      const files = Array.from(fileInput.files);
      if (!files.length) return;

      uploadBtn.disabled = true;
      adminBtn.disabled = true;
      loader.classList.add('active');

      let successCount = 0;

      for (const file of files) {
        try {
          if (!file.name.toLowerCase().endsWith('.png')) {
            showToast(`${file.name} not PNG`, '#ffaa00');
            continue;
          }
          if (file.size > 5_000_000) {
            showToast(`${file.name} too big`, '#ffaa00');
            continue;
          }

          const dataUrl = await new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.onerror = rej;
            reader.readAsDataURL(file);
          });

          let slot = null;
          const match = file.name.match(/(\d+)/);
          if (match) {
            const num = parseInt(match[1], 10);
            if (num >= 1 && num <= TOTAL_SLOTS) slot = num;
          }

          if (!slot) {
            for (let i = 1; i <= TOTAL_SLOTS; i++) {
              if (!designs[i]) { 
                slot = i; 
                break; 
              }
            }
          }

          if (!slot) {
            showToast('No free slots!', '#ff3366');
            continue;
          }

          if (designs[slot] && !confirm(`Slot #${slot} is occupied. Overwrite?`)) {
            continue;
          }

          designs[slot] = dataUrl;
          successCount++;
          
        } catch (err) {
          showToast(`Error with ${file.name}`, '#ff3366');
        }
      }

      if (successCount > 0) {
        if (save()) {
          render();
          showToast(`Uploaded ${successCount} file(s)`, '#00ff00');
        }
      }

      loader.classList.remove('active');
      uploadBtn.disabled = false;
      adminBtn.disabled = false;
      fileInput.value = '';
    };

    // Clear all slots
    clearBtn.onclick = () => {
      if (confirm('Clear ALL slots?')) {
        designs = {};
        save();
        render();
        showToast('All slots cleared', '#ff3366');
      }
    };

    // Lightbox
    grid.onclick = (e) => {
      const item = e.target.closest('.grid-item');
      if (item && !e.target.closest('.delete-btn') && designs[item.dataset.id]) {
        lightboxImg.src = designs[item.dataset.id];
        lightboxNum.textContent = `SLOT #${item.dataset.id}`;
        lightbox.classList.add('active');
      }
    };

    lightboxClose.onclick = () => lightbox.classList.remove('active');
    lightbox.onclick = (e) => { 
      if (e.target === lightbox) lightbox.classList.remove('active'); 
    };
    document.onkeydown = (e) => { 
      if (e.key === 'Escape') lightbox.classList.remove('active'); 
    };

    // Initial render
    render();
  </script>
</body>
</html>
