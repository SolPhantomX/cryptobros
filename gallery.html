<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Syne', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
      transition: 0.3s;
    }
    body.light-mode {
      background: #f0f0f0;
      color: black;
    }
    body.light-mode .grid-item {
      background: white;
      border-color: #ccc;
    }
    
    /* BACK BUTTON */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      font-weight: 700;
      z-index: 1000;
    }
    
    @media (max-width: 768px) {
      .back-button { padding: 12px 24px; font-size: 14px; top: 15px; left: 15px; }
    }
    
    /* THEME TOGGLE */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1000;
    }
    
    @media (max-width: 768px) {
      .theme-toggle { width: 50px; height: 50px; font-size: 24px; top: 15px; right: 15px; }
    }
    
    /* UPLOAD BUTTON */
    #adminButton {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-weight: 700;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 0 30px #9945FF;
    }
    
    @media (max-width: 768px) {
      #adminButton { padding: 12px 24px; font-size: 14px; bottom: 15px; right: 15px; }
    }
    
    .page-title {
      font-weight: 800;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    @media (max-width: 768px) {
      .page-title { font-size: 3rem; margin: 60px 0 20px; }
    }
    
    .slogan-line1 {
      font-weight: 700;
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
    }
    
    .slogan-line2 {
      font-weight: 700;
      font-size: 1.3rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
    }
    
    .section-title {
      font-weight: 800;
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }
    
    @media (max-width: 1024px) { 
      .image-grid { grid-template-columns: repeat(3, 1fr); } 
    }
    @media (max-width: 768px) { 
      .image-grid { grid-template-columns: repeat(2, 1fr); } 
    }
    @media (max-width: 480px) { 
      .image-grid { grid-template-columns: 1fr; } 
    }
    
    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: 700;
      z-index: 2;
    }
    
    @media (max-width: 480px) {
      .item-number { width: 30px; height: 30px; font-size: 14px; top: 5px; left: 5px; }
    }
    
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      font-weight: 700;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .grid-item:hover .delete-btn {
      opacity: 1;
    }
    
    @media (max-width: 480px) {
      .delete-btn { width: 30px; height: 30px; font-size: 16px; top: 5px; right: 5px; opacity: 0.7; }
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
    }
    .item-placeholder .emoji { font-size: 3.5rem; }
    
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: #111;
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    
    .upload-title {
      font-weight: 800;
      font-size: 2.5rem;
      color: #ff00ff;
      margin-bottom: 30px;
    }
    
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
    }
    
    #uploadButton:hover {
      background: #00ff00;
      color: black;
    }
    
    #uploadButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .hidden-input { display: none; }
    
    .storage-info {
      color: #ffaa00;
      font-weight: 700;
      margin-top: 10px;
    }
    
    .storage-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 10px;
    }
    
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00, #ff3366);
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      font-weight: 700;
    }
    
    #loadingIndicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      background: black;
      padding: 20px 40px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      z-index: 40000;
      display: none;
    }
    #loadingIndicator.active { display: block; }
    
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 15px 30px;
      border-radius: 60px;
      font-weight: 700;
      z-index: 50000;
      display: none;
      border: 2px solid #ffcc00;
    }
    #toast.show { display: block; }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>
  
  <a href="https://www.cryptobros.pro/merch.html" class="back-button">← BACK TO MERCH</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="" loading="lazy">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
    <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <div class="storage-info" id="storageInfo">Storage: 0/4.5 MB</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width: 0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button id="uploadButton">CHOOSE IMAGES</button>
      <div style="color:#ffaa00; margin-top:25px; font-weight:700;">
        Files with numbers → that slot<br>
        Files without numbers → fill empty slots<br>
        Max 1.5MB per image • 4.5MB total
      </div>
      <button id="clearAllBtn" style="margin-top:20px; background:#ff3366; border:none; padding:10px 20px; border-radius:60px; color:white; font-weight:700; cursor:pointer;">🗑️ CLEAR ALL</button>
    </div>
  </div>

  <script>
    (function() {
      const MAX_TOTAL = 4.5 * 1024 * 1024; // 4.5MB
      const MAX_FILE = 1.5 * 1024 * 1024; // 1.5MB
      
      let designs = {};

      // Elements
      const themeToggle = document.getElementById('themeToggle');
      const adminBtn = document.getElementById('adminButton');
      const uploadSection = document.getElementById('uploadSection');
      const uploadBtn = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const grid = document.getElementById('designsGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const loader = document.getElementById('loadingIndicator');
      const toast = document.getElementById('toast');
      const storageInfo = document.getElementById('storageInfo');
      const storageFill = document.getElementById('storageFill');
      const clearAllBtn = document.getElementById('clearAllBtn');

      // Toast function
      function showToast(msg, color = '#00ffff') {
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      // Update storage indicator
      function updateStorage() {
        try {
          const size = new Blob([JSON.stringify(designs)]).size;
          const percent = Math.min(100, (size / MAX_TOTAL) * 100);
          storageFill.style.width = percent + '%';
          storageInfo.textContent = `Storage: ${(size / 1024 / 1024).toFixed(2)}/4.5 MB`;
          
          if (percent > 90) storageFill.style.background = '#ff3366';
          else if (percent > 70) storageFill.style.background = '#ffaa00';
          else storageFill.style.background = '#00ff00';
        } catch (e) {}
      }

      // Load saved designs
      try {
        const saved = localStorage.getItem('cryptobros_gallery');
        if (saved) designs = JSON.parse(saved);
      } catch (e) {
        localStorage.removeItem('cryptobros_gallery');
      }

      // Render grid
      function render() {
        let html = '';
        for (let i = 1; i <= 20; i++) {
          html += '<div class="grid-item" data-id="'+i+'">';
          html += '<div class="item-number">'+i+'</div>';
          if (designs[i]) {
            html += '<img src="'+designs[i]+'" alt="" loading="lazy">';
            html += '<div class="delete-btn" data-delete="'+i+'">✕</div>';
          } else {
            html += '<div class="item-placeholder"><div class="emoji">🎨</div><div>EMPTY</div></div>';
          }
          html += '</div>';
        }
        grid.innerHTML = html;
        updateStorage();
      }
      render();

      // Theme toggle
      if (themeToggle) {
        if (localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light-mode');
          themeToggle.textContent = '☀️';
        }
        themeToggle.onclick = () => {
          document.body.classList.toggle('light-mode');
          const isLight = document.body.classList.contains('light-mode');
          themeToggle.textContent = isLight ? '☀️' : '🌙';
          localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
      }

      // Delete handler
      grid.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) {
          e.stopPropagation();
          const slot = deleteBtn.dataset.delete;
          if (confirm(`Delete design #${slot}?`)) {
            delete designs[slot];
            localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
            render();
            showToast(`✅ Design #${slot} deleted`, '#00ff00');
          }
        }
      });

      // Clear all
      if (clearAllBtn) {
        clearAllBtn.onclick = () => {
          if (confirm('Delete ALL designs?')) {
            designs = {};
            localStorage.removeItem('cryptobros_gallery');
            render();
            showToast('✅ All designs cleared', '#ff3366');
          }
        };
      }

      // Lightbox
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        const deleteBtn = e.target.closest('.delete-btn');
        if (item && !deleteBtn) {
          const id = item.dataset.id;
          if (designs[id]) {
            lightboxImg.src = designs[id];
            lightboxNum.textContent = 'DESIGN #' + id;
            lightbox.classList.add('active');
          }
        }
      });

      lightboxClose.onclick = () => {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      };

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        }
      });

      // Upload button scroll
      adminBtn.onclick = () => uploadSection.scrollIntoView({ behavior: 'smooth' });

      // File upload
      uploadBtn.onclick = () => fileInput.click();

      fileInput.onchange = async function(e) {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        
        if (files.length === 0) {
          showToast('❌ No valid images selected', '#ff3366');
          return;
        }

        // Check total size
        let estimatedSize = 0;
        files.forEach(f => estimatedSize += f.size * 1.4); // base64 overhead
        const currentSize = new Blob([JSON.stringify(designs)]).size || 0;
        
        if (currentSize + estimatedSize > MAX_TOTAL) {
          showToast('❌ Storage limit exceeded', '#ff3366');
          return;
        }

        // Disable button
        uploadBtn.disabled = true;
        loader.classList.add('active');

        const errors = [];
        const newDesigns = { ...designs };
        let processed = 0;

        for (const file of files) {
          // Check file size
          if (file.size > MAX_FILE) {
            errors.push(`${file.name} >1.5MB`);
            processed++;
            continue;
          }

          try {
            // Read file
            const dataUrl = await new Promise((res, rej) => {
              const reader = new FileReader();
              reader.onload = () => res(reader.result);
              reader.onerror = rej;
              reader.readAsDataURL(file);
            });

            // Find slot
            const match = file.name.match(/\d+/);
            let slot = match ? parseInt(match[0]) : null;

            if (slot && slot >= 1 && slot <= 20) {
              // Check if slot is taken
              if (newDesigns[slot] && !confirm(`Slot ${slot} is taken. Overwrite?`)) {
                processed++;
                continue;
              }
              newDesigns[slot] = dataUrl;
            } else {
              // Find empty slot
              for (let i = 1; i <= 20; i++) {
                if (!newDesigns[i]) {
                  slot = i;
                  newDesigns[i] = dataUrl;
                  break;
                }
              }
              if (!slot) errors.push('No empty slots');
            }
          } catch (err) {
            errors.push(`${file.name} failed`);
          }
          processed++;
        }

        // Save
        if (Object.keys(newDesigns).length > 0) {
          designs = newDesigns;
          localStorage.setItem('cryptobros_gallery', JSON.stringify(designs));
          render();
          showToast(`✅ Uploaded ${files.length - errors.length} images`, '#00ff00');
        }

        if (errors.length > 0) {
          showToast(`⚠️ ${errors.length} errors`, '#ffaa00');
        }

        loader.classList.remove('active');
        uploadBtn.disabled = false;
        fileInput.value = '';
      };

    })();
  </script>
</body>
</html>
