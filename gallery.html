<script>
    (function() {
      // ===== INITIAL DESIGNS =====
      let designImages = {};
      let isFrozen = false;

      // DOM elements
      const adminButton = document.getElementById('adminButton');
      const freezeButton = document.getElementById('freezeButton');
      const freezeOverlay = document.getElementById('freezeOverlay');
      const uploadSection = document.getElementById('uploadSection');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const sloganLine1 = document.getElementById('sloganLine1');
      const sloganLine2 = document.getElementById('sloganLine2');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');

      let currentToast = null;

      // ===== Toast =====
      function showToast(msg, color) {
        if (currentToast && currentToast.parentNode) {
          currentToast.remove();
          currentToast = null;
        }
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.style.color = color;
        toast.style.boxShadow = `0 0 60px ${color}`;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = 'rgba(0,0,0,0.98)';
        toast.style.border = '3px solid';
        toast.style.padding = '15px 35px';
        toast.style.borderRadius = '60px';
        toast.style.fontFamily = 'Sora, sans-serif';
        toast.style.fontWeight = '600';
        toast.style.zIndex = '30000';
        toast.style.animation = 'slideUp 0.3s ease';
        document.body.appendChild(toast);
        
        currentToast = toast;
        
        setTimeout(() => {
          if (currentToast && currentToast.parentNode) {
            currentToast.remove();
            if (currentToast === toast) currentToast = null;
          }
        }, 2000);
      }

      // ===== Render grid =====
      function renderDesigns() {
        const grid = document.getElementById('designsGrid');
        if (!grid) return;
        
        let html = '';

        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += `
            <div class="grid-item" data-design-id="${i}">
              <div class="item-number">${i}</div>
              ${img ? `
                <img src="${img}" alt="Design ${i}" loading="lazy" onclick="if(window.openLightbox) window.openLightbox(${i})">
              ` : `
                <div class="item-placeholder" onclick="if(window.openLightbox) window.openLightbox(${i})">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>
              `}
            </div>
          `;
        }
        grid.innerHTML = html;
      }

      // ===== Lightbox (объявляем в глобальной области видимости правильно) =====
      window.openLightbox = function(num) {
        if (designImages[num]) {
          lightboxImg.src = designImages[num];
          lightboxNumber.textContent = `DESIGN #${num}`;
          lightbox.classList.add('active');
        } else {
          showToast(`Slot #${num} is empty`, '#ffaa00');
        }
      };

      // ===== Find next empty slot =====
      function findNextEmptySlot(startFrom = 1) {
        for (let i = startFrom; i <= 20; i++) {
          if (!designImages[i]) return i;
        }
        return null;
      }

      // ===== Process files in correct order =====
      async function processFiles(files) {
        // Separate files with numbers and without
        const numberedFiles = [];
        const unnamedFiles = [];
        const usedNumbers = new Set(); // Отслеживаем использованные номера
        
        for (const file of files) {
          const match = file.name.match(/\d+/);
          if (match) {
            const num = parseInt(match[0]);
            if (num >= 1 && num <= 20) {
              // Проверяем, не использован ли уже этот номер в текущей загрузке
              if (!usedNumbers.has(num)) {
                numberedFiles.push({ file, number: num });
                usedNumbers.add(num);
              } else {
                showToast(`⚠️ Duplicate number ${num} in files, skipping second`, '#ffaa00');
              }
            } else {
              unnamedFiles.push(file);
            }
          } else {
            unnamedFiles.push(file);
          }
        }

        // Sort numbered files by their number
        numberedFiles.sort((a, b) => a.number - b.number);
        
        let successCount = 0;
        let failCount = 0;
        const totalFiles = numberedFiles.length + unnamedFiles.length;
        
        // Show progress bar
        progressBar.classList.add('active');
        progressFill.style.width = '0%';

        // First process numbered files (they go to specific slots)
        for (const item of numberedFiles) {
          const num = item.number;
          
          // Check if slot is already occupied (из предыдущих загрузок)
          if (designImages[num]) {
            showToast(`⚠️ Slot #${num} is already occupied, skipping`, '#ffaa00');
            failCount++;
            progressFill.style.width = `${((successCount + failCount) / totalFiles) * 100}%`;
            continue;
          }

          try {
            const dataUrl = await readFileAsDataURL(item.file);
            designImages[num] = dataUrl;
            successCount++;
            progressFill.style.width = `${((successCount + failCount) / totalFiles) * 100}%`;
          } catch (error) {
            console.error('Error reading file:', error);
            failCount++;
          }
        }

        // Then process unnamed files (fill empty slots in order)
        let nextSlot = 1;
        for (const file of unnamedFiles) {
          // Find next empty slot
          while (nextSlot <= 20 && designImages[nextSlot]) {
            nextSlot++;
          }
          
          if (nextSlot > 20) {
            showToast('❌ No empty slots left for remaining files', '#ff3366');
            failCount += unnamedFiles.length - unnamedFiles.indexOf(file);
            break;
          }

          try {
            const dataUrl = await readFileAsDataURL(file);
            designImages[nextSlot] = dataUrl;
            successCount++;
            progressFill.style.width = `${((successCount + failCount) / totalFiles) * 100}%`;
            nextSlot++;
          } catch (error) {
            console.error('Error reading file:', error);
            failCount++;
          }
        }

        // Hide progress bar
        setTimeout(() => {
          progressBar.classList.remove('active');
        }, 500);

        // Save and render
        saveFrozenDesigns();
        renderDesigns();
        
        showToast(`✅ Uploaded: ${successCount}, Skipped: ${failCount}`, successCount > 0 ? '#00ff00' : '#ff3366');
      }

      // Вспомогательная функция для чтения файла
      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // ===== Save to localStorage =====
      function saveFrozenDesigns() {
        try {
          localStorage.setItem('cryptobros_designs', JSON.stringify(designImages));
        } catch (e) {
          showToast('❌ Failed to save', '#ff3366');
        }
      }

      // ===== Load saved designs =====
      function loadSavedDesigns() {
        try {
          const saved = localStorage.getItem('cryptobros_designs');
          if (saved) {
            designImages = JSON.parse(saved) || {};
          }
        } catch (e) {
          designImages = {};
        }
      }

      // ===== Freeze function =====
      function freezeGallery() {
        if (isFrozen) return;
        
        isFrozen = true;
        
        // Save frozen state
        try {
          localStorage.setItem('cryptobros_frozen', 'true');
        } catch (e) {}
        
        // Update UI
        if (adminButton) adminButton.style.display = 'none';
        if (freezeButton) {
          freezeButton.classList.add('frozen');
          freezeButton.innerHTML = '<span>✅</span><span>GALLERY FROZEN</span>';
        }
        if (uploadSection) uploadSection.style.display = 'none';
        if (freezeOverlay) freezeOverlay.classList.add('active');
        
        showToast('🔒 Gallery frozen permanently', '#00ff00');
      }

      // ===== Check if frozen =====
      function checkFrozen() {
        try {
          const frozen = localStorage.getItem('cryptobros_frozen');
          if (frozen === 'true') {
            freezeGallery(); // Используем общую функцию для консистентности
          }
        } catch (e) {}
      }

      // ===== Upload handler =====
      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', () => {
          if (isFrozen) {
            showToast('🔒 Gallery is frozen', '#ff3366');
            return;
          }
          fileInput.click();
        });

        fileInput.addEventListener('change', async function(e) {
          if (isFrozen) {
            showToast('🔒 Gallery is frozen', '#ff3366');
            return;
          }

          const files = Array.from(e.target.files);
          if (files.length === 0) return;

          // Validate all files first
          const validFiles = [];
          for (const file of files) {
            if (!file.type.startsWith('image/')) {
              showToast(`❌ ${file.name} is not an image`, '#ff3366');
              continue;
            }
            if (file.size > 5 * 1024 * 1024) {
              showToast(`❌ ${file.name} exceeds 5MB`, '#ff3366');
              continue;
            }
            validFiles.push(file);
          }

          if (validFiles.length > 0) {
            await processFiles(validFiles);
          }
          
          e.target.value = '';
        });
      }

      // ===== Admin button =====
      if (adminButton) {
        adminButton.addEventListener('click', () => {
          if (isFrozen) {
            showToast('🔒 Gallery is frozen', '#ff3366');
            return;
          }
          uploadSection.scrollIntoView({ behavior: 'smooth' });
        });
      }

      // ===== Freeze button =====
      if (freezeButton) {
        freezeButton.addEventListener('click', () => {
          if (isFrozen) return;
          
          if (confirm('⚠️ FREEZE GALLERY?\n\nAfter freezing, no more changes can be made. This is permanent!')) {
            freezeGallery();
          }
        });
      }

      // ===== Lightbox events =====
      if (lightboxClose) {
        lightboxClose.addEventListener('click', () => {
          lightbox.classList.remove('active');
        });
      }

      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) {
            lightbox.classList.remove('active');
          }
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
        }
      });

      // ===== Slogan rotation =====
      const slogans1 = [
        "REAL ONES WEAR THE MERCH",
        "CRYPTOBROS MERCH",
        "WEAR THE MERCH",
        "PROOF YOU'RE NOT A RUG-PULLER",
        "DON'T JUST HODL"
      ];

      const slogans2 = [
        "FAKE ONES FEAR THE TRUTH",
        "NOT JUST CLOTHES, IT'S A STATEMENT",
        "LET THEM KNOW YOU'RE UNTOUCHABLE",
        "CRYPTOBROS FOR THE FEARLESS",
        "SHOW IT — CRYPTOBROS MERCH"
      ];

      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % 5;
        if (sloganLine1) sloganLine1.textContent = slogans1[sloganIndex];
        if (sloganLine2) sloganLine2.textContent = slogans2[sloganIndex];
      }, 20000);

      // ===== Initialize =====
      loadSavedDesigns();
      checkFrozen();
      renderDesigns();

      // Add toast styles
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideUp { from{transform:translate(-50%,100px);opacity:0} to{transform:translate(-50%,0);opacity:1} }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.98); border: 3px solid; padding: 15px 35px; border-radius: 60px; font-family: 'Sora', sans-serif; font-weight: 600; z-index: 30000; animation: slideUp 0.3s ease; }
      `;
      document.head.appendChild(style);
    })();
  </script>
