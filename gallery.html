<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY REBORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo Black', sans-serif;
      background: url('bg3.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
      padding: 30px;
      transition: background-color 0.4s, color 0.4s;
    }
    body.light-mode {
      background: #f0f0f0 url('bg3.jpg') no-repeat center center fixed;
      background-size: cover;
      color: black;
    }
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 12px 28px;
      color: #ffcc00;
      text-decoration: none;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }
    .back-button:hover { background: #ffcc00; color: black; }
    
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    
    #adminButton {
      position: fixed;
      top: 20px;
      right: 90px;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      color: #ff00ff;
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
      box-shadow: 0 0 15px #ff00ff;
    }
    #adminButton:hover {
      background: #ff00ff;
      color: black;
      transform: scale(1.05);
    }
    
    #emergencyClear {
      position: fixed;
      top: 20px;
      right: 240px;
      background: rgba(255,0,0,0.7);
      border: 2px solid white;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    
    .page-title {
      font-size: 4.5rem;
      text-align: center;
      margin: 60px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 { font-size: 2rem; text-align: center; color: #ff6600; text-shadow: 0 0 15px #ff6600; }
    .slogan-line2 { font-size: 1.4rem; text-align: center; color: #00ff00; margin-bottom: 40px; text-shadow: 0 0 15px #00ff00; }
    .section-title { font-size: 2.5rem; color: #ffdd00; border-bottom: 4px solid #ffdd00; margin: 40px 0 30px; text-align: center; }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    @media (max-width: 1024px) { .image-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .image-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .image-grid { grid-template-columns: 1fr; } }
    
    .grid-item {
      aspect-ratio: 1/1;
      background: rgba(0,0,0,0.6);
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(3px);
      overflow: hidden;
    }
    .grid-item:hover { 
      transform: scale(1.02); 
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
      z-index: 10;
    }
    
    .grid-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain;
      display: block !important;
      background: rgba(0,0,0,0.2);
    }
    
    .item-number {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 36px;
      height: 36px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-size: 1.1rem;
      z-index: 2;
    }
    
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      font-size: 1.3rem;
      z-index: 3;
    }
    .grid-item:hover .delete-btn { opacity: 1; }
    @media (max-width: 768px) {
      .delete-btn { opacity: 0.7; }
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15,15,15,0.7);
      color: #666;
      font-size: 1.1rem;
    }
    
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(17,17,17,0.8);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    body.light-mode .upload-section { background: rgba(255,255,255,0.8); border-color: #00ffff; }
    
    .upload-title { font-size: 2.5rem; color: #ff00ff; margin-bottom: 20px; text-shadow: 0 0 15px #ff00ff; }
    
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
      transition: 0.3s;
      box-shadow: 0 0 15px #00ff00;
    }
    #uploadButton:hover:not(:disabled) {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 30px #00ff00;
    }
    #uploadButton:disabled { opacity: 0.4; cursor: not-allowed; }
    
    .hidden-input { display: none; }
    
    .storage-info { color: #ffaa00; margin: 10px 0; font-size: 1.2rem; text-shadow: 0 0 8px #ffaa00; }
    
    .storage-bar {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      transition: width 0.4s;
    }
    
    .storage-size {
      font-family: monospace;
      font-size: 0.9rem;
      color: #ffaa00;
      margin: 5px 0;
    }
    
    .info-text {
      color: #cccccc;
      margin: 20px 0;
      font-size: 1rem;
      line-height: 1.6;
      font-family: Arial, sans-serif;
    }
    body.light-mode .info-text { color: #333333; }
    
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    
    #clearAllBtn, #forceRenderBtn {
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: 0.3s;
      border: none;
    }
    
    #clearAllBtn {
      background: #ff3366;
      color: white;
      box-shadow: 0 0 15px #ff3366;
    }
    #clearAllBtn:hover { background: #ff0000; transform: scale(1.05); }
    
    #forceRenderBtn {
      background: #00ccff;
      color: black;
      box-shadow: 0 0 15px #00ccff;
    }
    #forceRenderBtn:hover { background: #0099ff; transform: scale(1.05); }
    
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 60px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3.5rem;
      cursor: pointer;
      width: 70px;
      height: 70px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      transition: 0.3s;
    }
    .lightbox-close:hover { background: #ff00ff; color: black; transform: rotate(90deg); }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.6rem;
      background: black;
      padding: 12px 30px;
      border: 3px solid #00ffff;
      border-radius: 60px;
    }
    
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      z-index: 9999;
      display: none;
      border: 2px solid #ffcc00;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      font-size: 1.1rem;
    }
    #toast.show { display: block; }
    
    #loadingIndicator {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 20000;
      display: none;
      align-items: center;
      justify-content: center;
      color: #00ffff;
      font-size: 3rem;
    }
    #loadingIndicator.active { display: flex; }
    
    .debug-panel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: #00ff00;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
      border-radius: 5px;
      max-width: 400px;
      max-height: 200px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>
  <div class="debug-panel" id="debugPanel"></div>

  <a href="/merch.html" class="back-button">← BACK</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>
  <button id="emergencyClear">⚠️ EMERGENCY CLEAR</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR MERCH</div>
    <div class="slogan-line2">FAKES FEAR THE TRUTH</div>
    <div class="section-title">⚡ SLOTS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section">
      <div class="upload-title">📤 UPLOAD PNG</div>
      <div class="storage-info" id="storageInfo">0/20 slots</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width:0%"></div>
      </div>
      <div class="storage-size" id="storageSize">Storage: 0 KB</div>
      
      <input type="file" id="designUpload" class="hidden-input" accept="image/png" multiple>
      <button id="uploadButton">📁 SELECT PNG FILES</button>
      
      <div class="info-text">
        • Files with number in name → go to that slot<br>
        • No number → first empty slot<br>
        • Only .png • max 5 MB per file
      </div>
      
      <div class="button-group">
        <button id="clearAllBtn">🗑️ CLEAR ALL SLOTS</button>
        <button id="forceRenderBtn">🔄 FORCE RENDER</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ========== CONFIG ==========
      const TOTAL_SLOTS = 20;
      const STORAGE_KEY = 'cryptobros_gallery';
      
      // ========== STATE ==========
      let designs = {};
      
      // ========== DOM ELEMENTS ==========
      const grid = document.getElementById('designsGrid');
      const uploadBtn = document.getElementById('uploadButton');
      const adminBtn = document.getElementById('adminButton');
      const fileInput = document.getElementById('designUpload');
      const clearBtn = document.getElementById('clearAllBtn');
      const forceRenderBtn = document.getElementById('forceRenderBtn');
      const emergencyClear = document.getElementById('emergencyClear');
      const storageInfo = document.getElementById('storageInfo');
      const storageFill = document.getElementById('storageFill');
      const storageSize = document.getElementById('storageSize');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const loader = document.getElementById('loadingIndicator');
      const toast = document.getElementById('toast');
      const themeToggle = document.getElementById('themeToggle');
      const debugPanel = document.getElementById('debugPanel');

      // ========== DEBUG FUNCTION ==========
      function debug(msg) {
        const timestamp = new Date().toLocaleTimeString();
        console.log(`[${timestamp}] ${msg}`);
        if (debugPanel) {
          debugPanel.innerHTML = `[${timestamp}] ${msg}<br>` + debugPanel.innerHTML;
          if (debugPanel.children.length > 5) {
            debugPanel.removeChild(debugPanel.lastChild);
          }
        }
      }

      // ========== LOAD DATA ==========
      function loadFromStorage() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            designs = JSON.parse(saved);
            debug(`Loaded ${Object.keys(designs).length} designs from storage`);
            
            // Validate data
            let invalidCount = 0;
            Object.keys(designs).forEach(key => {
              if (typeof designs[key] !== 'string' || !designs[key].startsWith('data:image')) {
                debug(`Invalid data for slot ${key}, removing`);
                delete designs[key];
                invalidCount++;
              }
            });
            
            if (invalidCount > 0) {
              saveToStorage();
            }
          } else {
            designs = {};
            debug('No saved data found');
          }
        } catch (e) {
          debug(`Load error: ${e.message}`);
          designs = {};
        }
      }

      // ========== SAVE DATA ==========
      function saveToStorage() {
        try {
          const json = JSON.stringify(designs);
          localStorage.setItem(STORAGE_KEY, json);
          debug(`Saved to storage: ${json.length} bytes`);
          updateStorageInfo();
          return true;
        } catch (e) {
          debug(`SAVE FAILED: ${e.message}`);
          if (e.name === 'QuotaExceededError') {
            showToast('STORAGE FULL! Use EMERGENCY CLEAR', '#ff3366');
          }
          return false;
        }
      }

      // ========== UPDATE STORAGE INFO ==========
      function updateStorageInfo() {
        const filled = Object.keys(designs).length;
        const percentage = (filled / TOTAL_SLOTS) * 100;
        storageFill.style.width = `${percentage}%`;
        storageInfo.textContent = `${filled}/${TOTAL_SLOTS} slots used`;
        
        try {
          const json = JSON.stringify(designs);
          const kb = (json.length / 1024).toFixed(2);
          storageSize.textContent = `Storage: ${kb} KB / ~5 MB`;
        } catch (e) {
          storageSize.textContent = `Storage: unknown`;
        }
      }

      // ========== RENDER GALLERY ==========
      function render() {
        debug('RENDER CALLED');
        grid.innerHTML = '';
        
        let renderedCount = 0;
        
        for (let slot = 1; slot <= TOTAL_SLOTS; slot++) {
          const item = document.createElement('div');
          item.className = 'grid-item';
          item.dataset.id = slot;

          // Slot number
          const num = document.createElement('div');
          num.className = 'item-number';
          num.textContent = slot;
          item.appendChild(num);

          // Check if slot has image
          if (designs[slot]) {
            debug(`Rendering slot ${slot} with image`);
            
            // Create image element
            const img = document.createElement('img');
            img.src = designs[slot];
            img.alt = `Slot ${slot}`;
            img.style.border = '2px solid #00ff00'; // Green border for debugging
            
            img.onload = function() {
              debug(`Image ${slot} loaded successfully`);
              this.style.border = 'none';
              renderedCount++;
            };
            
            img.onerror = function() {
              debug(`ERROR: Image ${slot} failed to load`);
              this.style.display = 'none';
              
              const errorDiv = document.createElement('div');
              errorDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3366;text-align:center;';
              errorDiv.innerHTML = '❌<br>FAILED';
              item.appendChild(errorDiv);
              
              // Remove invalid data
              delete designs[slot];
              saveToStorage();
            };
            
            item.appendChild(img);

            // Delete button
            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.textContent = '✕';
            del.onclick = (e) => {
              e.stopPropagation();
              if (confirm(`Delete slot #${slot}?`)) {
                delete designs[slot];
                if (saveToStorage()) {
                  render();
                  showToast(`Slot #${slot} cleared`, '#ff3366');
                }
              }
            };
            
            item.appendChild(del);
          } else {
            // Empty slot
            const placeholder = document.createElement('div');
            placeholder.className = 'item-placeholder';
            placeholder.innerHTML = '<div style="font-size:60px;">🎨</div><div>EMPTY</div>';
            item.appendChild(placeholder);
          }

          grid.appendChild(item);
        }
        
        updateStorageInfo();
        debug(`Render complete. ${Object.keys(designs).length} images total`);
      }

      // ========== SHOW TOAST ==========
      function showToast(msg, color = '#00ffff') {
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
        debug(`TOAST: ${msg}`);
      }

      // ========== THEME TOGGLE ==========
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.textContent = '☀️';
      }
      themeToggle.onclick = () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      };

      // ========== LIGHTBOX ==========
      grid.addEventListener('click', (e) => {
        const item = e.target.closest('.grid-item');
        if (item && !e.target.closest('.delete-btn')) {
          const id = item.dataset.id;
          if (designs[id]) {
            lightboxImg.src = designs[id];
            lightboxNum.textContent = `SLOT #${id}`;
            lightbox.classList.add('active');
          }
        }
      });

      lightboxClose.onclick = () => lightbox.classList.remove('active');
      
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
        }
      });

      // ========== UPLOAD HANDLER ==========
      function triggerUpload() {
        debug('Opening file selector');
        fileInput.click();
      }

      adminBtn.onclick = triggerUpload;
      uploadBtn.onclick = triggerUpload;

      // ========== FILE INPUT HANDLER ==========
      fileInput.onchange = async function() {
        const files = Array.from(this.files);
        if (!files.length) {
          debug('No files selected');
          return;
        }

        debug(`Selected ${files.length} file(s)`);

        // Disable buttons
        uploadBtn.disabled = true;
        adminBtn.disabled = true;
        loader.classList.add('active');

        let successCount = 0;

        // Process each file
        for (const file of files) {
          try {
            debug(`Processing: ${file.name} (${(file.size/1024).toFixed(2)}KB)`);

            // Validate
            if (!file.type.startsWith('image/png')) {
              showToast(`Skipped: ${file.name} - not PNG`, '#ffaa00');
              continue;
            }

            if (file.size > 5 * 1024 * 1024) {
              showToast(`${file.name} too big (>5MB)`, '#ffaa00');
              continue;
            }

            // Convert to DataURL
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => {
                debug(`FileReader loaded: ${file.name}`);
                resolve(reader.result);
              };
              reader.onerror = (e) => {
                debug(`FileReader error: ${file.name}`);
                reject(e);
              };
              reader.readAsDataURL(file);
            });

            debug(`DataURL created: ${dataUrl.length} chars`);

            // Find slot
            let targetSlot = null;
            
            // Try number from filename
            const match = file.name.match(/(\d+)/);
            if (match) {
              const num = parseInt(match[1], 10);
              if (num >= 1 && num <= TOTAL_SLOTS) {
                targetSlot = num;
                debug(`Found slot ${targetSlot} in filename`);
              }
            }

            // If no number, find first empty
            if (!targetSlot) {
              for (let i = 1; i <= TOTAL_SLOTS; i++) {
                if (!designs[i]) {
                  targetSlot = i;
                  debug(`First empty slot: ${targetSlot}`);
                  break;
                }
              }
            }

            if (!targetSlot) {
              showToast('No free slots!', '#ff3366');
              continue;
            }

            // Check if occupied
            if (designs[targetSlot]) {
              if (!confirm(`Slot #${targetSlot} is occupied. Overwrite?`)) {
                continue;
              }
            }

            // Save to designs
            designs[targetSlot] = dataUrl;
            debug(`Saved to slot #${targetSlot}`);
            successCount++;

          } catch (error) {
            debug(`Error: ${error.message}`);
            showToast(`Error with ${file.name}`, '#ff3366');
          }
        }

        // Save to storage and render if successful
        if (successCount > 0) {
          debug(`Saving ${successCount} file(s) to storage`);
          if (saveToStorage()) {
            render();
            showToast(`✅ Uploaded ${successCount} file(s)`, '#00ff00');
          } else {
            // If save failed, remove from designs
            debug('Save failed, reverting designs');
            loadFromStorage();
            render();
          }
        }

        // Reset UI
        loader.classList.remove('active');
        uploadBtn.disabled = false;
        adminBtn.disabled = false;
        this.value = '';
      };

      // ========== CLEAR ALL ==========
      clearBtn.onclick = () => {
        if (confirm('⚠️ Delete ALL slots? This cannot be undone!')) {
          designs = {};
          if (saveToStorage()) {
            render();
            showToast('All slots cleared', '#ff3366');
          }
        }
      };

      // ========== FORCE RENDER ==========
      forceRenderBtn.onclick = () => {
        debug('Force render triggered');
        render();
        showToast('Gallery refreshed', '#00ccff');
      };

      // ========== EMERGENCY CLEAR ==========
      emergencyClear.onclick = () => {
        if (confirm('⚠️ EMERGENCY: Clear ALL localStorage? This will delete everything!')) {
          localStorage.clear();
          designs = {};
          render();
          showToast(' localStorage cleared', '#ff0000');
          debug('EMERGENCY CLEAR performed');
        }
      };

      // ========== INITIAL LOAD ==========
      debug('Initializing gallery...');
      loadFromStorage();
      render();
      
      // ========== CHECK STORAGE ON START ==========
      setTimeout(() => {
        try {
          const test = 'test';
          localStorage.setItem('storage_test', test);
          localStorage.removeItem('storage_test');
          debug('Storage is working');
        } catch (e) {
          debug('⚠️ Storage might be full!');
          showToast('Storage may be full! Use EMERGENCY CLEAR', '#ff3366');
        }
      }, 1000);

    })();
  </script>
</body>
</html>
