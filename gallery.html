<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY REBORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo Black', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
    }
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      z-index: 1000;
      transition: 0.3s;
    }
    .page-title {
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 {
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
      text-transform: uppercase;
      text-shadow: 0 0 15px #ff6600;
    }
    .slogan-line2 {
      font-size: 1.5rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
      text-shadow: 0 0 15px #00ff00;
    }
    .section-title {
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
      text-shadow: 0 0 15px #ffdd00;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }
    @media (max-width: 768px) { 
      .image-grid { grid-template-columns: repeat(2, 1fr); } 
    }
    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      box-shadow: 0 0 10px #ffcc00;
    }
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      box-shadow: 0 0 15px #ff3366;
    }
    .grid-item:hover .delete-btn {
      opacity: 1;
    }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
    }
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: #111;
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    .upload-title {
      font-size: 2.5rem;
      color: #ff00ff;
      margin-bottom: 30px;
      text-shadow: 0 0 15px #ff00ff;
    }
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
      transition: 0.3s;
      box-shadow: 0 0 15px #00ff00;
    }
    #uploadButton:hover:not(:disabled) {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 30px #00ff00;
    }
    #uploadButton:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .hidden-input { display: none; }
    .storage-info {
      color: #ffaa00;
      margin-top: 10px;
      text-shadow: 0 0 8px #ffaa00;
    }
    .storage-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 10px;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      border-radius: 4px;
      transition: width 0.3s;
    }
    #clearAllBtn {
      margin-top: 20px;
      background: #ff3366;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      font-family: 'Archivo Black', sans-serif;
      cursor: pointer;
      box-shadow: 0 0 15px #ff3366;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 50px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
    }
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 15px 30px;
      border-radius: 60px;
      z-index: 50000;
      display: none;
      border: 2px solid #ffcc00;
    }
    #toast.show { display: block; }
    .info-text {
      color: #ffaa00;
      margin-top:25px;
      text-shadow: 0 0 8px #ffaa00;
    }
  </style>
</head>
<body>
  <a href="/merch.html" class="back-button">← BACK</a>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR MERCH</div>
    <div class="slogan-line2">FAKES FEAR THE TRUTH</div>
    <div class="section-title">⚡ SLOTS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section">
      <div class="upload-title">📤 UPLOAD</div>
      <div class="storage-info" id="storageInfo">0/20 slots</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width: 0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/png" multiple>
      <button id="uploadButton">📁 SELECT</button>
      <div class="info-text">
        ⚡ Number in name → specific slot<br>
        ⚡ No number → first empty slot
      </div>
      <button id="clearAllBtn">🗑️ CLEAR ALL</button>
    </div>
  </div>

  <script>
    // === SIMPLE & WORKING ===
    const TOTAL = 20;
    let data = JSON.parse(localStorage.getItem('g')) || {};

    const grid = document.getElementById('designsGrid');
    const btnUpload = document.getElementById('uploadButton');
    const input = document.getElementById('designUpload');
    const clearBtn = document.getElementById('clearAllBtn');
    const info = document.getElementById('storageInfo');
    const fill = document.getElementById('storageFill');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightboxImg');
    const lbNum = document.getElementById('lightboxNumber');
    const lbClose = document.getElementById('lightboxClose');
    const toast = document.getElementById('toast');

    function show(msg, c = '#00ffff') {
      if (toast) {
        toast.textContent = msg;
        toast.style.borderColor = c;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }
    }

    function save() {
      try {
        localStorage.setItem('g', JSON.stringify(data));
      } catch (e) {
        console.error('Storage full');
        show('⚠️ Storage full', '#ffaa00');
      }
    }

    function render() {
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.id = i;

        const num = document.createElement('div');
        num.className = 'item-number';
        num.textContent = i;
        item.appendChild(num);

        if (data[i]) {
          const img = document.createElement('img');
          img.src = data[i];
          img.alt = `Slot ${i}`;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'cover';
          img.style.display = 'block';
          img.onerror = () => {
            item.innerHTML = `<div class="item-placeholder"><div>❌</div><div>FAIL</div></div>`;
          };
          item.appendChild(img);

          const del = document.createElement('div');
          del.className = 'delete-btn';
          del.dataset.del = i;
          del.textContent = '✕';
          item.appendChild(del);
        } else {
          item.innerHTML = `<div class="item-placeholder"><div>🎨</div><div>EMPTY</div></div>`;
        }

        grid.appendChild(item);
      }

      const n = Object.keys(data).length;
      fill.style.width = `${(n / TOTAL) * 100}%`;
      info.textContent = `${n}/${TOTAL} slots`;
    }

    // Delete
    grid.addEventListener('click', e => {
      const del = e.target.closest('[data-del]');
      if (del) {
        const i = del.dataset.del;
        if (confirm(`Delete slot ${i}?`)) {
          delete data[i];
          save();
          render();
          show(`✅ Slot ${i} cleared`, '#00ff00');
        }
      }
    });

    // Lightbox
    grid.addEventListener('click', e => {
      const item = e.target.closest('.grid-item');
      if (item && !e.target.closest('.delete-btn')) {
        const i = item.dataset.id;
        if (data[i]) {
          lbImg.src = data[i];
          lbNum.textContent = `SLOT #${i}`;
          lb.classList.add('active');
        }
      }
    });
    lbClose.onclick = () => lb.classList.remove('active');
    lb.addEventListener('click', e => e.target === lb && lb.classList.remove('active'));
    document.addEventListener('keydown', e => e.key === 'Escape' && lb.classList.remove('active'));

    // Clear
    clearBtn.onclick = () => {
      if (confirm('Clear all?')) {
        data = {};
        save();
        render();
        show('✅ All cleared', '#ff3366');
      }
    };

    // Upload — ONLY .png
    btnUpload.onclick = () => input.click();

    input.onchange = async () => {
      const files = Array.from(input.files);
      if (!files.length) return;

      for (const f of files) {
        try {
          if (!f.name.toLowerCase().endsWith('.png')) {
            show(`⚠️ "${f.name}" — only .png`, '#ffaa00');
            continue;
          }
          if (f.size > 5_000_000) {
            show(`⚠️ "${f.name}" >5MB`, '#ffaa00');
            continue;
          }

          const reader = new FileReader();
          const url = await new Promise((res, rej) => {
            reader.onload = () => res(reader.result);
            reader.onerror = () => rej(new Error('Read error'));
            reader.readAsDataURL(f);
          });

          if (!url.startsWith('data:image/png;base64,')) {
            show(`❌ "${f.name}" is not PNG`, '#ff3366');
            continue;
          }

          // Find slot
          let slot = null;
          const m = f.name.match(/(\d+)/);
          if (m) {
            slot = +m[1];
            if (slot < 1 || slot > TOTAL) slot = null;
          }
          if (!slot) {
            for (let i = 1; i <= TOTAL; i++) {
              if (!data[i]) { slot = i; break; }
            }
          }
          if (!slot) {
            show('❌ No empty slots', '#ff3366');
            continue;
          }

          data[slot] = url;
          save();
          show(`✅ Saved to slot ${slot}`, '#00ff00');

        } catch (err) {
          show(`❌ ${err.message || 'Fail'}`, '#ff3366');
        }
      }

      render();
      input.value = '';
    };

    // START
    render();
  </script>
</body>
</html>
