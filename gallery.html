<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #0a0a0a;
      color: #ffcc00;
      min-height: 100vh;
      padding: 30px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Russo+One&display=swap');

    /* Back button */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 14px 32px 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px);
      box-shadow: 0 15px 40px rgba(255,204,0,0.5);
    }

    /* Secret area for double-click */
    #secret-area {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 80px;
      height: 80px;
      background: transparent;
      cursor: pointer;
      z-index: 9999;
      border: 2px dashed rgba(255,204,0,0.3); /* Временно видно для теста */
    }

    /* Creator button */
    .creator-btn {
      position: fixed;
      bottom: 120px;
      left: 30px;
      z-index: 1000;
      background: #ffcc00;
      color: #000;
      border: 2px solid #fff;
      border-radius: 60px;
      padding: 15px 30px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ffcc00;
      display: none;
    }
    .creator-btn.visible {
      display: block;
    }

    /* Page title */
    .page-title {
      font-family: 'Russo One', sans-serif;
      font-size: 3rem;
      text-align: center;
      margin: 80px 0 20px;
      text-shadow: 0 0 30px #ffcc00;
    }

    /* Slogan */
    .slogan {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      text-align: center;
      color: #fff;
      margin-bottom: 50px;
      opacity: 0.9;
      animation: fadeSlogan 1s ease;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 20px;
    }

    @keyframes fadeSlogan {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 0.9; transform: translateY(0); }
    }

    /* Gallery grid - ONLY DESIGNS */
    .gallery-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Russo One', sans-serif;
      font-size: 2rem;
      margin: 30px 0 20px;
      color: #ffcc00;
      border-bottom: 2px solid #ffcc00;
      padding-bottom: 10px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 50px;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .grid-item:hover {
      border-color: #ffcc00;
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 30px rgba(255,204,0,0.3);
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-number {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.8);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #ffcc00;
      z-index: 2;
    }

    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .item-placeholder .emoji {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    /* Upload section - appears only after double-click */
    .upload-section {
      max-width: 1200px;
      margin: 30px auto;
      padding: 30px;
      background: rgba(255,204,0,0.1);
      border: 2px solid #ffcc00;
      border-radius: 20px;
      text-align: center;
      display: none;
    }
    .upload-section.visible {
      display: block;
    }

    .upload-title {
      font-family: 'Russo One', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #ffcc00;
    }

    .upload-btn {
      background: transparent;
      border: 2px solid #ffcc00;
      color: #ffcc00;
      padding: 15px 40px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
    }

    .upload-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 30px #ffcc00;
    }

    .hidden-input {
      display: none;
    }

    .upload-note {
      color: #aaa;
      margin-top: 20px;
      font-size: 14px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 3px solid #ffcc00;
      border-radius: 10px;
      box-shadow: 0 0 50px #ffcc00;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ffcc00;
      font-size: 3rem;
      cursor: pointer;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      border: 2px solid #ffcc00;
      border-radius: 50%;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffcc00;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.7);
      padding: 10px 30px;
      border-radius: 60px;
      border: 1px solid #ffcc00;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 2px solid #00ff9d;
      color: #00ff9d;
      padding: 15px 30px;
      border-radius: 60px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      z-index: 10001;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 30px #00ff9d;
    }
    @keyframes slideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Back button -->
  <a href="merch.html" class="back-button">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <!-- Secret area (double-click here) -->
  <div id="secret-area"></div>

  <!-- Creator button (appears after double-click) -->
  <button class="creator-btn" id="creatorBtn">👑 UPLOAD DESIGNS</button>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">🎨 DESIGN GALLERY</h1>
    
    <!-- Slogan rotates every 30 seconds -->
    <div class="slogan" id="sloganText">Real ones wear the merch. Fake ones fear the truth.</div>

    <!-- ONLY DESIGNS - NO SHIRTS -->
    <div class="section-title">🎨 DESIGNS 1-20</div>
    <div class="image-grid" id="designsGrid"></div>

    <!-- Upload section - hidden by default, appears after double-click -->
    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD NEW DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" onclick="document.getElementById('designUpload').click()">
        SELECT IMAGES
      </button>
      <div class="upload-note">
        Files with numbers (e.g. "cool12.jpg") become design #12<br>
        Files without numbers go to first empty slot
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ===== 5 SLOGANS =====
      const slogans = [
        "Real ones wear the merch. Fake ones fear the truth.",
        "CRYPTOBROS Merch – not just clothes, it's a statement.",
        "Wear the merch. Let them know you're untouchable.",
        "CRYPTOBROS Merch: Proof you're not a rug-puller.",
        "Don't just HODL — SHOW it. CRYPTOBROS Merch for the fearless."
      ];

      // ===== DESIGN STORAGE =====
      let designImages = JSON.parse(localStorage.getItem('designImages')) || {};

      // ===== CREATOR MODE =====
      let isCreator = false;

      // DOM elements
      const secretArea = document.getElementById('secret-area');
      const creatorBtn = document.getElementById('creatorBtn');
      const uploadSection = document.getElementById('uploadSection');
      const sloganEl = document.getElementById('sloganText');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');

      // ===== DOUBLE CLICK ACTIVATION =====
      secretArea.addEventListener('dblclick', () => {
        isCreator = true;
        creatorBtn.classList.add('visible');
        uploadSection.classList.add('visible');
        showToast('👑 Creator mode activated — you can now upload', '#ffcc00');
      });

      creatorBtn.addEventListener('click', () => {
        uploadSection.classList.toggle('visible');
      });

      // ===== ROTATE SLOGANS =====
      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % slogans.length;
        sloganEl.style.animation = 'none';
        sloganEl.offsetHeight;
        sloganEl.style.animation = 'fadeSlogan 1s ease';
        sloganEl.textContent = slogans[sloganIndex];
      }, 30000);

      // ===== EXTRACT NUMBER FROM FILENAME =====
      function extractNumber(filename) {
        const match = filename.match(/\d+/);
        return match ? parseInt(match[0]) : null;
      }

      // ===== RENDER DESIGNS =====
      function renderDesigns() {
        const grid = document.getElementById('designsGrid');
        let html = '';

        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += `
            <div class="grid-item" onclick="openLightbox(${i})">
              <div class="item-number">${i}</div>
              ${img ? 
                `<img src="${img}" alt="Design ${i}">` : 
                `<div class="item-placeholder">
                  <div class="emoji">🎨</div>
                  <div>Empty</div>
                </div>`
              }
            </div>
          `;
        }
        grid.innerHTML = html;
      }

      // ===== LIGHTBOX =====
      window.openLightbox = function(num) {
        if (designImages[num]) {
          lightboxImg.src = designImages[num];
          lightboxNumber.textContent = `Design #${num}`;
          lightbox.classList.add('active');
        }
      };

      lightboxClose.addEventListener('click', () => {
        lightbox.classList.remove('active');
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
          lightbox.classList.remove('active');
        }
      });

      // ===== UPLOAD HANDLER =====
      document.getElementById('designUpload').addEventListener('change', function(e) {
        if (!isCreator) {
          showToast('❌ Creator mode only', '#ff3366');
          return;
        }

        const files = Array.from(e.target.files);
        files.forEach(file => {
          let number = extractNumber(file.name);
          
          if (!number || number < 1 || number > 20) {
            // Find first empty slot
            for (let i = 1; i <= 20; i++) {
              if (!designImages[i]) {
                number = i;
                break;
              }
            }
          }
          
          if (number && number >= 1 && number <= 20) {
            const reader = new FileReader();
            reader.onload = function(event) {
              designImages[number] = event.target.result;
              localStorage.setItem('designImages', JSON.stringify(designImages));
              renderDesigns();
              showToast(`✅ Design #${number} uploaded`, '#00ff9d');
            };
            reader.readAsDataURL(file);
          }
        });
        e.target.value = '';
      });

      // ===== TOAST =====
      function showToast(msg, color) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.style.color = color;
        toast.style.boxShadow = `0 0 30px ${color}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      // ===== INIT =====
      renderDesigns();
    })();
  </script>
</body>
</html>
