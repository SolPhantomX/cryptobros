<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY REBORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo Black', sans-serif;
      background: url('bg3.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
      padding: 30px;
      transition: background-color 0.4s, color 0.4s;
    }
    body.light-mode {
      background: #f0f0f0 url('bg3.jpg') no-repeat center center fixed;
      background-size: cover;
      color: black;
    }
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 12px 28px;
      color: #ffcc00;
      text-decoration: none;
      z-index: 1000;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }
    .back-button:hover { background: #ffcc00; color: black; }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    #adminButton {
      position: fixed;
      top: 20px;
      right: 90px;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      color: #ff00ff;
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 1000;
      backdrop-filter: blur(5px);
      transition: 0.3s;
      box-shadow: 0 0 15px #ff00ff;
    }
    #adminButton:hover {
      background: #ff00ff;
      color: black;
      transform: scale(1.05);
    }
    .page-title {
      font-size: 4.5rem;
      text-align: center;
      margin: 60px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 { font-size: 2rem; text-align: center; color: #ff6600; text-shadow: 0 0 15px #ff6600; }
    .slogan-line2 { font-size: 1.4rem; text-align: center; color: #00ff00; margin-bottom: 40px; text-shadow: 0 0 15px #00ff00; }
    .section-title { font-size: 2.5rem; color: #ffdd00; border-bottom: 4px solid #ffdd00; margin: 40px 0 30px; text-align: center; }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    @media (max-width: 1024px) { .image-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  { .image-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .image-grid { grid-template-columns: 1fr; } }
    .grid-item {
      aspect-ratio: 1/1;
      background: rgba(0,0,0,0.6);
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(3px);
      overflow: hidden;
    }
    .grid-item:hover { 
      transform: scale(1.02); 
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
      z-index: 10;
    }
    .grid-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain;
      display: block;
      background: rgba(0,0,0,0.3);
    }
    .item-number {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 36px;
      height: 36px;
      background: black;
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-size: 1.1rem;
      z-index: 2;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: #ff3366;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      font-size: 1.3rem;
      z-index: 3;
    }
    .grid-item:hover .delete-btn { opacity: 1; }
    @media (max-width: 768px) {
      .delete-btn { opacity: 0.7; }
    }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15,15,15,0.7);
      color: #666;
      font-size: 1.1rem;
    }
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(17,17,17,0.8);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    body.light-mode .upload-section { background: rgba(255,255,255,0.8); border-color: #00ffff; }
    .upload-title { font-size: 2.5rem; color: #ff00ff; margin-bottom: 20px; text-shadow: 0 0 15px #ff00ff; }
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.2rem;
      margin: 20px;
      transition: 0.3s;
      box-shadow: 0 0 15px #00ff00;
    }
    #uploadButton:hover:not(:disabled) {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 30px #00ff00;
    }
    #uploadButton:disabled { opacity: 0.4; cursor: not-allowed; }
    .hidden-input { display: none; }
    .storage-info { color: #ffaa00; margin: 10px 0; font-size: 1.2rem; text-shadow: 0 0 8px #ffaa00; }
    .storage-bar {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffaa00);
      transition: width 0.4s;
    }
    .info-text {
      color: #cccccc;
      margin: 20px 0;
      font-size: 1rem;
      line-height: 1.6;
      font-family: Arial, sans-serif;
    }
    body.light-mode .info-text { color: #333333; }
    #clearAllBtn {
      margin-top: 20px;
      background: #ff3366;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      font-size: 1.1rem;
      box-shadow: 0 0 15px #ff3366;
      transition: 0.3s;
    }
    #clearAllBtn:hover { background: #ff0000; transform: scale(1.05); }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 60px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3.5rem;
      cursor: pointer;
      width: 70px;
      height: 70px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      transition: 0.3s;
    }
    .lightbox-close:hover { background: #ff00ff; color: black; transform: rotate(90deg); }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.6rem;
      background: black;
      padding: 12px 30px;
      border: 3px solid #00ffff;
      border-radius: 60px;
    }
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      z-index: 9999;
      display: none;
      border: 2px solid #ffcc00;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      font-size: 1.1rem;
    }
    #toast.show { display: block; }
    #loadingIndicator {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 20000;
      display: none;
      align-items: center;
      justify-content: center;
      color: #00ffff;
      font-size: 3rem;
    }
    #loadingIndicator.active { display: flex; }

    /* Debug styles */
    .debug-info {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #00ff00;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 99999;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <div id="toast"></div>
  <div class="debug-info" id="debugInfo"></div>

  <a href="/merch.html" class="back-button">← BACK</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR MERCH</div>
    <div class="slogan-line2">FAKES FEAR THE TRUTH</div>
    <div class="section-title">⚡ SLOTS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD PNG</div>
      <div class="storage-info" id="storageInfo">0/20 slots</div>
      <div class="storage-bar">
        <div class="storage-fill" id="storageFill" style="width:0%"></div>
      </div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/png" multiple>
      <button id="uploadButton">📁 SELECT PNG FILES</button>
      <div class="info-text">
        • Files with number in name → go to that slot<br>
        • No number → first empty slot<br>
        • Only .png • max 5 MB per file
      </div>
      <button id="clearAllBtn">🗑️ CLEAR ALL SLOTS</button>
    </div>
  </div>

  <script>
    (function() {
      const TOTAL_SLOTS = 20;
      let designs = {};

      // Load from localStorage with validation
      try {
        const saved = localStorage.getItem('cryptobros_gallery');
        if (saved) {
          const parsed = JSON.parse(saved);
          // Validate that it's an object
          if (parsed && typeof parsed === 'object') {
            designs = parsed;
            console.log('Loaded designs:', Object.keys(designs).length);
          }
        }
      } catch (e) {
        console.error('Failed to load from localStorage:', e);
        designs = {};
      }

      // DOM Elements
      const grid = document.getElementById('designsGrid');
      const uploadBtn = document.getElementById('uploadButton');
      const adminBtn = document.getElementById('adminButton');
      const fileInput = document.getElementById('designUpload');
      const clearBtn = document.getElementById('clearAllBtn');
      const storageInfo = document.getElementById('storageInfo');
      const storageFill = document.getElementById('storageFill');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const loader = document.getElementById('loadingIndicator');
      const toast = document.getElementById('toast');
      const themeToggle = document.getElementById('themeToggle');
      const debugInfo = document.getElementById('debugInfo');

      // Debug function
      function debug(msg) {
        console.log('🔍', msg);
        if (debugInfo) {
          debugInfo.style.display = 'block';
          debugInfo.innerHTML = msg + '<br>' + debugInfo.innerHTML;
          setTimeout(() => {
            debugInfo.style.display = 'none';
          }, 5000);
        }
      }

      // ========== THEME TOGGLE ==========
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.textContent = '☀️';
      }

      themeToggle.onclick = () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      };

      // ========== UTILITY FUNCTIONS ==========
      function showToast(msg, color = '#00ffff') {
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
        debug(msg);
      }

      function saveToStorage() {
        try {
          const json = JSON.stringify(designs);
          localStorage.setItem('cryptobros_gallery', json);
          console.log('Saved to storage, size:', json.length);
          return true;
        } catch (e) {
          console.error('Storage save failed:', e);
          showToast('Storage limit exceeded!', '#ff3366');
          return false;
        }
      }

      function updateStorageInfo() {
        const filled = Object.keys(designs).length;
        const percentage = (filled / TOTAL_SLOTS) * 100;
        storageFill.style.width = `${percentage}%`;
        storageInfo.textContent = `${filled}/${TOTAL_SLOTS} slots used`;
      }

      // ========== RENDER GALLERY ==========
      function render() {
        console.log('Rendering gallery. Designs:', designs);
        grid.innerHTML = '';
        
        for (let i = 1; i <= TOTAL_SLOTS; i++) {
          const item = document.createElement('div');
          item.className = 'grid-item';
          item.dataset.id = i;

          // Slot number
          const num = document.createElement('div');
          num.className = 'item-number';
          num.textContent = i;
          item.appendChild(num);

          if (designs[i]) {
            // Check if data URL is valid
            if (typeof designs[i] === 'string' && designs[i].startsWith('data:image')) {
              // Image
              const img = document.createElement('img');
              img.src = designs[i];
              img.alt = `Slot ${i}`;
              img.style.border = '2px solid #00ff00'; // Temporary border for debugging
              
              img.onload = function() {
                console.log(`Image ${i} loaded successfully`);
                this.style.border = 'none';
              };
              
              img.onerror = function() {
                console.error(`Failed to load image for slot ${i}`);
                this.style.display = 'none';
                const errorDiv = document.createElement('div');
                errorDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3366;text-align:center;';
                errorDiv.innerHTML = '❌<br>FAILED';
                item.appendChild(errorDiv);
                // Remove invalid data
                delete designs[i];
                saveToStorage();
              };
              
              item.appendChild(img);

              // Delete button
              const del = document.createElement('div');
              del.className = 'delete-btn';
              del.textContent = '✕';
              del.onclick = (e) => {
                e.stopPropagation();
                if (confirm(`Delete slot #${i}?`)) {
                  delete designs[i];
                  if (saveToStorage()) {
                    render();
                    showToast(`Slot #${i} cleared`, '#ff3366');
                  }
                }
              };
              
              // Touch support
              del.ontouchstart = (e) => {
                e.preventDefault();
                del.onclick(e);
              };
              
              item.appendChild(del);
            } else {
              console.log(`Invalid data for slot ${i}:`, designs[i]);
              // Invalid data, remove it
              delete designs[i];
              saveToStorage();
              
              const placeholder = document.createElement('div');
              placeholder.className = 'item-placeholder';
              placeholder.innerHTML = '<div style="font-size:60px;">🎨</div><div>EMPTY</div>';
              item.appendChild(placeholder);
            }
          } else {
            // Empty slot placeholder
            const placeholder = document.createElement('div');
            placeholder.className = 'item-placeholder';
            placeholder.innerHTML = '<div style="font-size:60px;">🎨</div><div>EMPTY</div>';
            item.appendChild(placeholder);
          }

          grid.appendChild(item);
        }

        updateStorageInfo();
      }

      // ========== LIGHTBOX ==========
      grid.onclick = (e) => {
        const item = e.target.closest('.grid-item');
        if (item && !e.target.closest('.delete-btn')) {
          const id = item.dataset.id;
          if (designs[id]) {
            lightboxImg.src = designs[id];
            lightboxNum.textContent = `SLOT #${id}`;
            lightbox.classList.add('active');
          }
        }
      };

      lightboxClose.onclick = () => lightbox.classList.remove('active');
      
      lightbox.onclick = (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
        }
      };

      document.onkeydown = (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
        }
      };

      // ========== UPLOAD FUNCTIONALITY ==========
      function triggerFileSelect() {
        debug('Opening file selector');
        fileInput.click();
      }

      // Connect both buttons to file input
      adminBtn.onclick = triggerFileSelect;
      uploadBtn.onclick = triggerFileSelect;

      // Clear all button
      clearBtn.onclick = () => {
        if (confirm('⚠️ Delete ALL slots? This cannot be undone!')) {
          designs = {};
          if (saveToStorage()) {
            render();
            showToast('All slots cleared', '#ff3366');
          }
        }
      };

      // File upload handler
      fileInput.onchange = async function() {
        const files = Array.from(this.files);
        if (!files.length) {
          debug('No files selected');
          return;
        }

        debug(`Selected ${files.length} file(s)`);

        // Disable upload button and show loader
        uploadBtn.disabled = true;
        adminBtn.disabled = true;
        loader.classList.add('active');

        let successCount = 0;
        let lastToastTime = 0;

        // Process each file
        for (const file of files) {
          try {
            debug(`Processing: ${file.name} (${(file.size/1024).toFixed(2)}KB)`);

            // Validation
            if (!file.type.startsWith('image/png')) {
              showToast(`Skipped: ${file.name} - not a PNG`, '#ffaa00');
              continue;
            }

            if (file.size > 5 * 1024 * 1024) {
              showToast(`${file.name} is too big (>5MB)`, '#ffaa00');
              continue;
            }

            // Convert to data URL
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => {
                debug(`FileReader loaded: ${file.name}`);
                resolve(reader.result);
              };
              reader.onerror = (e) => {
                debug(`FileReader error: ${file.name}`);
                reject(e);
              };
              reader.readAsDataURL(file);
            });

            debug(`DataURL created for ${file.name}, length: ${dataUrl.length}`);

            // Check storage limit (approximate)
            const currentSize = JSON.stringify(designs).length;
            const newSize = dataUrl.length;
            if (currentSize + newSize > 10 * 1024 * 1024) {
              showToast('Storage limit reached!', '#ff3366');
              continue;
            }

            // Determine slot
            let targetSlot = null;
            
            // Try to extract number from filename
            const numberMatch = file.name.match(/(\d+)/);
            if (numberMatch) {
              const num = parseInt(numberMatch[1], 10);
              if (num >= 1 && num <= TOTAL_SLOTS) {
                targetSlot = num;
                debug(`Found slot number ${targetSlot} in filename`);
              }
            }

            // If no valid number from filename, find first empty slot
            if (!targetSlot) {
              for (let i = 1; i <= TOTAL_SLOTS; i++) {
                if (!designs[i]) {
                  targetSlot = i;
                  debug(`First empty slot found: ${targetSlot}`);
                  break;
                }
              }
            }

            // Check if we have a slot
            if (!targetSlot) {
              showToast('No free slots available!', '#ff3366');
              continue;
            }

            // Check if slot is occupied
            if (designs[targetSlot]) {
              const confirmOverwrite = confirm(`Slot #${targetSlot} is occupied. Overwrite?`);
              if (!confirmOverwrite) continue;
            }

            // Save to designs
            designs[targetSlot] = dataUrl;
            debug(`Saved to slot #${targetSlot}`);
            successCount++;

            // Throttle toast messages
            const now = Date.now();
            if (now - lastToastTime > 2000) {
              showToast(`Saved to slot #${targetSlot}`, '#00ff00');
              lastToastTime = now;
            }

          } catch (error) {
            console.error('Upload error:', error);
            debug(`Error: ${error.message}`);
            showToast(`Error with ${file.name}`, '#ff3366');
          }
        }

        // Save to localStorage if any files were processed
        if (successCount > 0) {
          debug(`Saving ${successCount} file(s) to storage`);
          if (saveToStorage()) {
            render();
            showToast(`✅ Uploaded ${successCount} file(s)`, '#00ff00');
          }
        } else {
          debug('No files were successfully processed');
        }

        // Reset UI
        loader.classList.remove('active');
        uploadBtn.disabled = false;
        adminBtn.disabled = false;
        this.value = ''; // Clear file input
      };

      // ========== INITIAL RENDER ==========
      render();

      // ========== ERROR HANDLING ==========
      window.onerror = function(msg, url, line) {
        console.error('Global error:', msg, 'at line', line);
        debug(`Error: ${msg} at line ${line}`);
        showToast('An error occurred', '#ff3366');
        return false;
      };

      // Test with sample data if empty
      if (Object.keys(designs).length === 0) {
        console.log('No designs found, gallery empty');
      }

    })();
  </script>
</body>
</html>
