<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <!-- SINGLE BOLD FONT - SYNE ONLY -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
      transition: all 0.3s ease;
    }
    
    /* LIGHT MODE COLORS */
    body.light-mode {
      background: #f0f0f0 !important;
      color: #222 !important;
    }
    
    body.light-mode .grid-item {
      background: #fff !important;
      border-color: #ccc !important;
    }
    
    body.light-mode .item-number {
      background: #fff !important;
      color: #000 !important;
      border-color: #ff6600 !important;
      box-shadow: 0 0 20px #ff6600 !important;
    }
    
    body.light-mode .section-title {
      color: #ff6600 !important;
      border-bottom-color: #ff6600 !important;
    }
    
    body.light-mode .slogan-line1 {
      color: #ff3300 !important;
    }
    
    body.light-mode .slogan-line2 {
      color: #0066cc !important;
    }
    
    body.light-mode .back-button {
      background: rgba(255,255,255,0.9) !important;
      color: #ff6600 !important;
      border-color: #ff6600 !important;
    }
    
    body.light-mode .upload-section {
      background: rgba(255,255,255,0.95) !important;
    }
    
    /* BACK BUTTON */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      color: #ffcc00;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
    }
    
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }
    
    /* THEME TOGGLE */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px #ffcc00;
      transition: all 0.3s ease;
    }
    
    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
    }
    
    /* UPLOAD BUTTON */
    .upload-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #9945FF;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    
    .upload-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px #9945FF;
    }
    
    /* PAGE TITLE */
    .page-title {
      font-weight: 800;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
    }
    
    @keyframes titleRainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* SLOGAN */
    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .slogan-line1 {
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 10px;
    }
    
    @keyframes line1Glow {
      0%,100% { color: #ff6600; }
      33% { color: #ff00ff; }
      66% { color: #ffaa00; }
    }
    
    .slogan-line2 {
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      animation: line2Flicker 3s linear infinite;
    }
    
    @keyframes line2Flicker {
      0%,100% { color: #00ff00; }
      20% { color: #00ffff; }
      40% { color: #ffff00; }
      60% { color: #ff00ff; }
      80% { color: #00ff00; }
    }
    
    /* SECTION TITLE */
    .section-title {
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      text-shadow: 0 0 20px #ffdd00;
    }
    
    /* GALLERY */
    .gallery-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .grid-item:nth-child(4n) {
      border-right: none;
    }
    
    .grid-item:nth-last-child(-n+4) {
      border-bottom: none;
    }
    
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00 !important;
    }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
      display: block;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: 700;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 2;
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      background: #0f0f0f;
    }
    
    .item-placeholder .emoji {
      font-size: 3.5rem;
      opacity: 0.5;
    }
    
    /* UPLOAD SECTION */
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    
    .upload-title {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff;
    }
    
    .hidden-input {
      display: none;
    }
    
    .upload-note {
      color: #ffaa00;
      margin-top: 25px;
      font-size: 14px;
    }
    
    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
    }
    
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      z-index: 10001;
    }
    
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-weight: 700;
    }
    
    /* FREEZE OVERLAY */
    .freeze-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 9999;
      display: none;
      pointer-events: all;
    }
    
    .freeze-overlay.active {
      display: block;
    }
    
    /* LOADING INDICATOR */
    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      font-weight: 700;
      text-shadow: 0 0 30px #00ffff;
      z-index: 40000;
      background: rgba(0,0,0,0.9);
      padding: 20px 40px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      display: none;
    }
    
    .loading-indicator.active {
      display: block;
    }
  </style>
</head>
<body>
  <!-- LOADING INDICATOR -->
  <div class="loading-indicator" id="loadingIndicator">⏳ LOADING...</div>

  <!-- BACK BUTTON -->
  <a href="https://www.cryptobros.pro/merch.html" class="back-button">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <!-- THEME TOGGLE -->
  <div class="theme-toggle" id="themeToggle">🌙</div>

  <!-- UPLOAD BUTTON -->
  <button class="upload-btn" id="adminButton">
    <span>📤</span>
    <span>UPLOAD</span>
  </button>

  <!-- FREEZE OVERLAY -->
  <div class="freeze-overlay" id="freezeOverlay"></div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Design preview">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <!-- UPLOAD SECTION -->
    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" id="uploadButton">CHOOSE IMAGES</button>
      <div class="upload-note">
        Files with numbers (design5.jpg) → slot #5<br>
        Files without numbers → fill empty slots<br>
        Max file size: 5MB
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      // STATE
      let designImages = {};
      
      // GET DOM ELEMENTS
      const themeToggle = document.getElementById('themeToggle');
      const adminButton = document.getElementById('adminButton');
      const uploadSection = document.getElementById('uploadSection');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const designsGrid = document.getElementById('designsGrid');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const freezeOverlay = document.getElementById('freezeOverlay');

      // ===== THEME TOGGLE =====
      if (themeToggle) {
        // Load saved theme
        const savedTheme = localStorage.getItem('cryptobros_theme');
        if (savedTheme === 'light') {
          document.body.classList.add('light-mode');
          themeToggle.textContent = '☀️';
        }
        
        // Toggle theme on click
        themeToggle.addEventListener('click', function() {
          if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            themeToggle.textContent = '🌙';
            localStorage.setItem('cryptobros_theme', 'dark');
          } else {
            document.body.classList.add('light-mode');
            themeToggle.textContent = '☀️';
            localStorage.setItem('cryptobros_theme', 'light');
          }
        });
      }

      // ===== LOAD DESIGNS =====
      function loadDesigns() {
        const saved = localStorage.getItem('cryptobros_designs');
        if (saved) {
          try {
            designImages = JSON.parse(saved);
          } catch (e) {
            designImages = {};
          }
        }
      }

      // ===== RENDER GRID =====
      function renderDesigns() {
        if (!designsGrid) return;
        
        let html = '';
        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += '<div class="grid-item" data-id="' + i + '">';
          html += '<div class="item-number">' + i + '</div>';
          
          if (img) {
            html += '<img src="' + img + '" alt="Design ' + i + '" loading="lazy">';
          } else {
            html += '<div class="item-placeholder">';
            html += '<div class="emoji">🎨</div>';
            html += '<div>EMPTY</div>';
            html += '</div>';
          }
          
          html += '</div>';
        }
        designsGrid.innerHTML = html;
      }

      // ===== LIGHTBOX =====
      if (designsGrid) {
        designsGrid.addEventListener('click', function(e) {
          const item = e.target.closest('.grid-item');
          if (item) {
            const id = item.dataset.id;
            if (designImages[id]) {
              lightboxImg.src = designImages[id];
              lightboxNumber.textContent = 'DESIGN #' + id;
              lightbox.classList.add('active');
              document.body.style.overflow = 'hidden';
            }
          }
        });
      }

      if (lightboxClose) {
        lightboxClose.addEventListener('click', function() {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
          document.body.style.overflow = '';
        });
      }

      if (lightbox) {
        lightbox.addEventListener('click', function(e) {
          if (e.target === lightbox) {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
            document.body.style.overflow = '';
          }
        });
      }

      // ===== UPLOAD =====
      if (adminButton) {
        adminButton.addEventListener('click', function() {
          uploadSection.scrollIntoView({ behavior: 'smooth' });
        });
      }

      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', function() {
          fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
          const files = Array.from(e.target.files);
          const validFiles = files.filter(f => f.size <= 5 * 1024 * 1024);
          
          if (validFiles.length === 0) return;
          
          loadingIndicator.classList.add('active');
          
          let processed = 0;
          
          validFiles.forEach(file => {
            const reader = new FileReader();
            
            reader.onload = function(readerEvent) {
              // Get number from filename
              const match = file.name.match(/\d+/);
              let slot = match ? parseInt(match[0]) : null;
              
              // Validate slot
              if (slot && (slot < 1 || slot > 20)) {
                slot = null;
              }
              
              // Find empty slot if no number
              if (!slot) {
                for (let i = 1; i <= 20; i++) {
                  if (!designImages[i]) {
                    slot = i;
                    break;
                  }
                }
              }
              
              // Save image
              if (slot && !designImages[slot]) {
                designImages[slot] = readerEvent.target.result;
              }
              
              processed++;
              if (processed === validFiles.length) {
                localStorage.setItem('cryptobros_designs', JSON.stringify(designImages));
                renderDesigns();
                loadingIndicator.classList.remove('active');
              }
            };
            
            reader.readAsDataURL(file);
          });
          
          e.target.value = '';
        });
      }

      // ===== INITIALIZE =====
      loadDesigns();
      renderDesigns();
    })();
  </script>
</body>
</html>
