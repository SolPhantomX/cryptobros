<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,0,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(255,255,0,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 8s ease-in-out infinite;
    }
    
    @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    
    @media (max-width: 768px) {
      body { padding: 15px; }
      .page-title { font-size: 3rem; }
      .back-button { top: 15px; left: 15px; padding: 12px 24px; }
      .admin-button { bottom: 20px; right: 15px; padding: 12px 20px; }
      .freeze-button { bottom: 90px; right: 15px; padding: 12px 20px; }
      .clear-button { bottom: 160px; right: 15px; padding: 12px 20px; }
    }

    /* ===== BACK BUTTON ===== */
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
    }
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }

    /* ===== UPLOAD BUTTON ===== */
    .admin-button {
      position: fixed;
      bottom: 100px;
      right: 30px;
      z-index: 1000;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #9945FF;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .admin-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px #9945FF;
    }

    /* ===== FREEZE BUTTON ===== */
    .freeze-button {
      position: fixed;
      bottom: 180px;
      right: 30px;
      z-index: 1000;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff3366;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .freeze-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px #ff3366;
    }
    .freeze-button.frozen {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 30px #00ff00;
    }

    /* ===== CLEAR BUTTON (NEW) ===== */
    .clear-button {
      position: fixed;
      bottom: 260px;
      right: 30px;
      z-index: 1000;
      background: #ff8800;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff8800;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .clear-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px #ff8800;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      font-weight: 800;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
      will-change: background-position;
    }
    @keyframes titleRainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
    }
    .slogan-line1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes line1Glow { 0%,100%{color:#ff6600} 33%{color:#ff00ff} 66%{color:#ffaa00} }
    .slogan-line2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      animation: line2Flicker 3s linear infinite;
    }
    @keyframes line2Flicker { 0%,100%{color:#00ff00} 20%{color:#00ffff} 40%{color:#ffff00} 60%{color:#ff00ff} 80%{color:#00ff00} }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      text-shadow: 0 0 20px #ffdd00;
    }

    .gallery-container { max-width: 1200px; margin: 0 auto; }
    
    /* ===== GALLERY GRID ===== */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00;
    }
    
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
      display: block;
    }
    
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      z-index: 2;
    }
    
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      background: #0f0f0f;
    }
    .item-placeholder .emoji { font-size: 3.5rem; opacity: 0.5; }

    /* ===== UPLOAD SECTION ===== */
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
    }
    .upload-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff;
    }
    .upload-btn {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      box-shadow: 0 0 30px #00ff00;
    }
    .upload-btn:hover {
      background: #00ff00;
      color: #000;
      transform: scale(1.1);
    }
    .hidden-input { display: none; }
    .upload-note {
      color: #ffaa00;
      margin-top: 25px;
      font-size: 14px;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      z-index: 10001;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-family: 'Syne', sans-serif;
    }

    /* ===== FREEZE OVERLAY - FIXED ===== */
    .freeze-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 9999;
      display: none;
      pointer-events: all; /* FIXED: теперь блокирует клики */
    }
    .freeze-overlay.active { display: block; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #333;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10001;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00ffff, #ff00ff);
      width: 0%;
      transition: width 0.3s ease;
    }

    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      font-family: 'Syne', sans-serif;
      text-shadow: 0 0 30px #00ffff;
      z-index: 40000;
      background: rgba(0,0,0,0.9);
      padding: 20px 40px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      display: none;
    }
    .loading-indicator.active { display: block; }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  
  <div class="loading-indicator" id="loadingIndicator">⏳ LOADING...</div>

  <a href="https://www.cryptobros.pro/merch.html" class="back-button">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <button class="admin-button" id="adminButton">
    <span>📤</span>
    <span>UPLOAD DESIGNS</span>
  </button>

  <button class="freeze-button" id="freezeButton">
    <span>🔒</span>
    <span>FREEZE GALLERY</span>
  </button>

  <!-- NEW: Clear button -->
  <button class="clear-button" id="clearButton">
    <span>🗑️</span>
    <span>CLEAR ALL</span>
  </button>

  <div class="freeze-overlay" id="freezeOverlay"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Design preview">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" id="uploadButton">CHOOSE IMAGES</button>
      <div class="upload-note">
        Files with numbers (design5.jpg) → slot #5<br>
        Files without numbers → fill empty slots in order<br>
        Max file size: 5MB | Max files: 20
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      let designImages = {};
      let isFrozen = false;
      let processingFiles = false; // NEW: prevent concurrent uploads

      // DOM elements
      const adminButton = document.getElementById('adminButton');
      const freezeButton = document.getElementById('freezeButton');
      const clearButton = document.getElementById('clearButton'); // NEW
      const freezeOverlay = document.getElementById('freezeOverlay');
      const uploadSection = document.getElementById('uploadSection');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const designsGrid = document.getElementById('designsGrid');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // ===== Toast =====
      function showToast(msg, color, duration = 2000) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: black;
          border: 3px solid ${color};
          color: ${color};
          padding: 15px 35px;
          border-radius: 60px;
          font-family: 'Sora', sans-serif;
          z-index: 30000;
          animation: fadeInOut ${duration}ms ease;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
      }

      // ===== Loading Indicator =====
      function showLoading() {
        if (loadingIndicator) loadingIndicator.classList.add('active');
      }
      
      function hideLoading() {
        if (loadingIndicator) loadingIndicator.classList.remove('active');
      }

      // ===== Progress Bar =====
      function updateProgress(percent) {
        if (progressFill) progressFill.style.width = percent + '%';
      }
      
      function showProgress() {
        if (progressBar) progressBar.classList.add('active');
      }
      
      function hideProgress() {
        if (progressBar) progressBar.classList.remove('active');
        updateProgress(0);
      }

      // ===== Check localStorage size =====
      function isStorageAvailable() {
        try {
          const test = 'test';
          localStorage.setItem(test, test);
          localStorage.removeItem(test);
          return true;
        } catch(e) {
          return false;
        }
      }

      function getStorageSize(data) {
        return new Blob([data]).size;
      }

      // ===== Render Grid =====
      function renderDesigns() {
        if (!designsGrid) return;
        
        let html = '';
        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += `
            <div class="grid-item" data-id="${i}">
              <div class="item-number">${i}</div>
              ${img ? `
                <img src="${img}" alt="Design ${i}" loading="lazy">
              ` : `
                <div class="item-placeholder">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>
              `}
            </div>
          `;
        }
        designsGrid.innerHTML = html;
      }

      // ===== Lightbox Functions =====
      function openLightbox(num) {
        if (designImages[num]) {
          lightboxImg.src = designImages[num];
          lightboxImg.alt = `Design #${num}`;
          lightboxNumber.textContent = `DESIGN #${num}`;
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden';
        } else {
          showToast(`Slot #${num} is empty`, '#ffaa00');
        }
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
        lightboxImg.alt = '';
        document.body.style.overflow = '';
      }

      // ===== File Processing =====
      async function processFiles(files) {
        if (isFrozen) {
          showToast('🔒 Gallery is frozen', '#ff3366');
          return 0;
        }

        if (processingFiles) {
          showToast('⏳ Already uploading...', '#ffaa00');
          return 0;
        }

        if (files.length > 20) {
          showToast('⚠️ Maximum 20 files at once', '#ffaa00');
          files = files.slice(0, 20);
        }
        
        processingFiles = true;
        let successCount = 0;
        let errorCount = 0;
        const totalFiles = files.length;
        
        showLoading();
        showProgress();
        
        for (let index = 0; index < files.length; index++) {
          const file = files[index];
          
          const progress = Math.round((index / totalFiles) * 100);
          updateProgress(progress);
          
          const match = file.name.match(/\d+/);
          let slot = null;
          
          if (match) {
            slot = parseInt(match[0]);
            if (slot < 1 || slot > 20) slot = null;
          }
          
          if (!slot) {
            for (let i = 1; i <= 20; i++) {
              if (!designImages[i]) {
                slot = i;
                break;
              }
            }
          }
          
          if (slot && !designImages[slot]) {
            try {
              const dataUrl = await readFileAsDataURL(file);
              designImages[slot] = dataUrl;
              successCount++;
            } catch (error) {
              console.error('Error reading file:', file.name, error);
              errorCount++;
              showToast(`❌ Failed to load ${file.name}`, '#ff3366', 1500);
            }
          } else if (slot && designImages[slot]) {
            showToast(`⚠️ Slot ${slot} already occupied`, '#ffaa00', 1000);
          }
        }
        
        updateProgress(100);
        
        // Save if successful
        if (successCount > 0) {
          saveDesigns();
          renderDesigns();
        }
        
        setTimeout(() => {
          hideProgress();
          hideLoading();
          processingFiles = false;
        }, 500);
        
        if (successCount > 0) {
          showToast(`✅ Uploaded ${successCount} files${errorCount ? `, ${errorCount} failed` : ''}`, '#00ff00');
        } else if (errorCount > 0) {
          showToast(`❌ All ${errorCount} files failed`, '#ff3366');
        }
        
        return successCount;
      }

      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = () => reject(new Error('FileReader failed'));
          reader.readAsDataURL(file);
        });
      }

      function saveDesigns() {
        if (!isStorageAvailable()) {
          showToast('⚠️ localStorage not available', '#ffaa00');
          return;
        }

        try {
          const data = JSON.stringify(designImages);
          const sizeMB = getStorageSize(data) / (1024 * 1024);
          
          if (sizeMB > 4.5) { // Leave some margin (5MB limit)
            showToast('⚠️ Data too large for storage', '#ffaa00');
            return;
          }
          
          localStorage.setItem('cryptobros_designs', data);
        } catch (e) {
          console.error('Failed to save designs', e);
          showToast('❌ Failed to save to localStorage', '#ff3366');
        }
      }

      function loadDesigns() {
        if (!isStorageAvailable()) return;
        
        const saved = localStorage.getItem('cryptobros_designs');
        if (saved) {
          try {
            designImages = JSON.parse(saved);
          } catch (e) {
            console.error('Failed to parse saved designs', e);
            designImages = {};
            localStorage.removeItem('cryptobros_designs');
          }
        }
      }

      // ===== CLEAR ALL DESIGNS (NEW) =====
      function clearAllDesigns() {
        if (isFrozen) {
          showToast('🔒 Gallery is frozen - cannot clear', '#ff3366');
          return;
        }

        if (confirm('⚠️ CLEAR ALL DESIGNS? This cannot be undone!')) {
          designImages = {};
          localStorage.removeItem('cryptobros_designs');
          renderDesigns();
          showToast('🗑️ All designs cleared', '#ff8800');
        }
      }

      // ===== FREEZE =====
      function freezeGallery() {
        if (isFrozen) return;
        isFrozen = true;
        
        localStorage.setItem('cryptobros_frozen', 'true');
        
        if (freezeButton) {
          freezeButton.classList.add('frozen');
          freezeButton.innerHTML = '<span>✅</span><span>GALLERY FROZEN</span>';
        }
        if (freezeOverlay) freezeOverlay.classList.add('active');
        
        showToast('🔒 Gallery frozen', '#00ff00');
      }

      function checkFrozen() {
        if (localStorage.getItem('cryptobros_frozen') === 'true') {
          isFrozen = true;
          
          if (freezeButton) {
            freezeButton.classList.add('frozen');
            freezeButton.innerHTML = '<span>✅</span><span>GALLERY FROZEN</span>';
          }
          if (freezeOverlay) freezeOverlay.classList.add('active');
        }
      }

      // ===== Event Listeners =====
      
      // Клик по сетке
      if (designsGrid) {
        designsGrid.addEventListener('click', (e) => {
          const item = e.target.closest('.grid-item');
          if (item) {
            const id = parseInt(item.dataset.id);
            openLightbox(id);
          }
        });
      }

      // Admin button - scroll to upload
      if (adminButton) {
        adminButton.addEventListener('click', () => {
          if (uploadSection) {
            uploadSection.scrollIntoView({ behavior: 'smooth' });
          }
        });
      }

      // UPLOAD кнопка
      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', () => {
          if (isFrozen) {
            showToast('🔒 Gallery is frozen', '#ff3366');
            return;
          }
          fileInput.click();
        });

        fileInput.addEventListener('change', async function(e) {
          const files = Array.from(e.target.files)
            .filter(f => f.type.startsWith('image/'))
            .filter(f => f.size <= 5 * 1024 * 1024);
          
          const invalidFiles = e.target.files.length - files.length;
          if (invalidFiles > 0) {
            showToast(`⚠️ ${invalidFiles} files were too large (max 5MB)`, '#ffaa00');
          }
          
          if (files.length) {
            await processFiles(files);
          }
          
          e.target.value = '';
        });
      }

      // FREEZE кнопка
      if (freezeButton) {
        freezeButton.addEventListener('click', () => {
          if (!isFrozen && confirm('FREEZE GALLERY? This cannot be undone!')) {
            freezeGallery();
          }
        });
      }

      // CLEAR кнопка (NEW)
      if (clearButton) {
        clearButton.addEventListener('click', clearAllDesigns);
      }

      // Lightbox
      if (lightboxClose) {
        lightboxClose.addEventListener('click', closeLightbox);
      }

      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) closeLightbox();
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox?.classList.contains('active')) {
          closeLightbox();
        }
      });

      // ===== Initialize =====
      loadDesigns();
      checkFrozen();
      renderDesigns();
    })();
  </script>
</body>
</html>
