<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CRYPTOBROS — DESIGN GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,0,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(255,255,0,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 8s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    
    /* мобильная адаптация — кнопки больше не перекрываются */
    @media (max-width: 768px) {
      body { padding: 15px; }
      .image-grid { grid-template-columns: repeat(2, 1fr); }
      .page-title { font-size: 3rem; }
      .back-button { top: 15px; left: 15px; padding: 12px 24px; font-size: 14px; }
      .connect-wallet-btn { bottom: 20px; left: 15px; padding: 12px 24px; font-size: 14px; }
      .creator-btn { bottom: 90px; left: 15px; padding: 12px 24px; font-size: 14px; } /* поднял выше */
    }
    @media (max-width: 480px) {
      .image-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 2rem; }
      .back-button { padding: 10px 18px; font-size: 13px; }
      .connect-wallet-btn { bottom: 20px; padding: 10px 18px; }
      .creator-btn { bottom: 85px; padding: 10px 18px; }
    }

    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      color: #ffcc00;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
      box-shadow: 0 0 30px rgba(255,204,0,0.5);
      animation: backButtonPulse 3s ease-in-out infinite;
      will-change: transform; /* оптимизация производительности */
    }
    /* fallback для старых браузеров без backdrop-filter */
    @supports not (backdrop-filter: blur()) {
      .back-button { background: rgba(0, 0, 0, 0.95); }
    }
    @keyframes backButtonPulse { 0%,100%{box-shadow:0 0 30px #ffcc00} 50%{box-shadow:0 0 60px #ff6600} }
    .back-button:hover {
      background: #ffcc00;
      color: #000;
      transform: translateX(-5px) scale(1.05);
    }

    .connect-wallet-btn {
      position: fixed;
      bottom: 220px;
      left: 30px;
      z-index: 1000;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 30px #9945FF;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .connect-wallet-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px #9945FF;
    }
    .connect-wallet-btn.connected {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 30px #00ff00;
    }

    .creator-btn {
      position: fixed;
      bottom: 140px;
      left: 30px;
      z-index: 1000;
      background: #ffcc00;
      color: #000;
      border: none;
      border-radius: 60px;
      padding: 18px 35px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 40px #ffcc00;
      display: none;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .creator-btn.visible { display: block; }
    .creator-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 80px #ffcc00;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      font-weight: 800;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff, #00ff99, #ffcc00, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 400% 400%;
      animation: titleRainbow 8s linear infinite;
      letter-spacing: 2px;
    }
    @keyframes titleRainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .slogan-container {
      text-align: center;
      margin-bottom: 50px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .slogan-line1 {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600;
      letter-spacing: 1px;
      animation: line1Glow 2.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes line1Glow { 0%,100%{color:#ff6600;text-shadow:0 0 20px #ff6600} 33%{color:#ff00ff;text-shadow:0 0 30px #ff00ff} 66%{color:#ffaa00;text-shadow:0 0 30px #ffaa00} }
    .slogan-line2 {
      font-family: 'Sora', sans-serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: #00ff00;
      text-shadow: 0 0 15px #00ff00;
      line-height: 1.8;
      animation: line2Flicker 3s linear infinite;
    }
    @keyframes line2Flicker { 0%,100%{color:#00ff00;text-shadow:0 0 15px #00ff00} 20%{color:#00ffff;text-shadow:0 0 20px #00ffff} 40%{color:#ffff00;text-shadow:0 0 20px #ffff00} 60%{color:#ff00ff;text-shadow:0 0 20px #ff00ff} 80%{color:#00ff00;text-shadow:0 0 15px #00ff00} }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin: 40px 0 30px;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      padding-bottom: 15px;
      letter-spacing: 1px;
      text-shadow: 0 0 20px #ffdd00;
      animation: sectionGlow 3s ease-in-out infinite;
    }
    @keyframes sectionGlow { 0%,100%{color:#ffdd00;text-shadow:0 0 20px #ffdd00} 50%{color:#ff00ff;text-shadow:0 0 30px #ff00ff} }

    .gallery-container { max-width: 1200px; margin: 0 auto; }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 60px;
      border: 2px solid #333;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 0 30px #ffcc00;
      border: 2px solid #ffcc00;
    }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: auto;
    }
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #ffcc00;
      z-index: 2;
      font-family: 'Sora', sans-serif;
      box-shadow: 0 0 20px #ffcc00;
      pointer-events: none;
    }
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: rgba(255, 0, 0, 0.9);
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s ease;
      box-shadow: 0 0 30px #ff0000;
      font-family: 'Arial', sans-serif;
      pointer-events: auto;
    }
    .delete-btn:hover {
      background: #ff0000;
      transform: scale(1.2) rotate(90deg);
      box-shadow: 0 0 50px #ff0000;
    }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      cursor: pointer;
      background: #0f0f0f;
    }
    .item-placeholder .emoji { font-size: 3.5rem; margin-bottom: 10px; opacity: 0.5; }

    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 60px #00ffff;
      display: none;
    }
    @supports not (backdrop-filter: blur()) {
      .upload-section { background: rgba(0, 0, 0, 0.98); }
    }
    .upload-section.visible { display: block; }
    .upload-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff;
      animation: uploadTitle 4s ease-in-out infinite;
    }
    @keyframes uploadTitle { 0%,100%{color:#ff00ff;text-shadow:0 0 30px #ff00ff} 50%{color:#00ffff;text-shadow:0 0 30px #00ffff} }
    .upload-btn {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      box-shadow: 0 0 30px #00ff00;
    }
    .upload-btn:hover {
      background: #00ff00;
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 80px #00ff00;
    }
    .hidden-input { display: none; }
    .upload-note {
      color: #ffaa00;
      margin-top: 25px;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      text-shadow: 0 0 10px #ffaa00;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border: 4px solid #ff00ff;
      border-radius: 15px;
      box-shadow: 0 0 100px #ff00ff;
      animation: lightboxGlow 2s ease-in-out infinite;
    }
    @keyframes lightboxGlow { 0%,100%{border-color:#ff00ff;box-shadow:0 0 100px #ff00ff} 50%{border-color:#00ffff;box-shadow:0 0 100px #00ffff} }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 3px solid #ff00ff;
      border-radius: 50%;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 0 50px #ff00ff;
    }
    .lightbox-close:hover {
      background: #ff00ff;
      color: #000;
      transform: scale(1.1) rotate(90deg);
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.9);
      padding: 12px 35px;
      border-radius: 60px;
      border: 3px solid #00ffff;
      font-family: 'Syne', sans-serif;
      box-shadow: 0 0 40px #00ffff;
    }

    .confirm-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      border: 4px solid #ff0000;
      border-radius: 30px;
      padding: 40px;
      z-index: 20000;
      text-align: center;
      box-shadow: 0 0 100px #ff0000;
      min-width: 400px;
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop { from{transform:translate(-50%,-50%) scale(0.8);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
    .confirm-modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      color: #ff0000;
      margin-bottom: 30px;
      text-shadow: 0 0 30px #ff0000;
    }
    .confirm-buttons { display: flex; gap: 20px; justify-content: center; }
    .confirm-btn {
      padding: 15px 40px;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .confirm-btn.yes {
      background: #ff0000;
      color: white;
      box-shadow: 0 0 40px #ff0000;
    }
    .confirm-btn.yes:hover {
      background: #ff4444;
      transform: scale(1.1);
      box-shadow: 0 0 80px #ff0000;
    }
    .confirm-btn.no {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 40px #00ff00;
    }
    .confirm-btn.no:hover {
      background: #88ff88;
      transform: scale(1.1);
      box-shadow: 0 0 80px #00ff00;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 19999;
      backdrop-filter: blur(5px);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.98);
      border: 3px solid #00ff9d;
      color: #00ff9d;
      padding: 15px 35px;
      border-radius: 60px;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      z-index: 30000;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 60px #00ff9d;
    }
    @keyframes slideUp { from{transform:translate(-50%,100px);opacity:0} to{transform:translate(-50%,0);opacity:1} }
  </style>
</head>
<body>
  <a href="https://www.cryptobros.pro/merch.html" class="back-button" target="_blank">
    <span>←</span>
    <span>BACK TO MERCH</span>
  </a>

  <button class="connect-wallet-btn" id="connectWalletBtn">
    <span>🔮</span>
    <span>CONNECT WALLET</span>
  </button>

  <button class="creator-btn" id="creatorBtn">👑 UPLOAD DESIGNS</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="" loading="lazy">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div id="confirmModal" style="display: none;">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="confirm-modal">
      <h3>⚠️ DELETE DESIGN?</h3>
      <div class="confirm-buttons">
        <button class="confirm-btn yes" id="confirmYes">YES</button>
        <button class="confirm-btn no" id="confirmNo">NO</button>
      </div>
    </div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    
    <div class="slogan-container">
      <div class="slogan-line1" id="sloganLine1">REAL ONES WEAR THE MERCH</div>
      <div class="slogan-line2" id="sloganLine2">FAKE ONES FEAR THE TRUTH</div>
    </div>

    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD NEW DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button class="upload-btn" id="uploadButton">CHOOSE IMAGES</button>
      <div class="upload-note">
        Files with numbers → design #[number]<br>
        Files without numbers → first empty slot
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ===== YOUR WALLET ADDRESS =====
      const YOUR_WALLET_ADDRESS = '7VCogQuuv2FFurqZu2kegkgGPH6itevv6o4tD4JPYQyr';
      
      let isCreator = false;
      let designImages = {};
      
      // ===== Безопасная загрузка из localStorage =====
      try {
        const saved = localStorage.getItem('designImages');
        if (saved && saved !== 'null' && saved !== 'undefined') {
          const parsed = JSON.parse(saved);
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            designImages = parsed;
          } else {
            designImages = {};
          }
        }
      } catch (e) {
        console.warn('localStorage read failed, starting fresh');
        designImages = {};
      }

      // DOM elements
      const connectWalletBtn = document.getElementById('connectWalletBtn');
      const creatorBtn = document.getElementById('creatorBtn');
      const uploadSection = document.getElementById('uploadSection');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const sloganLine1 = document.getElementById('sloganLine1');
      const sloganLine2 = document.getElementById('sloganLine2');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNumber = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const confirmModal = document.getElementById('confirmModal');
      const confirmYes = document.getElementById('confirmYes');
      const confirmNo = document.getElementById('confirmNo');
      const modalOverlay = document.getElementById('modalOverlay');

      let pendingDeleteId = null;
      let currentToast = null;

      // ===== Toast with safe remove =====
      function showToast(msg, color) {
        if (currentToast && currentToast.parentNode) {
          currentToast.remove();
          currentToast = null;
        }
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.style.color = color;
        toast.style.boxShadow = `0 0 60px ${color}`;
        document.body.appendChild(toast);
        
        currentToast = toast;
        
        setTimeout(() => {
          if (currentToast && currentToast.parentNode) {
            currentToast.remove();
            if (currentToast === toast) currentToast = null;
          }
        }, 2000);
      }

      // ===== Save to localStorage =====
      function saveToLocalStorage() {
        try {
          localStorage.setItem('designImages', JSON.stringify(designImages));
        } catch (e) {
          showToast('❌ Failed to save', '#ff3366');
        }
      }

      // ===== Delete design =====
      function deleteDesign(number) {
        if (designImages[number]) {
          delete designImages[number];
          saveToLocalStorage();
          renderDesigns();
          showToast(`🗑️ Design #${number} deleted`, '#ff6666');
        }
        hideDeleteConfirm();
      }

      function showDeleteConfirm(number) {
        pendingDeleteId = number;
        confirmModal.style.display = 'block';
      }

      function hideDeleteConfirm() {
        confirmModal.style.display = 'none';
        pendingDeleteId = null;
      }

      // ===== Lightbox functions (global) =====
      window.openLightbox = function(num) {
        if (designImages[num]) {
          lightboxImg.src = designImages[num];
          lightboxNumber.textContent = `DESIGN #${num}`;
          lightbox.classList.add('active');
        }
      };

      window.showDeleteConfirm = function(num) {
        if (isCreator) {
          showDeleteConfirm(num);
        }
      };

      // ===== Render grid =====
      function renderDesigns() {
        const grid = document.getElementById('designsGrid');
        if (!grid) return;
        
        let html = '';

        for (let i = 1; i <= 20; i++) {
          const img = designImages[i];
          html += `
            <div class="grid-item" data-design-id="${i}">
              <div class="item-number">${i}</div>
              ${img ? `
                <img src="${img}" alt="Design ${i}" loading="lazy" onclick="openLightbox(${i})">
                ${isCreator ? `<div class="delete-btn" onclick="event.stopPropagation(); showDeleteConfirm(${i})">✕</div>` : ''}
              ` : `
                <div class="item-placeholder" onclick="openLightbox(${i})">
                  <div class="emoji">🎨</div>
                  <div>EMPTY</div>
                </div>
              `}
            </div>
          `;
        }
        grid.innerHTML = html;
      }

      // ===== Wallet connection =====
      if (connectWalletBtn) {
        connectWalletBtn.addEventListener('click', async () => {
          try {
            if (!window.solana || !window.solana.isPhantom) {
              if (confirm('Phantom wallet not found. Install it?')) {
                window.open('https://phantom.app/', '_blank');
              }
              return;
            }

            const response = await window.solana.connect();
            const connectedAddress = response.publicKey.toString();
            
            if (connectedAddress === YOUR_WALLET_ADDRESS) {
              isCreator = true;
              
              creatorBtn.classList.add('visible');
              uploadSection.classList.add('visible');
              connectWalletBtn.classList.add('connected');
              connectWalletBtn.innerHTML = '<span>✅</span><span>WALLET CONNECTED</span>';
              
              renderDesigns(); // re-render to show delete buttons
              showToast('👑 Creator mode activated', '#00ff00');
            } else {
              showToast('❌ This wallet is not authorized', '#ff3366');
              // безопасное отключение с try/catch
              try {
                if (window.solana && typeof window.solana.disconnect === 'function') {
                  await window.solana.disconnect();
                }
              } catch (disconnectErr) {
                // игнорируем ошибку отключения
              }
            }
          } catch (error) {
            // пользователь отменил подключение — просто молчим
            console.log('Connection cancelled');
          }
        });
      }

      // ===== Creator button scroll =====
      if (creatorBtn) {
        creatorBtn.addEventListener('click', () => {
          if (!isCreator) {
            showToast('❌ Creator mode only', '#ff3366');
            return;
          }
          uploadSection.scrollIntoView({ behavior: 'smooth' });
        });
      }

      // ===== File upload with validation =====
      if (uploadButton && fileInput) {
        uploadButton.addEventListener('click', () => {
          if (!isCreator) {
            showToast('❌ Creator mode only', '#ff3366');
            return;
          }
          fileInput.click();
        });

        fileInput.addEventListener('change', async function(e) {
          if (!isCreator) return;

          const files = Array.from(e.target.files);
          if (files.length === 0) return;

          for (const file of files) {
            // проверка типа файла
            if (!file.type.startsWith('image/')) {
              showToast(`❌ ${file.name} is not an image`, '#ff3366');
              continue;
            }

            // проверка размера (макс 5MB)
            if (file.size > 5 * 1024 * 1024) {
              showToast(`❌ ${file.name} exceeds 5MB`, '#ff3366');
              continue;
            }

            try {
              // extract number from filename
              const match = file.name.match(/\d+/);
              let number = match ? parseInt(match[0]) : null;
              
              // если нет номера или вне диапазона — ищем первый пустой слот
              if (!number || number < 1 || number > 20) {
                for (let i = 1; i <= 20; i++) {
                  if (!designImages[i]) {
                    number = i;
                    break;
                  }
                }
              }

              if (number && number >= 1 && number <= 20) {
                // если слот занят, а номер не из имени — ищем другой пустой
                if (designImages[number] && !match) {
                  let found = false;
                  for (let i = 1; i <= 20; i++) {
                    if (!designImages[i]) {
                      number = i;
                      found = true;
                      break;
                    }
                  }
                  if (!found) {
                    showToast('❌ No empty slots left', '#ff3366');
                    continue;
                  }
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                  designImages[number] = event.target.result;
                  saveToLocalStorage();
                  renderDesigns();
                  showToast(`✅ Uploaded design #${number}`, '#00ff00');
                };
                reader.readAsDataURL(file);
              } else {
                showToast('❌ No available slots (1-20)', '#ff3366');
              }
            } catch (error) {
              showToast('❌ Upload failed', '#ff3366');
            }
          }
          e.target.value = '';
        });
      }

      // ===== Lightbox events =====
      if (lightboxClose) {
        lightboxClose.addEventListener('click', () => {
          lightbox.classList.remove('active');
        });
      }

      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) {
            lightbox.classList.remove('active');
          }
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
          hideDeleteConfirm();
        }
      });

      // ===== Delete confirmation =====
      if (confirmYes) {
        confirmYes.addEventListener('click', () => {
          if (pendingDeleteId) {
            deleteDesign(pendingDeleteId);
          }
        });
      }

      if (confirmNo) {
        confirmNo.addEventListener('click', hideDeleteConfirm);
      }

      if (modalOverlay) {
        modalOverlay.addEventListener('click', hideDeleteConfirm);
      }

      // ===== Slogan rotation =====
      const slogans1 = [
        "REAL ONES WEAR THE MERCH",
        "CRYPTOBROS MERCH",
        "WEAR THE MERCH",
        "PROOF YOU'RE NOT A RUG-PULLER",
        "DON'T JUST HODL"
      ];

      const slogans2 = [
        "FAKE ONES FEAR THE TRUTH",
        "NOT JUST CLOTHES, IT'S A STATEMENT",
        "LET THEM KNOW YOU'RE UNTOUCHABLE",
        "CRYPTOBROS FOR THE FEARLESS",
        "SHOW IT — CRYPTOBROS MERCH"
      ];

      let sloganIndex = 0;
      setInterval(() => {
        sloganIndex = (sloganIndex + 1) % 5;
        if (sloganLine1) sloganLine1.textContent = slogans1[sloganIndex];
        if (sloganLine2) sloganLine2.textContent = slogans2[sloganIndex];
      }, 20000);

      // ===== Check if wallet already connected =====
      setTimeout(() => {
        if (window.solana?.isPhantom && window.solana.publicKey) {
          const connectedAddress = window.solana.publicKey.toString();
          if (connectedAddress === YOUR_WALLET_ADDRESS) {
            isCreator = true;
            creatorBtn.classList.add('visible');
            uploadSection.classList.add('visible');
            connectWalletBtn.classList.add('connected');
            connectWalletBtn.innerHTML = '<span>✅</span><span>WALLET CONNECTED</span>';
            renderDesigns(); // show delete buttons
          }
        }
      }, 500);

      // initial render
      renderDesigns();
    })();
  </script>
</body>
</html>
