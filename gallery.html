<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRYPTOBROS — GALLERY</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Syne', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 30px;
      transition: 0.3s;
    }
    body.light-mode {
      background: #f0f0f0;
      color: black;
    }
    body.light-mode .grid-item {
      background: white;
      border-color: #ccc;
    }
    .back-button {
      position: fixed;
      top: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 16px 36px;
      color: #ffcc00;
      text-decoration: none;
      font-weight: 700;
      z-index: 1000;
    }
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #333;
      border: 3px solid #ffcc00;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      z-index: 1000;
    }
    #adminButton {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #9945FF;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 16px 32px;
      font-weight: 700;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 0 30px #9945FF;
    }
    .page-title {
      font-weight: 800;
      font-size: 5rem;
      text-align: center;
      margin: 80px 0 20px;
      background: linear-gradient(45deg, #ff3366, #ff00ff, #6600ff, #00ccff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .slogan-line1 {
      font-weight: 700;
      font-size: 2.2rem;
      text-align: center;
      color: #ff6600;
    }
    .slogan-line2 {
      font-size: 1.3rem;
      text-align: center;
      color: #00ff00;
      margin-bottom: 50px;
    }
    .section-title {
      font-weight: 700;
      font-size: 2.8rem;
      color: #ffdd00;
      border-bottom: 4px solid #ffdd00;
      margin: 40px 0 30px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 2px solid #333;
      margin-bottom: 60px;
    }
    .grid-item {
      aspect-ratio: 1/1;
      background: #1a1a1a;
      border-right: 2px solid #333;
      border-bottom: 2px solid #333;
      position: relative;
      cursor: pointer;
    }
    .grid-item:nth-child(4n) { border-right: none; }
    .grid-item:nth-last-child(-n+4) { border-bottom: none; }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .item-number {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.9);
      border: 2px solid #ffcc00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffcc00;
      font-weight: 700;
      z-index: 2;
    }
    .item-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #666;
    }
    .item-placeholder .emoji { font-size: 3.5rem; opacity: 0.5; }
    .upload-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 40px;
      background: rgba(0,0,0,0.9);
      border: 3px solid #00ffff;
      border-radius: 30px;
      text-align: center;
    }
    .upload-title {
      font-weight: 700;
      font-size: 2.5rem;
      color: #ff00ff;
      margin-bottom: 30px;
    }
    #uploadButton {
      background: transparent;
      border: 3px solid #00ff00;
      color: #00ff00;
      padding: 18px 45px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
    }
    .hidden-input { display: none; }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border: 4px solid #ff00ff;
      border-radius: 15px;
    }
    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ff00ff;
      font-size: 3rem;
      cursor: pointer;
      width: 65px;
      height: 65px;
      border: 3px solid #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-number {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 1.5rem;
      background: black;
      padding: 12px 35px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      font-weight: 700;
    }
    #loadingIndicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff;
      font-size: 2rem;
      background: black;
      padding: 20px 40px;
      border: 3px solid #00ffff;
      border-radius: 60px;
      z-index: 40000;
      display: none;
    }
    #loadingIndicator.active { display: block; }
  </style>
</head>
<body>
  <div id="loadingIndicator">⏳ LOADING...</div>
  <a href="https://www.cryptobros.pro/merch.html" class="back-button">← BACK TO MERCH</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
  <button id="adminButton">📤 UPLOAD</button>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-number" id="lightboxNumber"></div>
  </div>

  <div class="gallery-container">
    <h1 class="page-title">DESIGN GALLERY</h1>
    <div class="slogan-line1">REAL ONES WEAR THE MERCH</div>
    <div class="slogan-line2">FAKE ONES FEAR THE TRUTH</div>
    <div class="section-title">⚡ DESIGNS 1–20 ⚡</div>
    <div class="image-grid" id="designsGrid"></div>

    <div class="upload-section" id="uploadSection">
      <div class="upload-title">📤 UPLOAD DESIGNS</div>
      <input type="file" id="designUpload" class="hidden-input" accept="image/*" multiple>
      <button id="uploadButton">CHOOSE IMAGES</button>
      <div style="color:#ffaa00; margin-top:25px;">
        Files with numbers → that slot<br>
        Files without numbers → fill empty slots<br>
        Max 5MB
      </div>
    </div>
  </div>

  <script>
    (function() {
      let designImages = {};

      // Elements
      const themeToggle = document.getElementById('themeToggle');
      const adminBtn = document.getElementById('adminButton');
      const uploadSection = document.getElementById('uploadSection');
      const uploadBtn = document.getElementById('uploadButton');
      const fileInput = document.getElementById('designUpload');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxNum = document.getElementById('lightboxNumber');
      const lightboxClose = document.getElementById('lightboxClose');
      const grid = document.getElementById('designsGrid');
      const loader = document.getElementById('loadingIndicator');

      // Load saved data
      try {
        const saved = localStorage.getItem('designs');
        if (saved) designImages = JSON.parse(saved);
      } catch(e) { console.warn('Load failed'); }

      // Render grid
      function render() {
        if (!grid) return;
        let html = '';
        for (let i = 1; i <= 20; i++) {
          html += '<div class="grid-item" data-id="'+i+'">';
          html += '<div class="item-number">'+i+'</div>';
          if (designImages[i]) {
            html += '<img src="'+designImages[i]+'" alt="Design '+i+'">';
          } else {
            html += '<div class="item-placeholder"><div class="emoji">🎨</div><div>EMPTY</div></div>';
          }
          html += '</div>';
        }
        grid.innerHTML = html;
      }
      render();

      // Theme
      if (themeToggle) {
        if (localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light-mode');
          themeToggle.textContent = '☀️';
        }
        themeToggle.onclick = () => {
          document.body.classList.toggle('light-mode');
          const isLight = document.body.classList.contains('light-mode');
          themeToggle.textContent = isLight ? '☀️' : '🌙';
          localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
      }

      // Lightbox
      if (grid) {
        grid.onclick = (e) => {
          const item = e.target.closest('.grid-item');
          if (item) {
            const id = item.dataset.id;
            if (designImages[id]) {
              lightboxImg.src = designImages[id];
              lightboxNum.textContent = 'DESIGN #'+id;
              lightbox.classList.add('active');
            }
          }
        };
      }
      if (lightboxClose) {
        lightboxClose.onclick = () => {
          lightbox.classList.remove('active');
          lightboxImg.src = '';
        };
      }

      // Scroll to upload
      if (adminBtn) {
        adminBtn.onclick = () => uploadSection.scrollIntoView({ behavior: 'smooth' });
      }

      // Upload
      if (uploadBtn && fileInput) {
        uploadBtn.onclick = () => fileInput.click();

        fileInput.onchange = function(e) {
          const files = Array.from(e.target.files).filter(f => f.size <= 5 * 1024 * 1024);
          if (files.length === 0) return;

          loader.classList.add('active');
          let processed = 0;

          files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (re) => {
              // Extract slot number
              const match = file.name.match(/\d+/);
              let slot = match ? parseInt(match[0]) : null;
              if (slot && (slot < 1 || slot > 20)) slot = null;

              // Find first empty slot if no number
              if (!slot) {
                for (let i = 1; i <= 20; i++) {
                  if (!designImages[i]) { slot = i; break; }
                }
              }

              // Save if slot is valid
              if (slot && !designImages[slot]) {
                designImages[slot] = re.target.result;
              }

              processed++;
              if (processed === files.length) {
                localStorage.setItem('designs', JSON.stringify(designImages));
                render();
                loader.classList.remove('active');
              }
            };
            reader.onerror = () => {
              processed++;
              if (processed === files.length) loader.classList.remove('active');
            };
            reader.readAsDataURL(file);
          });

          fileInput.value = '';
        };
      }
    })();
  </script>
</body>
</html>
