<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY - CryptoBros Merch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 30px;
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
        }

        .back-btn:hover {
            background: #ffd700;
            color: #000;
        }

        h1 {
            font-size: 4rem;
            color: #d946ef;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
        }

        .subtitle-1 {
            font-size: 2rem;
            color: #ff6600;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .subtitle-2 {
            font-size: 1.3rem;
            color: #00ff00;
            text-transform: uppercase;
            font-weight: bold;
        }

        .slots-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            border-bottom: 3px solid #ffd700;
        }

        .slots-title {
            font-size: 2.5rem;
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .slot {
            aspect-ratio: 1;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .slot:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .slot-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 10;
        }

        .slot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .slot-image:hover {
            transform: scale(1.05);
        }

        .slot.empty {
            opacity: 0.3;
            background: #0a0a0a;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-image {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #ffd700;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1001;
        }

        .modal-close:hover {
            color: #ff0000;
            transform: scale(1.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            h1 {
                font-size: 3rem;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.5rem;
            }
            .subtitle-1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://www.cryptobros.pro/merch.html" class="back-btn">← BACK</a>
            <h1>GALLERY</h1>
            <div class="subtitle-1">REAL ONES WEAR MERCH</div>
            <div class="subtitle-2">FAKES FEAR THE TRUTH</div>
        </div>

        <div class="slots-header">
            <span>⚡</span>
            <span class="slots-title">SLOTS 1-20</span>
            <span>⚡</span>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Slots will be generated by JavaScript -->
        </div>
    </div>

    <!-- Modal for viewing images -->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <span class="modal-close" onclick="closeModal(event)">&times;</span>
        <img id="modalImage" class="modal-image" src="" alt="Full size image">
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace these with your actual base64 images!
        // Example: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."
        const galleryImages = [
            null, // Slot 1
            null, // Slot 2
            null, // Slot 3
            null, // Slot 4
            null, // Slot 5
            null, // Slot 6
            null, // Slot 7
            null, // Slot 8
            null, // Slot 9
            null, // Slot 10
            null, // Slot 11
            null, // Slot 12
            null, // Slot 13
            null, // Slot 14
            null, // Slot 15
            null, // Slot 16
            null, // Slot 17
            null, // Slot 18
            null, // Slot 19
            null  // Slot 20
        ];

        // Generate gallery slots
        function generateGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            galleryImages.forEach((img, index) => {
                const slot = document.createElement('div');
                slot.className = 'slot' + (img ? '' : ' empty');
                
                const number = document.createElement('div');
                number.className = 'slot-number';
                number.textContent = index + 1;
                
                slot.appendChild(number);

                if (img) {
                    const image = document.createElement('img');
                    image.className = 'slot-image';
                    image.src = img;
                    image.id = 'img-' + index;
                    image.alt = 'Gallery image ' + (index + 1);
                    image.onclick = function() { openModal(index); };
                    slot.appendChild(image);
                }

                grid.appendChild(slot);
            });
        }

        // Open modal with full-size image
        function openModal(index) {
            const img = galleryImages[index];
            if (img) {
                const modal = document.getElementById('modal');
                const modalImg = document.getElementById('modalImage');
                modalImg.src = img;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        // Close modal
        function closeModal(event) {
            if (!event || event.target.id === 'modal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('modal');
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize gallery on page load
        window.addEventListener('DOMContentLoaded', function() {
            generateGallery();
        });
    </script>
</body>
</html>
