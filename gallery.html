<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY - CryptoBros Merch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #333333;
            --slot-bg: #1a1a1a;
            --accent-purple: #d946ef;
            --accent-orange: #ff6600;
            --accent-green: #00ff00;
            --accent-yellow: #ffd700;
        }

        .light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #0a0a0a;
            --text-secondary: #333333;
            --border-color: #dddddd;
            --slot-bg: #eeeeee;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 30px;
            background: transparent;
            border: 2px solid var(--accent-yellow);
            color: var(--accent-yellow);
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-yellow);
            color: var(--bg-primary);
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 30px;
            background: transparent;
            border: 2px solid var(--accent-yellow);
            color: var(--accent-yellow);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--accent-yellow);
            color: var(--bg-primary);
        }

        h1 {
            font-size: 4rem;
            color: var(--accent-purple);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
        }

        .subtitle-1 {
            font-size: 2rem;
            color: var(--accent-orange);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .subtitle-2 {
            font-size: 1.3rem;
            color: var(--accent-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        .slots-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            border-bottom: 3px solid var(--accent-yellow);
        }

        .lightning {
            font-size: 2rem;
        }

        .slots-title {
            font-size: 2.5rem;
            color: var(--accent-yellow);
            font-weight: bold;
            text-transform: uppercase;
        }

        .upload-section {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 15px;
            border: 2px solid var(--accent-yellow);
        }

        .upload-section.hidden {
            display: none !important;
        }

        .upload-label {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-orange));
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .upload-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(217, 70, 239, 0.4);
        }

        #fileInput {
            display: none;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .slot {
            aspect-ratio: 1;
            background: var(--slot-bg);
            border: 3px solid var(--border-color);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .slot:hover {
            border-color: var(--accent-yellow);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .slot-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-yellow);
            color: var(--bg-primary);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 10;
        }

        .slot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .slot-image:hover {
            transform: scale(1.05);
        }

        .slot-placeholder {
            color: var(--text-secondary);
            font-size: 3rem;
            opacity: 0.3;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
            display: none;
            transition: all 0.3s;
        }

        .slot.has-image .remove-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: #ff0000;
            transform: scale(1.1);
        }

        .freeze-btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #ff4444, #ff0000);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .freeze-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            z-index: 9999;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
        }

        .reset-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--accent-yellow);
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1001;
        }

        .modal-close:hover {
            color: #ff0000;
            transform: scale(1.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            h1 {
                font-size: 3rem;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.5rem;
            }
            .subtitle-1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://www.cryptobros.pro/merch.html" class="back-btn">← BACK</a>
            <h1>GALLERY</h1>
            <div class="subtitle-1">REAL ONES WEAR MERCH</div>
            <div class="subtitle-2">FAKES FEAR THE TRUTH</div>
            <button class="theme-toggle" onclick="toggleTheme()">☀/☾</button>
        </div>

        <div class="slots-header">
            <span class="lightning">⚡</span>
            <span class="slots-title">SLOTS 1-20</span>
            <span class="lightning">⚡</span>
        </div>

        <div class="upload-section" id="uploadSection">
            <label for="fileInput" class="upload-label">
                📤 UPLOAD IMAGES (PNG)
            </label>
            <input type="file" id="fileInput" accept="image/png" multiple onchange="handleFiles(event)">
            <br><br>
            <button class="freeze-btn" onclick="freezePage()">🔒 FREEZE PAGE</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Slots will be generated by JavaScript -->
        </div>
    </div>

    <!-- Reset button - always visible -->
    <button class="reset-btn" onclick="resetGallery()">
        🔓 RESET GALLERY
    </button>

    <!-- Modal for viewing images -->
    <div id="imageModal" class="modal" onclick="closeModal(event)">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" class="modal-image" src="" alt="Full size image">
        </div>
    </div>

    <script>
        let uploadedImages = new Array(20).fill(null);
        let isFrozen = false;

        // Generate slots
        function generateSlots() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 20; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${i}`;
                
                const number = document.createElement('div');
                number.className = 'slot-number';
                number.textContent = i;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeImage(i);
                };
                
                const placeholder = document.createElement('div');
                placeholder.className = 'slot-placeholder';
                placeholder.id = `placeholder-${i}`;
                placeholder.innerHTML = '📷';
                
                slot.appendChild(number);
                slot.appendChild(removeBtn);
                slot.appendChild(placeholder);
                
                // Add click event to slot for opening image
                slot.onclick = () => openImage(i);
                
                grid.appendChild(slot);
            }
        }

        function handleFiles(event) {
            if (isFrozen) {
                alert('Page is frozen!');
                return;
            }

            const files = event.target.files;
            let uploadCount = 0;
            
            // Find first empty slot
            let currentSlot = uploadedImages.findIndex(img => img === null);
            if (currentSlot === -1) {
                alert('All slots are filled!');
                return;
            }
            
            for (let file of files) {
                if (currentSlot >= 20) {
                    alert('All slots are filled!');
                    break;
                }
                
                if (file.type === 'image/png') {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedImages[currentSlot] = e.target.result;
                        displayImage(currentSlot + 1, e.target.result);
                        saveToLocalStorage();
                    };
                    reader.readAsDataURL(file);
                    currentSlot++;
                    uploadCount++;
                } else {
                    alert('Please upload PNG files only!');
                }
            }
            
            event.target.value = '';
        }

        function displayImage(slotNum, imageData) {
            const slot = document.getElementById(`slot-${slotNum}`);
            let img = slot.querySelector('.slot-image');
            
            if (!img) {
                img = document.createElement('img');
                img.className = 'slot-image';
                img.id = `img-${slotNum}`;
                slot.appendChild(img);
            }
            
            img.src = imageData;
            slot.classList.add('has-image');
            
            const placeholder = document.getElementById(`placeholder-${slotNum}`);
            if (placeholder) {
                placeholder.style.display = 'none';
            }
        }

        function removeImage(slotNum) {
            if (isFrozen) {
                alert('Page is frozen!');
                return;
            }
            
            const slot = document.getElementById(`slot-${slotNum}`);
            const img = slot.querySelector('.slot-image');
            const placeholder = document.getElementById(`placeholder-${slotNum}`);
            
            if (img) {
                img.remove();
            }
            if (placeholder) {
                placeholder.style.display = 'flex';
            }
            
            slot.classList.remove('has-image');
            uploadedImages[slotNum - 1] = null;
            saveToLocalStorage();
        }

        function freezePage() {
            if (confirm('⚠️ WARNING: This will hide upload buttons permanently!\n\nAre you sure?')) {
                isFrozen = true;
                document.getElementById('uploadSection').classList.add('hidden');
                
                // Remove all remove buttons
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.style.display = 'none';
                });
                
                localStorage.setItem('galleryFrozen', 'true');
                localStorage.setItem('galleryImages', JSON.stringify(uploadedImages));
                alert('✅ Page frozen! Upload buttons hidden.\n\nTo restore: click RESET GALLERY button');
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('galleryTheme', isLight ? 'light' : 'dark');
        }

        function saveToLocalStorage() {
            localStorage.setItem('galleryImages', JSON.stringify(uploadedImages));
        }

        function loadFromLocalStorage() {
            const savedImages = localStorage.getItem('galleryImages');
            const savedTheme = localStorage.getItem('galleryTheme');
            const frozen = localStorage.getItem('galleryFrozen');
            
            // Check if page is frozen - hide upload section
            if (frozen === 'true') {
                isFrozen = true;
                const uploadSection = document.getElementById('uploadSection');
                if (uploadSection) {
                    uploadSection.classList.add('hidden');
                }
                // Hide all remove buttons
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.style.display = 'none';
                });
            }
            
            // Load saved images
            if (savedImages) {
                try {
                    uploadedImages = JSON.parse(savedImages);
                    uploadedImages.forEach((img, index) => {
                        if (img) {
                            displayImage(index + 1, img);
                        }
                    });
                    console.log('✅ Images loaded:', uploadedImages.filter(img => img !== null).length);
                } catch (e) {
                    console.error('Error loading images:', e);
                }
            }
            
            // Load theme
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
        }

        // Reset gallery function
        function resetGallery() {
            if (confirm('⚠️ WARNING: This will delete ALL images and reset the gallery!\n\nAre you sure?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // Modal functions
        function openImage(slotNum) {
            const img = uploadedImages[slotNum - 1];
            if (img) {
                const modal = document.getElementById('imageModal');
                const modalImg = document.getElementById('modalImage');
                modalImg.src = img;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal(event) {
            if (event.target.id === 'imageModal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('imageModal');
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById('imageModal');
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        // Initialize
        generateSlots();
        loadFromLocalStorage();
    </script>
</body>
</html>
