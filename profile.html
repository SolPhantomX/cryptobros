<script>
    (function() {
      'use strict';

      // Функция безопасного получения элемента
      function getElement(id) {
        const el = document.getElementById(id);
        if (!el) console.warn(`Element #${id} not found`);
        return el;
      }

      // Get elements с проверками
      const header = getElement('header');
      const avatar = getElement('avatar');
      const themeSwitch = getElement('themeSwitch');
      const editBtn = getElement('editBtn');
      const editMenu = getElement('editMenu');
      const uploadHeader = getElement('header-upload');
      const uploadAvatar = getElement('avatar-upload');
      const uploadBg = getElement('bg-upload');
      const walletBadge = getElement('walletBadge');
      const badgeIndicator = getElement('badgeIndicator');
      const badgeText = getElement('badgeText');
      const displayName = getElement('displayName');
      const displayRank = getElement('displayRank');
      const inputName = getElement('inputName');
      const inputBio = getElement('inputBio');
      const inputLocation = getElement('inputLocation');
      const inputTwitter = getElement('inputTwitter');
      const inputWebsite = getElement('inputWebsite');
      const saveBtn = getElement('saveProfileBtn');
      const inviteGenBtn = getElement('inviteGenBtn');

      // Проверка наличия всех элементов
      if (!header || !avatar || !themeSwitch || !editBtn || !editMenu || 
          !uploadHeader || !uploadAvatar || !uploadBg || !walletBadge || 
          !badgeIndicator || !badgeText || !displayName || !displayRank || 
          !inputName || !inputBio || !inputLocation || !inputTwitter || 
          !inputWebsite || !saveBtn || !inviteGenBtn) {
        console.error('Critical elements missing!');
        return;
      }

      const STORAGE_KEY = 'cryptobros_profile';
      const MAX_FILE_SIZE = 2 * 1024 * 1024;

      // Profile data
      let profile = {
        name: '@Cryptobros',
        bio: '',
        location: '',
        twitter: '',
        website: '',
        avatar: '',
        header: '',
        bg: '',
        tier: 'FREE',
        wallet: null
      };

      // Валидация URL
      function isValidUrl(string) {
        try {
          new URL(string);
          return true;
        } catch (_) {
          return false;
        }
      }

      // Валидация Twitter handle
      function isValidTwitter(handle) {
        if (!handle) return true;
        return /^@?[A-Za-z0-9_]{1,15}$/.test(handle);
      }

      // Show notification
      function showNotification(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        toast.setAttribute('role', 'alert');
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // Load profile
      function loadProfile() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            profile = { ...profile, ...data };
          }
        } catch (e) {
          console.warn('Failed to load profile:', e);
        }
        
        inputName.value = profile.name;
        inputBio.value = profile.bio;
        inputLocation.value = profile.location;
        inputTwitter.value = profile.twitter;
        inputWebsite.value = profile.website;
        displayName.textContent = profile.name;
        displayRank.textContent = profile.tier + ' TIER';
        
        if (profile.header) {
          header.style.backgroundImage = `url("${profile.header}")`;
          header.classList.add('loaded');
        }
        if (profile.avatar) avatar.style.backgroundImage = `url("${profile.avatar}")`;
        if (profile.bg) document.body.style.backgroundImage = `url("${profile.bg}")`;
        
        updateWalletBadge();
      }

      // Save profile
      function saveProfile(showToast = true) {
        try {
          // Валидация
          const twitter = inputTwitter.value.trim();
          if (twitter && !isValidTwitter(twitter)) {
            showNotification('Invalid Twitter handle', 'error');
            return false;
          }

          const website = inputWebsite.value.trim();
          if (website && !isValidUrl(website) && !website.startsWith('http')) {
            showNotification('Invalid website URL', 'error');
            return false;
          }

          profile.name = inputName.value.trim() || '@Cryptobros';
          profile.bio = inputBio.value.trim();
          profile.location = inputLocation.value.trim();
          profile.twitter = twitter;
          profile.website = website;
          
          displayName.textContent = profile.name;
          displayRank.textContent = profile.tier + ' TIER';
          
          localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
          if (showToast) showNotification('Profile saved!', 'success');
          return true;
        } catch (e) {
          showNotification('Failed to save profile', 'error');
          console.error('Save error:', e);
          return false;
        }
      }

      // Theme
      function loadTheme() {
        try {
          const theme = localStorage.getItem('cryptobros_theme');
          if (theme === 'light') {
            document.body.classList.add('light-mode');
            themeSwitch.textContent = '☀️';
          }
        } catch (e) {
          console.warn('Failed to load theme:', e);
        }
      }

      function toggleTheme() {
        try {
          document.body.classList.toggle('light-mode');
          const isLight = document.body.classList.contains('light-mode');
          themeSwitch.textContent = isLight ? '☀️' : '🌙';
          localStorage.setItem('cryptobros_theme', isLight ? 'light' : 'dark');
        } catch (e) {
          console.warn('Failed to save theme:', e);
          showNotification('Failed to save theme preference', 'warning');
        }
      }

      // Wallet
      function updateWalletBadge() {
        if (profile.wallet) {
          badgeIndicator.className = 'badge-indicator connected'; // Исправлено
          badgeText.textContent = profile.wallet.slice(0, 6) + '...' + profile.wallet.slice(-4);
        } else {
          badgeIndicator.className = 'badge-indicator locked'; // Исправлено
          badgeText.textContent = 'Connect Wallet';
        }
      }

      function generateWalletAddress() {
        // Генерация корректного Ethereum адреса
        const chars = '0123456789abcdef';
        let address = '0x';
        for (let i = 0; i < 40; i++) {
          address += chars[Math.floor(Math.random() * 16)];
        }
        return address;
      }

      function handleWalletClick() {
        if (!profile.wallet) {
          profile.wallet = generateWalletAddress();
          updateWalletBadge();
          saveProfile(false);
          showNotification('Wallet connected!', 'success');
        } else {
          profile.wallet = null;
          updateWalletBadge();
          saveProfile(false);
          showNotification('Wallet disconnected', 'warning');
        }
      }

      // Image upload
      function handleImageUpload(type, file) {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          showNotification('Please select an image', 'error');
          return;
        }
        if (file.size > MAX_FILE_SIZE) {
          showNotification('File too large (max 2MB)', 'error');
          return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          
          if (type === 'bg') {
            profile.bg = dataUrl;
            document.body.style.backgroundImage = `url("${dataUrl}")`;
          } else if (type === 'header') {
            profile.header = dataUrl;
            header.style.backgroundImage = `url("${dataUrl}")`;
            header.classList.add('loaded');
          } else if (type === 'avatar') {
            profile.avatar = dataUrl;
            avatar.style.backgroundImage = `url("${dataUrl}")`;
          }
          
          saveProfile(false);
          showNotification(type + ' updated!', 'success');
        };
        reader.onerror = () => {
          showNotification('Failed to read file', 'error');
        };
        reader.readAsDataURL(file);
      }

      // Setup edit menu
      function setupEditMenu() {
        editMenu.innerHTML = `
          <button id="changeHeaderBtn">📷 Change Header</button>
          <button id="changeAvatarBtn">👤 Change Avatar</button>
          <button id="changeBgBtn">🎨 Change Background</button>
          <button id="resetProfileBtn">🔄 Reset Profile</button>
        `;
        
        editBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          editMenu.style.display = editMenu.style.display === 'block' ? 'none' : 'block';
        });

        editMenu.addEventListener('click', (e) => e.stopPropagation());

        const changeHeaderBtn = document.getElementById('changeHeaderBtn');
        const changeAvatarBtn = document.getElementById('changeAvatarBtn');
        const changeBgBtn = document.getElementById('changeBgBtn');
        const resetProfileBtn = document.getElementById('resetProfileBtn');

        if (changeHeaderBtn) {
          changeHeaderBtn.addEventListener('click', () => { 
            uploadHeader.click(); 
            editMenu.style.display = 'none'; 
          });
        }
        
        if (changeAvatarBtn) {
          changeAvatarBtn.addEventListener('click', () => { 
            uploadAvatar.click(); 
            editMenu.style.display = 'none'; 
          });
        }
        
        if (changeBgBtn) {
          changeBgBtn.addEventListener('click', () => { 
            uploadBg.click(); 
            editMenu.style.display = 'none'; 
          });
        }
        
        if (resetProfileBtn) {
          resetProfileBtn.addEventListener('click', () => {
            if (confirm('Reset all profile data? This cannot be undone.')) {
              const wallet = profile.wallet;
              profile = { 
                name: '@Cryptobros', 
                bio: '', 
                location: '', 
                twitter: '', 
                website: '', 
                avatar: '', 
                header: '', 
                bg: '', 
                tier: 'FREE', 
                wallet: wallet 
              };
              
              inputName.value = profile.name;
              inputBio.value = profile.bio;
              inputLocation.value = profile.location;
              inputTwitter.value = profile.twitter;
              inputWebsite.value = profile.website;
              displayName.textContent = profile.name;
              displayRank.textContent = profile.tier + ' TIER';
              
              header.style.backgroundImage = ''; 
              avatar.style.backgroundImage = ''; 
              document.body.style.backgroundImage = '';
              header.classList.remove('loaded');
              
              saveProfile(false);
              showNotification('Profile reset successfully', 'warning');
            }
            editMenu.style.display = 'none';
          });
        }
        
        document.addEventListener('click', (e) => { 
          if (!editMenu.contains(e.target) && e.target !== editBtn) { 
            editMenu.style.display = 'none'; 
          } 
        });
      }

      // Auto-save
      let autoSaveTimer;
      function setupAutoSave() {
        const inputs = [inputName, inputBio, inputLocation, inputTwitter, inputWebsite];
        inputs.forEach(input => {
          input.addEventListener('input', () => {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => saveProfile(false), 1000);
          });
        });
      }

      // Initialize
      function init() {
        loadProfile();
        loadTheme();
        setupEditMenu();
        setupAutoSave();
        
        themeSwitch.addEventListener('click', toggleTheme);
        walletBadge.addEventListener('click', handleWalletClick);
        saveBtn.addEventListener('click', () => saveProfile(true));
        
        header.addEventListener('click', () => uploadHeader.click());
        avatar.addEventListener('click', () => uploadAvatar.click());
        
        uploadHeader.addEventListener('change', (e) => {
          handleImageUpload('header', e.target.files[0]);
          e.target.value = '';
        });
        
        uploadAvatar.addEventListener('change', (e) => {
          handleImageUpload('avatar', e.target.files[0]);
          e.target.value = '';
        });
        
        uploadBg.addEventListener('change', (e) => {
          handleImageUpload('bg', e.target.files[0]);
          e.target.value = '';
        });
        
        // Keyboard support
        [header, avatar, walletBadge, themeSwitch, editBtn].forEach(el => {
          if (el) {
            el.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                el.click();
              }
            });
          }
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
</script>
