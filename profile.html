<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRYPTOBROS • Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-size: cover;
      background-attachment: fixed;
      background-color: #0a0c1f;
      color: #e0f7ff;
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }
    body.light-mode {
      background-color: #f5f7fa;
      color: #1a1a2e;
    }
    /* FIXED: Added  prefix for SVG noise */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(102, 255, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 50%);
      z-index: -1;
    }
    .top-section { position: relative; height: 300px; }
    .header {
      width: 100%; height: 100%;
      background: center/cover no-repeat;
      border: 2px dashed #4455aa;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .header.loaded { border: none; }
    .header:hover { border-color: #00ff9d; }
    .avatar {
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 4px solid #00ff9d;
      background: center/cover no-repeat;
      background-color: #1a1a2e;
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .avatar:hover {
      border-color: #ffd700;
      box-shadow: 0 6px 30px rgba(255,215,0,0.4);
    }
    .main-layout {
      max-width: 1200px;
      margin: 220px auto 0;
      display: flex;
      gap: 20px;
      padding: 0 20px;
    }
    .theme-switch {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      background: rgba(26,26,46,0.9);
      border: 2px solid #4455aa;
      border-radius: 50%;
      color: #00ff9d;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      font-size: 18px;
      transition: all 0.3s;
    }
    .theme-switch:hover {
      border-color: #00ff9d;
      box-shadow: 0 0 15px rgba(0,255,157,0.4);
      transform: scale(1.1);
    }
    body.light-mode .theme-switch {
      color: #1a1a2e;
      background: rgba(255,255,255,0.9);
      border-color: #ffd700;
    }
    .edit-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      background: rgba(26,26,46,0.9);
      border: 2px solid #4455aa;
      border-radius: 50%;
      color: #00ff9d;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      font-size: 18px;
      transition: all 0.3s;
    }
    .edit-btn:hover {
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255,215,0,0.4);
      transform: scale(1.1);
    }
    .edit-menu {
      position: absolute;
      top: 60px;
      right: 16px;
      background: rgba(26,26,46,0.95);
      border: 2px solid #4455aa;
      border-radius: 12px;
      padding: 12px;
      display: none;
      z-index: 100;
      min-width: 220px;
      max-width: 250px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }
    .edit-menu.active { display: block; }
    .edit-menu button {
      background: rgba(68,85,170,0.2);
      color: #e0f7ff;
      border: 1px solid #4455aa;
      border-radius: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }
    .edit-menu button:hover {
      background: rgba(68,85,170,0.4);
      border-color: #00ff9d;
      color: #00ff9d;
    }
    .sidebar {
      width: 220px;
      flex-shrink: 0;
    }
    .nav-item {
      padding: 12px 16px;
      color: #e0f7ff;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: block;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.2s;
    }
    .nav-item:hover {
      background: rgba(68,85,170,0.2);
      color: #00ff9d;
      text-shadow: 0 0 10px rgba(0,255,157,0.3);
    }
    .nav-item.active {
      background: rgba(68,85,170,0.4);
      border-left: 3px solid #00ff9d;
    }
    .main {
      flex: 1;
      background: rgba(26,26,46,0.6);
      border-radius: 16px;
      padding: 24px;
      min-height: 400px;
    }
    .name {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #00ff9d;
    }
    .rank {
      margin-bottom: 20px;
      font-weight: 600;
      color: #ffd700;
    }
    .field-label {
      color: #88aaff;
      margin: 16px 0 6px;
      font-weight: 600;
      font-size: 14px;
    }
    .field-value {
      color: #e0f7ff;
      margin-bottom: 12px;
      font-size: 15px;
      line-height: 1.5;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      margin: 6px 0 16px;
      background: rgba(10,12,31,0.6);
      color: #e0f7ff;
      border: 1px solid #4455aa;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00ff9d;
      box-shadow: 0 0 0 3px rgba(0,255,157,0.15);
    }
    .btn {
      background: linear-gradient(45deg, #4455aa, #6677cc);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(68,85,170,0.4);
    }
    .btn.save {
      background: linear-gradient(45deg, #00ff9d, #00cc88);
      color: #0a0c1f;
    }
    #header-upload, #avatar-upload, #bg-upload { display: none; }
    
    /* Toast notifications */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 12px;
      z-index: 9999;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.3);
      animation: toastIn 0.3s ease-out;
      max-width: 300px;
    }
    .toast.success { background: #00ff9d; color: #0a0c1f; }
    .toast.error { background: #ff4d4d; color: #fff; }
    .toast.warning { background: #ffd700; color: #0a0c1f; }
    @keyframes toastIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(20px); opacity: 0; }
    }
    
    /* WALLET STATUS BADGE */
    .wallet-badge {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,26,46,0.9);
      border: 2px solid #4455aa;
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .wallet-badge:hover {
      border-color: #00ff9d;
      box-shadow: 0 0 20px rgba(0,255,157,0.4);
      transform: translateX(-50%) scale(1.03);
    }
    body.light-mode .wallet-badge {
      background: rgba(255,255,255,0.9);
      border-color: #ffd700;
    }
    body.light-mode .badge-text { color: #1a1a2e; }
    body.light-mode .badge-text.locked { color: #664d00; }
    .badge-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      animation: pulse 2s infinite;
    }
    .badge-indicator.connected { background: #00ff9d; }
    .badge-indicator.locked { background: #ffd700; }
    .badge-text {
      color: #e0f7ff;
      font-size: 13px;
      font-weight: 600;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Invite Generator Button */
    .invite-gen-btn {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 120px;
      background: linear-gradient(180deg, #6644ff, #4488ff);
      border: none;
      border-radius: 12px 0 0 12px;
      color: white;
      font-weight: 700;
      font-size: 13px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      box-shadow: -4px 0 20px rgba(102,68,255,0.4);
    }
    .invite-gen-btn:hover {
      width: 55px;
      box-shadow: -6px 0 30px rgba(102,68,255,0.6);
      background: linear-gradient(180deg, #7755ff, #5599ff);
    }
    
    /* Invite Modal */
    .invite-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,12,31,0.9);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 20px;
    }
    .invite-modal-overlay.active { display: flex; }
    .invite-modal {
      background: rgba(26,26,46,0.95);
      border: 2px solid #4455aa;
      border-radius: 20px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }
    .invite-modal h3 {
      color: #00ff9d;
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .invite-tier-select {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .invite-tier-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(68,85,170,0.2);
      border: 2px solid #4455aa;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .invite-tier-option:hover,
    .invite-tier-option.selected {
      border-color: #00ff9d;
      background: rgba(68,85,170,0.4);
    }
    .invite-tier-option input {
      width: auto;
      margin: 0;
    }
    .invite-tier-option label {
      flex: 1;
      cursor: pointer;
      font-weight: 600;
      color: #e0f7ff;
    }
    .invite-tier-option .prefix {
      font-family: monospace;
      background: rgba(0,255,157,0.15);
      padding: 2px 8px;
      border-radius: 6px;
      color: #00ff9d;
      font-weight: 700;
    }
    .invite-generate-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, #00ff9d, #00cc88);
      color: #0a0c1f;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .invite-generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,255,157,0.4);
    }
    .invite-generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .invite-result {
      margin-top: 20px;
      padding: 16px;
      background: rgba(0,255,157,0.1);
      border: 2px dashed #00ff9d;
      border-radius: 12px;
      display: none;
    }
    .invite-result.active { display: block; }
    .invite-code {
      font-family: monospace;
      font-size: 24px;
      font-weight: 800;
      color: #00ff9d;
      letter-spacing: 2px;
      margin: 10px 0;
    }
    .invite-copy-btn {
      background: transparent;
      border: 2px solid #00ff9d;
      color: #00ff9d;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .invite-copy-btn:hover {
      background: rgba(0,255,157,0.15);
    }
    .invite-close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: #88aaff;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }
    .invite-close-btn:hover { color: #ff4d4d; }
    
    /* Responsive */
    @media (max-width: 900px) {
      .main-layout { flex-direction: column; }
      .sidebar { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; }
      .nav-item { flex: 1; min-width: 140px; text-align: center; }
      .invite-gen-btn {
        width: 44px;
        height: 100px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="top-section">
    <div class="header" id="header" title="Click to change header"></div>
    <div class="avatar" id="avatar" title="Click to change avatar"></div>
    
    <div class="wallet-badge" id="walletBadge">
      <div class="badge-indicator" id="badgeIndicator"></div>
      <div class="badge-text" id="badgeText">Connect Wallet</div>
    </div>
    
    <div class="theme-switch" id="themeSwitch" title="Toggle dark/light mode">🌙</div>
    <div class="edit-btn" id="editBtn" title="Edit profile">⚙️</div>
    
    <div class="edit-menu" id="editMenu">
      <button id="uploadHeaderBtn">🖼️ Change Header</button>
      <button id="uploadAvatarBtn">👤 Change Avatar</button>
      <button id="uploadBgBtn">🎨 Change Background</button>
      <button id="resetProfileBtn">🔄 Reset Profile</button>
    </div>
  </div>
  
  <div class="main-layout">
    <div class="sidebar">
      <a href="feed.html" class="nav-item">📰 News Feed</a>
      <a href="messages.html" class="nav-item">💬 Messages</a>
      <a href="groups.html" class="nav-item">👥 My Groups</a>
      <a href="tribunal.html" class="nav-item">⚖️ Tribunal</a>
      <a href="friends.html" class="nav-item">👫 My Friends</a>
      <a href="help.html" class="nav-item">❓ Help Desk</a>
      <a href="news.html" class="nav-item">📰 CryptoNews</a>
    </div>
    
    <div class="main" id="profileContent">
      <div class="name" id="displayName">Loading...</div>
      <div class="rank" id="displayRank">FREE TIER</div>
      
      <div class="field-label">👤 Username</div>
      <input type="text" id="inputName" placeholder="Enter your username" maxlength="20">
      
      <div class="field-label">📝 Bio</div>
      <textarea id="inputBio" placeholder="Tell us about yourself..." rows="3" maxlength="200"></textarea>
      
      <div class="field-label">📍 Location</div>
      <input type="text" id="inputLocation" placeholder="Where are you from?" maxlength="50">
      
      <div class="field-label">🔗 Twitter / X</div>
      <input type="text" id="inputTwitter" placeholder="@yourhandle" maxlength="30">
      
      <div class="field-label">🌐 Website</div>
      <input type="text" id="inputWebsite" placeholder="https://..." maxlength="100">
      
      <button class="btn save" id="saveProfileBtn">💾 Save Changes</button>
    </div>
  </div>
  
  <!-- Hidden file inputs -->
  <input type="file" id="header-upload" accept="image/*">
  <input type="file" id="avatar-upload" accept="image/*">
  <input type="file" id="bg-upload" accept="image/*">
  
  <!-- Invite Generator Button -->
  <button class="invite-gen-btn" id="inviteGenBtn" title="Generate Invite Code">
    🎫<br>INVITE
  </button>
  
  <!-- Invite Modal -->
  <div class="invite-modal-overlay" id="inviteModal">
    <div class="invite-modal">
      <button class="invite-close-btn" id="inviteCloseBtn">&times;</button>
      <h3>🎫 Generate Invite Code</h3>
      <p style="color:#88aaff;margin-bottom:16px;font-size:14px;">Select tier for the invite:</p>
      
      <div class="invite-tier-select">
        <label class="invite-tier-option" id="tierMaster">
          <input type="radio" name="inviteTier" value="MASTER" checked>
          <span>Master Tier</span>
          <span class="prefix">MAS-####</span>
        </label>
        <label class="invite-tier-option" id="tierPro">
          <input type="radio" name="inviteTier" value="PRO">
          <span>Pro Tier</span>
          <span class="prefix">PRO-####</span>
        </label>
        <label class="invite-tier-option" id="tierPremium">
          <input type="radio" name="inviteTier" value="PREMIUM">
          <span>Premium Tier</span>
          <span class="prefix">PRE-####</span>
        </label>
      </div>
      
      <button class="invite-generate-btn" id="inviteGenerateBtn" disabled>Generate Code</button>
      
      <div class="invite-result" id="inviteResult">
        <div style="color:#88aaff;font-size:13px;">Your invite code:</div>
        <div class="invite-code" id="inviteCodeDisplay">MAS-0000</div>
        <button class="invite-copy-btn" id="inviteCopyBtn">📋 Copy Code</button>
        <div style="color:#88aaff;font-size:11px;margin-top:8px;">⚠️ One-time use only</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // === CONSTANTS ===
      const STORAGE_KEY = 'cryptobros_profile';
      const THEME_KEY = 'cryptobros_theme';
      const INVITES_KEY = 'cryptobros_invites';
      const TIER_PREFIXES = { MASTER: 'MAS', PRO: 'PRO', PREMIUM: 'PRE' };
      const MAX_FILE_SIZE = 2 * 1024 * 1024;
      const MAX_DIMENSION = 3840;
      
      // === ELEMENTS ===
      const els = {
        header: document.getElementById('header'),
        avatar: document.getElementById('avatar'),
        themeSwitch: document.getElementById('themeSwitch'),
        editBtn: document.getElementById('editBtn'),
        editMenu: document.getElementById('editMenu'),
        uploadHeader: document.getElementById('header-upload'),
        uploadAvatar: document.getElementById('avatar-upload'),
        uploadBg: document.getElementById('bg-upload'),
        uploadHeaderBtn: document.getElementById('uploadHeaderBtn'),
        uploadAvatarBtn: document.getElementById('uploadAvatarBtn'),
        uploadBgBtn: document.getElementById('uploadBgBtn'),
        resetProfileBtn: document.getElementById('resetProfileBtn'),
        displayName: document.getElementById('displayName'),
        displayRank: document.getElementById('displayRank'),
        inputName: document.getElementById('inputName'),
        inputBio: document.getElementById('inputBio'),
        inputLocation: document.getElementById('inputLocation'),
        inputTwitter: document.getElementById('inputTwitter'),
        inputWebsite: document.getElementById('inputWebsite'),
        saveBtn: document.getElementById('saveProfileBtn'),
        walletBadge: document.getElementById('walletBadge'),
        badgeIndicator: document.getElementById('badgeIndicator'),
        badgeText: document.getElementById('badgeText'),
        inviteGenBtn: document.getElementById('inviteGenBtn'),
        inviteModal: document.getElementById('inviteModal'),
        inviteCloseBtn: document.getElementById('inviteCloseBtn'),
        inviteTierOptions: document.querySelectorAll('.invite-tier-option'),
        inviteGenerateBtn: document.getElementById('inviteGenerateBtn'),
        inviteResult: document.getElementById('inviteResult'),
        inviteCodeDisplay: document.getElementById('inviteCodeDisplay'),
        inviteCopyBtn: document.getElementById('inviteCopyBtn')
      };
      
      // === STATE ===
      let profile = {
        name: 'CryptoBro', bio: '', location: '', twitter: '', website: '',
        avatar: '', header: '', bg: '', tier: 'FREE', wallet: null
      };
      let selectedInviteTier = 'MASTER';
      let saveTimeout = null;
      const lastGeneratedCode = {};
      
      // === UTILS ===
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(20px)';
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      }
      
      function loadProfile() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) profile = { ...profile, ...JSON.parse(saved) };
        } catch (e) { console.warn('Failed to load profile:', e); }
      }
      
      function saveProfile() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
          showToast('Profile saved!', 'success');
          return true;
        } catch (e) {
          if (e.name === 'QuotaExceededError') showToast('Storage full!', 'error');
          else showToast('Failed to save', 'error');
          return false;
        }
      }
      
      function loadTheme() {
        if (localStorage.getItem(THEME_KEY) === 'light') {
          document.body.classList.add('light-mode');
          els.themeSwitch.textContent = '☀️';
        }
      }
      
      function toggleTheme() {
        const isLight = document.body.classList.toggle('light-mode');
        els.themeSwitch.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
      }
      
      function applyProfile() {
        if (profile.header) { els.header.style.backgroundImage = `url(${profile.header})`; els.header.classList.add('loaded'); }
        if (profile.avatar) els.avatar.style.backgroundImage = `url(${profile.avatar})`;
        if (profile.bg) document.body.style.backgroundImage = `url(${profile.bg})`;
        els.displayName.textContent = profile.name || 'CryptoBro';
        els.displayRank.textContent = `${profile.tier} TIER`;
        els.inputName.value = profile.name || '';
        els.inputBio.value = profile.bio || '';
        els.inputLocation.value = profile.location || '';
        els.inputTwitter.value = profile.twitter || '';
        els.inputWebsite.value = profile.website || '';
        updateWalletBadge();
      }
      
      function updateWalletBadge() {
        if (profile.wallet) {
          els.badgeIndicator.classList.add('connected');
          els.badgeIndicator.classList.remove('locked');
          els.badgeText.textContent = `${profile.wallet.slice(0,6)}...${profile.wallet.slice(-4)}`;
          els.badgeText.classList.remove('locked');
        } else {
          els.badgeIndicator.classList.remove('connected');
          els.badgeIndicator.classList.add('locked');
          els.badgeText.textContent = 'Connect Wallet';
          els.badgeText.classList.add('locked');
        }
      }
      
      async function compressImage(file, maxWidth = 800, quality = 0.7) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(url);
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width; canvas.height = height;
            // FIXED: Fill background only for JPEG to preserve PNG transparency
            const mimeType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
            if (mimeType === 'image/jpeg') {
              ctx.fillStyle = document.body.classList.contains('light-mode') ? '#f5f7fa' : '#1a1a2e';
              ctx.fillRect(0, 0, width, height);
            }
            ctx.drawImage(img, 0, 0, width, height);
            const compressed = canvas.toDataURL(mimeType, mimeType === 'image/jpeg' ? quality : 1);
            resolve(compressed);
          };
          img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to load image')); };
          img.src = url;
        });
      }
      
      async function handleImageUpload(input, targetEl, profileKey, isBackground = false) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > MAX_FILE_SIZE) { showToast('Image too large (max 2MB)', 'error'); input.value = ''; return; }
        if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'error'); input.value = ''; return; }
        try {
          const img = new Image();
          const url = URL.createObjectURL(file);
          await new Promise((resolve, reject) => {
            img.onload = () => { URL.revokeObjectURL(url); resolve(); };
            img.onerror = () => { URL.revokeObjectURL(url); reject(); };
            img.src = url;
          });
          if (img.width > MAX_DIMENSION || img.height > MAX_DIMENSION) {
            showToast(`Image too large (max ${MAX_DIMENSION}×${MAX_DIMENSION})`, 'error');
            input.value = ''; return;
          }
        } catch (e) { showToast('Failed to validate image', 'error'); input.value = ''; return; }
        try {
          const compressed = await compressImage(file, 800, 0.7);
          if (isBackground) { document.body.style.backgroundImage = `url(${compressed})`; profile.bg = compressed; }
          else if (profileKey === 'header') { targetEl.style.backgroundImage = `url(${compressed})`; targetEl.classList.add('loaded'); profile.header = compressed; }
          else if (profileKey === 'avatar') { targetEl.style.backgroundImage = `url(${compressed})`; profile.avatar = compressed; }
          if (saveProfile()) showToast('Image updated!', 'success');
        } catch (e) { showToast('Failed to process image', 'error'); console.error(e); }
        input.value = '';
      }
      
      function generateInviteCode(tier) {
        const prefix = TIER_PREFIXES[tier] || 'MAS';
        return `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
      }
      
      function isInviteUsed(code) {
        try { return JSON.parse(localStorage.getItem(INVITES_KEY) || '[]').includes(code); }
        catch { return false; }
      }
      
      function markInviteUsed(code) {
        try {
          const invites = JSON.parse(localStorage.getItem(INVITES_KEY) || '[]');
          if (!invites.includes(code)) { invites.push(code); localStorage.setItem(INVITES_KEY, JSON.stringify(invites)); }
        } catch (e) { console.warn('Failed to save invite:', e); }
      }
      
      // === EVENT HANDLERS ===
      els.themeSwitch.addEventListener('click', toggleTheme);
      els.editBtn.addEventListener('click', (e) => { e.stopPropagation(); els.editMenu.classList.toggle('active'); });
      document.addEventListener('click', (e) => { if (!els.editBtn.contains(e.target) && !els.editMenu.contains(e.target)) els.editMenu.classList.remove('active'); });
      els.uploadHeaderBtn.addEventListener('click', () => els.uploadHeader.click());
      els.uploadAvatarBtn.addEventListener('click', () => els.uploadAvatar.click());
      els.uploadBgBtn.addEventListener('click', () => els.uploadBg.click());
      els.uploadHeader.addEventListener('change', (e) => handleImageUpload(e.target, els.header, 'header'));
      els.uploadAvatar.addEventListener('change', (e) => handleImageUpload(e.target, els.avatar, 'avatar'));
      els.uploadBg.addEventListener('change', (e) => handleImageUpload(e.target, null, 'bg', true));
      els.resetProfileBtn.addEventListener('click', () => {
        if (confirm('Reset all profile settings?')) {
          localStorage.removeItem(STORAGE_KEY);
          profile = { ...profile, name: 'CryptoBro', bio: '', location: '', twitter: '', website: '', avatar: '', header: '', bg: '' };
          applyProfile(); els.editMenu.classList.remove('active'); showToast('Profile reset', 'warning');
        }
      });
      
      els.saveBtn.addEventListener('click', () => {
        clearTimeout(saveTimeout);
        profile.name = els.inputName.value.trim().slice(0, 20) || 'CryptoBro';
        profile.bio = els.inputBio.value.trim().slice(0, 200);
        profile.location = els.inputLocation.value.trim().slice(0, 50);
        let twitter = els.inputTwitter.value.trim().slice(0, 30);
        if (twitter && !twitter.startsWith('@')) twitter = '@' + twitter.replace(/^@+/, '');
        profile.twitter = twitter;
        let website = els.inputWebsite.value.trim().slice(0, 100);
        if (website) {
          try { profile.website = new URL(website.startsWith('http') ? website : 'https://' + website).href; }
          catch { showToast('Invalid website URL', 'error'); profile.website = ''; }
        } else profile.website = '';
        if (saveProfile()) applyProfile();
      });
      
      const fieldMap = { inputName: 'name', inputBio: 'bio', inputLocation: 'location', inputTwitter: 'twitter', inputWebsite: 'website' };
      Object.entries(fieldMap).forEach(([inputId, profileKey]) => {
        const input = document.getElementById(inputId);
        if (input) {
          input.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
              let value = input.value.trim();
              const maxLengths = { name: 20, bio: 200, location: 50, twitter: 30, website: 100 };
              if (maxLengths[profileKey]) value = value.slice(0, maxLengths[profileKey]);
              if (profileKey === 'twitter' && value && !value.startsWith('@')) value = '@' + value.replace(/^@+/, '');
              if (profileKey === 'website' && value) {
                try { value = new URL(value.startsWith('http') ? value : 'https://' + value).href; } catch { value = ''; }
              }
              profile[profileKey] = value;
              saveProfile();
            }, 1000);
          });
        }
      });
      
      function handleWalletClick() {
        if (profile.wallet) showToast(`Wallet: ${profile.wallet}`, 'success');
        else {
          profile.wallet = '0x' + Array(40).fill(0).map(() => Math.floor(Math.random()*16).toString(16)).join('');
          updateWalletBadge(); saveProfile(); showToast('Wallet connected!', 'success');
        }
      }
      els.walletBadge.addEventListener('click', handleWalletClick);
      
      // === INVITE GENERATOR ===
      els.inviteGenBtn.addEventListener('click', () => {
        const userTier = profile.tier;
        els.inviteTierOptions.forEach(option => {
          const tierValue = option.querySelector('input').value;
          const isAllowed = userTier === 'PREMIUM' ? true : userTier === 'PRO' ? ['MASTER', 'PRO'].includes(tierValue) : userTier === 'MASTER' ? tierValue === 'MASTER' : false;
          option.style.opacity = isAllowed ? '1' : '0.5';
          option.style.pointerEvents = isAllowed ? 'auto' : 'none';
          if (!isAllowed) option.classList.remove('selected');
        });
        els.inviteModal.classList.add('active'); els.inviteResult.classList.remove('active'); els.inviteGenerateBtn.disabled = true;
        els.inviteTierOptions.forEach(opt => opt.classList.remove('selected'));
        const masterOption = document.querySelector('.invite-tier-option input[value="MASTER"]')?.closest('.invite-tier-option');
        if (masterOption) { masterOption.classList.add('selected'); selectedInviteTier = 'MASTER'; }
      });
      
      function closeInviteModal() { els.inviteModal.classList.remove('active'); els.inviteResult.classList.remove('active'); }
      els.inviteCloseBtn.addEventListener('click', closeInviteModal);
      els.inviteModal.addEventListener('click', (e) => { if (e.target === els.inviteModal) closeInviteModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && els.inviteModal.classList.contains('active')) closeInviteModal(); });
      els.inviteTierOptions.forEach(option => {
        option.addEventListener('click', () => {
          els.inviteTierOptions.forEach(o => o.classList.remove('selected'));
          option.classList.add('selected');
          selectedInviteTier = option.querySelector('input').value;
          els.inviteGenerateBtn.disabled = false;
        });
      });
      
      els.inviteGenerateBtn.addEventListener('click', () => {
        let code, attempts = 0;
        if (lastGeneratedCode[selectedInviteTier] && !isInviteUsed(lastGeneratedCode[selectedInviteTier])) {
          code = lastGeneratedCode[selectedInviteTier];
        } else {
          do { code = generateInviteCode(selectedInviteTier); attempts++; } while (isInviteUsed(code) && attempts < 100);
          lastGeneratedCode[selectedInviteTier] = code;
        }
        markInviteUsed(code);
        els.inviteCodeDisplay.textContent = code;
        els.inviteResult.classList.add('active');
        showToast('Invite generated!', 'success');
      });
      
      els.inviteCopyBtn.addEventListener('click', async () => {
        const code = els.inviteCodeDisplay.textContent;
        try { await navigator.clipboard.writeText(code); showToast('Code copied!', 'success'); }
        catch {
          const textarea = document.createElement('textarea');
          textarea.value = code; document.body.appendChild(textarea); textarea.select();
          document.execCommand('copy'); document.body.removeChild(textarea);
          showToast('Code copied!', 'success');
        }
      });
      
      // === INIT ===
      function init() {
        loadTheme(); loadProfile(); applyProfile();
        try {
          if (localStorage.getItem('rulesAccepted') === 'true') {
            const certRaw = localStorage.getItem('tierCertificate');
            if (certRaw) {
              const cert = JSON.parse(certRaw);
              if (cert && cert.tier) { profile.tier = cert.tier; els.displayRank.textContent = `${cert.tier} TIER`; }
            }
          }
        } catch (e) { console.warn('Could not load tier:', e); }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
    })();
  </script>
</body>
