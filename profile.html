<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRYPTOBROS - Profile</title>
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https:;">
  <style>
    /* All styles remain the same — no changes needed here */
    /* ... (your existing CSS) ... */
  </style>
</head>
<body>
  <div class="offline-indicator" id="offlineIndicator">📡 You are offline - changes will be saved locally</div>
  <div class="loading-progress" id="loadingProgress">
    <div class="progress-text">Loading image... <span id="progressPercent">0%</span></div>
  </div>
  <div class="progress-bar" id="progressBar" style="width: 0%; display: none;"></div>

  <div class="top-section">
    <div class="header" id="header" role="button" aria-label="Change header image" tabindex="0"></div>
    <div class="avatar" id="avatar" role="button" aria-label="Change avatar image" tabindex="0"></div>
    <div class="wallet-badge" id="walletBadge" role="button" aria-label="Connect wallet" tabindex="0">
      <div class="badge-indicator" id="badgeIndicator" aria-hidden="true"></div>
      <div class="badge-text" id="badgeText">Connect Wallet</div>
    </div>
    <div class="theme-switch" id="themeSwitch" aria-label="Toggle theme" role="button" tabindex="0">🌙</div>
    <div class="edit-btn" id="editBtn" aria-label="Edit profile" role="button" aria-expanded="false" tabindex="0">
      <span class="gear-icon">⚙️</span>
    </div>
    <div class="edit-menu" id="editMenu" aria-label="Edit menu"></div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="navSidebar" role="navigation"></div>
    <div class="main" id="profileContent" role="main"></div>
  </div>

  <input type="file" id="header-upload" accept="image/png, image/jpeg, image/webp" style="display: none;" aria-hidden="true">
  <input type="file" id="avatar-upload" accept="image/png, image/jpeg, image/webp" style="display: none;" aria-hidden="true">
  <input type="file" id="bg-upload" accept="image/png, image/jpeg, image/webp" style="display: none;" aria-hidden="true">

  <button class="invite-gen-btn" id="inviteGenBtn" title="Generate Invite" aria-label="Generate invite code">🎫<br>INVITE</button>

  <div class="invite-modal-overlay" id="inviteModal" role="dialog" aria-modal="true" aria-label="Generate invite code">
    <div class="invite-modal">
      <button class="invite-close-btn" id="inviteCloseBtn" aria-label="Close modal">×</button>
      <h3>🎫 Generate Invite</h3>
      <div class="invite-tier-select">
        <label class="invite-tier-option" id="tierMaster">
          <input type="radio" name="inviteTier" value="MASTER" checked>
          <span>Master</span>
          <span style="color:#00ff9d;font-family:monospace;">MAS-####</span>
        </label>
        <label class="invite-tier-option" id="tierPro">
          <input type="radio" name="inviteTier" value="PRO">
          <span>Pro</span>
          <span style="color:#00ff9d;font-family:monospace;">PRO-####</span>
        </label>
        <label class="invite-tier-option" id="tierPremium">
          <input type="radio" name="inviteTier" value="PREMIUM">
          <span>Premium</span>
          <span style="color:#00ff9d;font-family:monospace;">PRE-####</span>
        </label>
      </div>
      <button class="invite-generate-btn" id="inviteGenerateBtn">Generate Code</button>
      <div class="invite-result" id="inviteResult">
        <div style="color:#aaa;font-size:0.9rem;margin-bottom:8px;">Your invite code:</div>
        <div class="invite-code" id="inviteCodeDisplay">MAS-0000</div>
        <div style="margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="invite-copy-btn" id="inviteCopyBtn" aria-label="Copy invite code" disabled>📋 Copy</button>
          <button class="invite-share-x" id="inviteShareX" aria-label="Share on X" disabled>𝕏 Share</button>
          <button class="invite-share-tg" id="inviteShareTg" aria-label="Share on Telegram" disabled>📱 TG</button>
        </div>
      </div>
    </div>
  </div>

  <div class="image-preview-modal" id="imagePreviewModal" role="dialog" aria-modal="true" aria-label="Image preview">
    <div class="image-preview-content">
      <button class="preview-close" id="previewCloseBtn" aria-label="Close preview">×</button>
      <img id="previewImage" src="" alt="Preview" aria-label="Image preview">
      <button class="preview-confirm" id="previewConfirmBtn" aria-label="Use this image">✓ Use This Image</button>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    // ============= CONSTANTS =============
    const OWNER_WALLETS = ['C4jGvk7MwKPPpKXVDCzkToVF5NKLq84a5hT9C4NHD4q6'];
    const AUTO_SAVE_DELAY = 800;
    const STORAGE_KEY = 'cryptobros_profile';
    const THEME_KEY = 'cryptobros_theme';
    const TIER_PREFIXES = { MASTER: 'MAS', PRO: 'PRO', PREMIUM: 'PRE' };
    const MAX_FILE_SIZE = 2 * 1024 * 1024;
    const IMAGE_LOAD_TIMEOUT = 12000;
    const IMAGE_MAX_WIDTH = 800;
    const IMAGE_COMPRESS_QUALITY = 0.72;
    const BG_IMAGE_COMPRESS_QUALITY = 0.85;
    const MAX_CANVAS_SIZE = 4096;
    const SMALL_PNG_THRESHOLD = 100 * 1024;
    const TOAST_DURATION = 3500;
    const IMAGE_CACHE_MAX_SIZE = 50 * 1024 * 1024;

    const BG_COLORS = {
      'black': '#000000',
      'dark-blue': '#0a0c1f',
      'dark-purple': '#1a0b2e',
      'dark-green': '#0b1f0a',
      'gradient1': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      'gradient2': 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
      'gradient3': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
    };

    // ============= STATE =============
    let isOwner = false;
    let profile = {
      name: '@Cryptobros',
      bio: '',
      location: '',
      twitter: '',
      website: '',
      avatar: '',
      header: '',
      bg: '',
      bgColor: 'black',
      tier: 'FREE',
      wallet: null
    };
    let previousProfile = null;
    let selectedInviteTier = 'MASTER';
    let saveTimeout = null;
    let isSaving = false;
    let saveQueued = false;
    let pendingImageData = null;
    let pendingImageTarget = null;
    const imageCache = new Map();
    let imageCacheSize = 0;

    const els = {
      header: document.getElementById('header'),
      avatar: document.getElementById('avatar'),
      themeSwitch: document.getElementById('themeSwitch'),
      editBtn: document.getElementById('editBtn'),
      editMenu: document.getElementById('editMenu'),
      uploadHeader: document.getElementById('header-upload'),
      uploadAvatar: document.getElementById('avatar-upload'),
      uploadBg: document.getElementById('bg-upload'),
      profileContent: document.getElementById('profileContent'),
      navSidebar: document.getElementById('navSidebar'),
      walletBadge: document.getElementById('walletBadge'),
      badgeIndicator: document.getElementById('badgeIndicator'),
      badgeText: document.getElementById('badgeText'),
      inviteGenBtn: document.getElementById('inviteGenBtn'),
      inviteModal: document.getElementById('inviteModal'),
      inviteCloseBtn: document.getElementById('inviteCloseBtn'),
      inviteGenerateBtn: document.getElementById('inviteGenerateBtn'),
      inviteResult: document.getElementById('inviteResult'),
      inviteCodeDisplay: document.getElementById('inviteCodeDisplay'),
      inviteCopyBtn: document.getElementById('inviteCopyBtn'),
      inviteShareX: document.getElementById('inviteShareX'),
      inviteShareTg: document.getElementById('inviteShareTg'),
      previewModal: document.getElementById('imagePreviewModal'),
      previewImage: document.getElementById('previewImage'),
      previewCloseBtn: document.getElementById('previewCloseBtn'),
      previewConfirmBtn: document.getElementById('previewConfirmBtn'),
      progressBar: document.getElementById('progressBar'),
      loadingProgress: document.getElementById('loadingProgress'),
      progressPercent: document.getElementById('progressPercent'),
      offlineIndicator: document.getElementById('offlineIndicator')
    };

    // ============= UTILITIES =============
    function showToast(message, type = 'success') {
      document.querySelectorAll('.toast').forEach(t => t.remove());
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 400);
      }, TOAST_DURATION);
    }

    function sanitizeUrl(url) {
      if (!url || typeof url !== 'string') return null;
      if (url.startsWith('data:image/') && /^data:image\/(png|jpeg|jpg|gif|webp);base64,/.test(url)) return url;
      if (url.startsWith('blob:')) return url;
      try {
        const parsed = new URL(url);
        if (['http:', 'https:'].includes(parsed.protocol)) return parsed.href;
      } catch {}
      return null;
    }

    // ... (other utility functions remain unchanged: debounce, validateTwitter, validateWebsite, etc.)

    // ============= BACKGROUND APPLICATION =============
    function applyBackground() {
      if (profile.bg) {
        const safe = sanitizeUrl(profile.bg);
        if (safe) {
          document.body.style.backgroundImage = `url("${safe}")`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundPosition = 'center';
          document.body.style.backgroundAttachment = 'fixed';
          document.body.style.backgroundRepeat = 'no-repeat';
          document.body.style.backgroundColor = 'transparent';
        } else if (profile.bg.startsWith('#') && /^#[0-9A-Fa-f]{3,8}$/.test(profile.bg)) {
          document.body.style.background = profile.bg;
          document.body.style.backgroundImage = 'none';
        } else if (Object.values(BG_COLORS).includes(profile.bg)) {
          document.body.style.background = profile.bg;
          document.body.style.backgroundImage = 'none';
        } else {
          profile.bg = '';
          document.body.style.background = BG_COLORS[profile.bgColor] || '#000';
          document.body.style.backgroundImage = 'none';
        }
      } else if (BG_COLORS[profile.bgColor]) {
        document.body.style.background = BG_COLORS[profile.bgColor];
        document.body.style.backgroundImage = 'none';
      }
    }

    // ============= PROFILE RENDER =============
    function applyProfile() {
      // Header
      if (profile.header) {
        const safe = sanitizeUrl(profile.header);
        if (safe) {
          els.header.style.backgroundImage = `url("${safe}")`;
          els.header.classList.add('loaded');
        } else {
          els.header.style.backgroundImage = '';
          els.header.classList.remove('loaded');
          profile.header = '';
        }
      }

      // Avatar
      if (profile.avatar) {
        const safe = sanitizeUrl(profile.avatar);
        if (safe) els.avatar.style.backgroundImage = `url("${safe}")`;
        else {
          els.avatar.style.backgroundImage = '';
          profile.avatar = '';
        }
      }

      // Background
      applyBackground();

      // Rest of profile rendering (name, rank, fields, save button, auto-save) remains unchanged
      // ...
    }

    // ============= INVITE SYSTEM =============
    function setupInviteSystem() {
      if (!els.inviteGenBtn) return;

      els.inviteGenBtn.addEventListener('click', () => {
        els.inviteModal.classList.add('active');
        if (els.inviteResult) els.inviteResult.classList.remove('active');
      });

      const closeModal = () => {
        els.inviteModal.classList.remove('active');
        if (els.inviteResult) els.inviteResult.classList.remove('active');
      };

      els.inviteCloseBtn?.addEventListener('click', closeModal);
      els.inviteModal?.addEventListener('click', e => { if (e.target === els.inviteModal) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && els.inviteModal?.classList.contains('active')) closeModal(); });

      document.querySelectorAll('.invite-tier-option input').forEach(radio => {
        radio.addEventListener('change', e => selectedInviteTier = e.target.value);
      });

      els.inviteGenerateBtn?.addEventListener('click', () => {
        const prefix = TIER_PREFIXES[selectedInviteTier] || 'MAS';
        const code = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;

        const codeDisplay = document.getElementById('inviteCodeDisplay');
        if (codeDisplay) codeDisplay.textContent = code;

        const result = document.getElementById('inviteResult');
        if (result) result.classList.add('active');

        const copyBtn = document.getElementById('inviteCopyBtn');
        const shareX = document.getElementById('inviteShareX');
        const shareTg = document.getElementById('inviteShareTg');

        if (copyBtn) copyBtn.disabled = false;
        if (shareX) shareX.disabled = false;
        if (shareTg) shareTg.disabled = false;

        // Attach listeners only once
        if (copyBtn && !copyBtn.dataset.listener) {
          copyBtn.addEventListener('click', async () => {
            const codeText = codeDisplay?.textContent;
            if (codeText) {
              try {
                await navigator.clipboard.writeText(codeText);
                showToast('Code copied!', 'success');
              } catch {
                showToast('Copy failed', 'error');
              }
            }
          });
          copyBtn.dataset.listener = 'true';
        }

        if (shareX && !shareX.dataset.listener) {
          shareX.addEventListener('click', () => {
            const codeText = codeDisplay?.textContent;
            if (codeText) {
              const text = encodeURIComponent(`Join CRYPTOBROS! Invite code: ${codeText}`);
              window.open(`https://x.com/intent/tweet?text=${text}`, '_blank', 'noopener,noreferrer');
            }
          });
          shareX.dataset.listener = 'true';
        }

        if (shareTg && !shareTg.dataset.listener) {
          shareTg.addEventListener('click', () => {
            const codeText = codeDisplay?.textContent;
            if (codeText) {
              const text = encodeURIComponent(`Join CRYPTOBROS! Invite code: ${codeText}`);
              window.open(`https://t.me/share/url?url=https://cryptobros.pro&text=${text}`, '_blank', 'noopener,noreferrer');
            }
          });
          shareTg.dataset.listener = 'true';
        }
      });
    }

    // ============= INIT =============
    function init() {
      loadTheme();
      loadProfile();
      setupNavigation();
      setupEditMenu();
      setupImageUploads();
      setupDragAndDrop();
      setupEditMenuToggle();
      setupInviteSystem();
      setupOfflineSupport();
      applyProfile();
      showToast('🚀 CRYPTOBROS ready!', 'success');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
